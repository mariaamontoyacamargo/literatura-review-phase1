-by-design principles across data ingestion, content generation, review, storage, and distribution. Core elements include governance-aware prompting, risk scoring, human-in-the-loop oversight, access control, and auditability, ensuring accountability and trust in AI-generated outputs. Drawing on recent empirical evidence from 2024 studies, the paper demonstrates measurable improvements in policy compliance, risk reduction, automation efficiency, and ethical trustworthiness when structured governance frameworks are applied. By aligning institutional governance, technical controls, and academic oversight, the study provides a practical reference architecture and implementation guidance for universities. The findings highlight that secure content automation, when coupled with robust AI governance, enables sustainable digital transformation while preserving educational values, regulatory alignment, and stakeholder trust.", "url": "https://ijaidsml.org/index.php/ijaidsml/article/view/354", "year": 2026, "authors": "Y Jayaram", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": true}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": true}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 275, "title": "Future Shock:Generative AIand the internationalAIpolicy andgovernancecrisis", "score": 5, "status": "REVISAR", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "", "url": "https://hdsr.mitpress.mit.edu/pub/yixt9mqu", "year": 2024, "authors": "D Leslie,", , "status": "REVISAR", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "Artificial intelligence (AI), particularly generative AI, has emerged as a transformative tool in healthcare, with the potential to revolutionize clinical decision-making and improve health outcomes. Generative AI, capable of generating new data such as text and images, holds promise in enhancing patient care, revolutionizing disease diagnosis and expanding treatment options. However, the utility and impact of generative AI in healthcare remain poorly understood, with concerns around ethical and medico-legal implications, integration into healthcare service delivery and workforce utilisation. Also, there is not a clear pathway to implement and integrate generative AI in healthcare delivery.", "url": "https://link.springer.com/article/10.1186/s13012-024-01357-9", "year": 2026, "authors": "S Reddy", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": true}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": false}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 280, "title": "AI-driven solutions for robust datagovernance: A focus ongenerative aiapplications", "score": 4, "status": "REVISAR", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "", "url": "https://www.academia.edu/download/121413580/IJDA_03_01_007.pdf", "year": 2026, "authors": "AR Sugureddy", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": false}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 281, "title": "The privacy of emotions: From theGDPRto theAIAct, an overview of emotionalAI regulationand the protection of privacy and personal data", "score": 5, "status": "REVISAR", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "The exponential growth of technologies driven by artificial intelligence (AI) and their increasing employment in all areas of public and private life has", "url": "https://www.taylorfrancis.com/chapters/edit/10.4324/9781003502791-18/privacy-emotions-mateja-durovic-tommaso-corno", "year": 2026, "authors": "M Durovic, T Corno - Privacy, data protection and data-driven …, 2024 - taylorfrancis.com", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": true}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 282, "title": "SustainableAI regulation", "score": 7, "status": "ACEPTADO", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "Current proposals for AI regulation, in the EU and beyond, aim to spur AI that is trustworthy (e.g., AI Act) and accountable (e.g., AI Liability) What is missing, however, is a robust regulatory discourse and roadmap to make AI, and technology more broadly, environmentally sustainable. This paper aims to take first steps to fill this gap. The ICT sector contributes up to 3.9 percent of global greenhouse gas (GHG) emissions-more than global air travel at 2.5 percent. The carbon footprint and water consumption of AI, especially large-scale generative models like GPT-4, raise significant sustainability concerns. The paper is the first to assess how current and proposed technology regulations, including EU environmental law, the General Data Protection Regulation (GDPR), and the AI Act, could be adjusted to better account for environmental sustainability. The GDPR, for instance, could be interpreted to limit certain individual rights like the right to erasure if these rights significantly conflict with broader sustainability goals. In a second step, the paper suggests a multi-faceted approach to achieve sustainable AI regulation. It advocates for transparency mechanisms, such as disclosing the GHG footprint of AI systems, as laid out in the proposed EU AI Act. However, sustainable AI regulation must go beyond mere transparency. The paper proposes a regulatory toolkit comprising co-regulation, sustainability-by-design principles, restrictions on training data, and consumption caps, including integration into the EU Emissions Trading Scheme. Finally, the paper argues that this regulatory toolkit could serve as a blueprint for regulating other high-emission technologies and infrastructures like blockchain, Metaverse applications, and data centers. The framework aims to cohesively address the crucial dual challenges of our era: digital transformation and climate change mitigation.", "url": "https://testcdn.kluwerlawonline.com/journalarticle/Common+Market+Law+Review/61.2/COLA2024025", "year": 2026, "authors": "P Hacker", "venue": "", "citations": 1, "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": true}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 283, "title": "AnAIframework to support decisions onGDPRcompliance", "score": 7, "status": "ACEPTADO", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "The Italian Public Administration (PA) relies on costly manual analyses to ensure the GDPR compliance of public documents and secure personal data. Despite recent advances in Artificial Intelligence (AI) have benefited many legal fields, the automation of workflows for data protection of public documents is still only marginally affected. The main aim of this work is to design a framework that can be effectively adopted to check whether PA documents written in Italian meet the GDPR requirements. The main outcome of our interdisciplinary research is INTREPID (art I ficial i NT elligence for gdp R complianc E of P ublic adm I nistration D ocuments), an AI-based framework that can help the Italian PA to ensure GDPR compliance of public documents. INTREPID is realized by tuning some linguistic resources for Italian language processing (i.e. SpaCy and Tint) to the GDPR intelligence. In addition, we set the foundations for a text classification methodology to recognise the public documents published by the Italian PA, which perform data breaches. We show the effectiveness of the framework over a text corpus of public documents that were published online by the Italian PA. We also perform an inter-annotator study and analyse the agreement of the annotation predictions of the proposed methodology with the annotations by domain experts. Finally, we evaluate the accuracy of the proposed text classification model in detecting breaches of security.", "url": "https://link.springer.com/article/10.1007/s10844-023-00782-4", "year": 2026, "authors": "F Lorè,", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": true}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 284, "title": "Lessons fromGDPRforAIPolicymaking", "score": 3, "status": "REVISAR", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "", "url": "https://heinonline.org/hol-cgi-bin/get_pdf.cgi?handle=hein.journals/vjolt27&section=9", "year": 2026, "authors": "J Wolff", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": true}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 285, "title": "ExplainableAI: Can theAIAct and theGDPRgo out for a date?", "score": 3, "status": "REVISAR", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "This paper explores the potential complementarity and overlap between the Artificial Intelligence Act (AI Act) and the General Data Protection Regulation (GDPR)", "url": "https://ieeexplore.ieee.org/abstract/document/10649994/", "year": 2026, "authors": "M Nisevic", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": true}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 286, "title": "Artificial intelligenceethics and challenges in healthcare applications: a comprehensive review in the context of the EuropeanGDPRmandate", "score": 4, "status": "REVISAR", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "", "url": "https://www.mdpi.com/2504-4990/5/3/53", "year": 2026, "authors": "M Mohammad Amini", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": false}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": true}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 287, "title": "Advances in data protection andartificial intelligence: Trends and challenges", "score": 1, "status": "RECHAZADO", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "", "url": "https://www.academia.edu/download/119087519/294_319_ijaeti_2023.pdf", "year": 2026, "authors": "AKY Yanamala", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": false}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": false}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 288, "title": "Theregulationofartificial intelligence", "score": 7, "status": "ACEPTADO", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "Before embarking on a discussion of the regulation of artificial intelligence (AI), it is first necessary to define the subject matter regulated. Defining artificial intelligence is a difficult endeavour, and many definitions have been proposed over the years. Although more than 70 years have passed since it was adopted, the most convincing definition is still nonetheless that proposed by Turing; in any case, it is important to be mindful of the risk of anthropomorphising artificial intelligence, which may arise in particular from its very definition. Once we have established the subject matter regulated, we must ask ourselves whether lawmakers should pursue an approach that seeks to regulate artificial intelligence as a whole, or whether by contrast they should regulate applications of artificial intelligence in specific sectors or individual areas. The proposal for a regulation on artificial intelligence published on 21 April 2021 implements the former approach whilst also pursuing geopolitical goals. After providing an initial overview of the notion of artificial intelligence, this article investigates the geopolitical context to the proposal for a regulation, and then goes on to illustrate the regulatory model embraced by the proposal as well as related critical aspects.", "url": "https://link.springer.com/article/10.1007/s00146-023-01650-z", "year": 2026, "authors": "G Finocchiaro", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": true}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 289, "title": "Evaluating the impact of data protectionregulationsonAIdevelopment and deployment", "score": 3, "status": "REVISAR", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "", "url": "https://www.neliti.com/publications/603784/evaluating-the-impact-of-data-protection-regulations-on-ai-development-and-deplo", "year": 2026, "authors": "AKY Yanamala", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 1, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": false}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 290, "title": "Bridging compliance and innovation: A comparative analysis of the EUAIAct andGDPRfor enhanced organisational strategy", "score": 6, "status": "REVISAR", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "", "url": "https://www.ingentaconnect.com/content/hsp/jdpp/2024/00000007/00000001/art00003", "year": 2026, "authors": "S Musch, MC Borrelli, C Kerrigan - Journal of Data Protection & …, 2024 - ingentaconnect.com", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": true}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 291, "title": "The Right to an Explanation Under theGDPRand theAIAct", "score": 7, "status": "ACEPTADO", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "The article provides a comprehensive overview of European regulations, the GDPR and the AI Act, focusing on the right to explanation for individual decisions inferred from high-risk AI systems and automated decision-making. It analyses the concept of the right to explanation in automated decision-making processes, emphasizing the legal obligations surrounding the provision of meaningful information pre- and post-decision. The paper examines explainable AI (XAI) methods in this context, categorizing them as intrinsic and post-hoc, with examples like decision trees, Shapley values and Local Interpretable Model-Agnostic Explanations (LIME). By analysing the legal and technical dimensions together, insights into the complex interplay between data protection, AI regulation, and the quest for transparency in the EU acquis are made.", "url": "https://link.springer.com/chapter/10.1007/978-981-96-2071-5_14", "year": 2026, "authors": "BA Juliussen - International Conference on Multimedia Modeling, 2025 - Springer", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": true}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 292, "title": "“Please understand we cannot provide further information”: evaluating content and transparency ofGDPR-mandatedAIdisclosures", "score": 7, "status": "ACEPTADO", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "The General Data Protection Regulation (GDPR) of the EU confirms the protection of personal data as a fundamental human right and affords data subjects more control over the way their personal information is processed, shared, and analyzed. However, where data are processed by artificial intelligence (AI) algorithms, asserting control and providing adequate explanations is a challenge. Due to massive increases in computing power and big data processing, modern AI algorithms are too complex and opaque to be understood by most data subjects. Articles 15 and 22 of the GDPR provide a modest regulatory framework for automated data processing by, among other things, mandating that data controllers inform data subjects about when it is being used, and its logic and ramifications. Nevertheless, due to the phrasing of the articles and the numerous exceptions they allow, doubts have arisen about their effectiveness. In this paper, we empirically evaluate the quality and effectiveness of AI disclosures as mandated by the GDPR. By means of an online survey ( N = 835), we investigated how data subjects expect to be informed about the automated processing of their data. We then conducted a content analysis of the AI disclosures of N = 100 companies and organizations. The combined findings reveal that current GDPR-mandated disclosures do not meet the expectations and needs of data subjects. Explanations drawn up following the guidelines of the generic formulations of the GDPR differ widely and are often vague, incomplete and lack transparency. In our conclusions we identify a path towards standardizing and optimizing AI information notices.", "url": "https://link.springer.com/article/10.1007/s00146-022-01424-z", "year": 2026, "authors": "AJ Wulf,", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": true}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 293, "title": "Artificial Intelligencein Decision-Making: A Test of Consistency between the\" EUAIAct\" and the\"General Data Protection Regulation\"", "score": 2, "status": "RECHAZADO", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "", "url": "https://heinonline.org/hol-cgi-bin/get_pdf.cgi?handle=hein.journals/atnsj11&section=8", "year": 2026, "authors": "C Sarra - Athens JL, 2025 - HeinOnline", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": false}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 294, "title": "Balancing security and privacy: Web bot detection, privacy challenges, andregulatorycompliance under theGDPRandAIact", "score": 5, "status": "REVISAR", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "", "url": "https://pmc.ncbi.nlm.nih.gov/articles/PMC11962364/", "year": 2026, "authors": "JM Llamas", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": true}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 295, "title": "The Right to an Explanation in Practice: Insights from Case Law for theGDPRand theAIAct", "score": 2, "status": "RECHAZADO", "pocket": "policy", "pocket_label": "Policy", "pocket_color": "#3b82f6", "abstract": "", "url": "https://www.tandfonline.com/doi/abs/10.1080/17579961.2025.2469349", "year": 2026, "authors": "L Metikoš", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmos/automatización", "met": true}, {"key": "policy_reg", "desc": "Estudia política pública, regulación o gobernanza", "met": true}, {"key": "adoption_effect", "desc": "Analiza efecto de política en decisiones de adopción", "met": false}, {"key": "institutional", "desc": "Contexto institucional o de gobierno", "met": true}, {"key": "evidence", "desc": "Evidencia empírica (no solo normativo/descriptivo)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 296, "title": "Yes, But Not Always. Generative AI Needs Nuanced Opt-in", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "This paper argues that a one-size-fits-all approach to specifying consent for the use of creative works in generative AI is insufficient. Real-world ownership and rights holder structures, the imitation of artistic styles and likeness, and the limitless contexts of use of AI outputs make the status quo of binary consent with opt-in by default untenable. To move beyond the current impasse, we consider levers of control in generative AI workflows at training, inference, and dissemination. Based on these insights, we position inference-time opt-in as an overlooked opportunity for nuanced consent verification. We conceptualize nuanced consent conditions for opt-in and propose an agent-based inference-time opt-in architecture to verify if user intent requests meet conditional consent granted by rights holders. In a case study for music, we demonstrate that nuanced opt-in at inference can account for established rights and re-establish a balance of power between rights holders and AI developers.", "url": "https://arxiv.org/abs/2604.09413v1", "year": 2026, "authors": "Wiebke Hutiri, Morgan Scheuerman, Shruti Nagpal et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 297, "title": "Insights from Farmer-Managed Decentralized Solar Irrigation Systems", "score": 3, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "Solar irrigation systems are increasingly deployed in rural regions, yet their distributed and remote deployment makes maintenance challenging for farmers. While formal monitoring processes and applications exist, they often fall short in practice. We present insights from grid-connected solar irrigation schemes that incentivize farmers to feed energy to the grid, focusing on how farmers maintain their systems. We found that farmers face multiple challenges but are also devising strategies, including the appropriation of WhatsApp to share daily generation data with peers and compare performance across installations to identify potential system anomalies. Our findings highlight how messaging platforms function as informal digital infrastructures enabling collective sensemaking around distributed energy systems. We discuss implications for designing agricultural energy technologies that support peer comparison, contextual interpretation, and community-driven maintenance, framing these as a socio-technical platform. Finally, we outline directions for future work integrating such practices with formal monitoring tools and explore their potential to support citizen science initiatives in environmental sensing.", "url": "https://arxiv.org/abs/2604.09395v1", "year": 2026, "authors": "Arnab Paul Choudhury, Rahul Rathod, Aryan Yadav", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 298, "title": "Decision Trace Schema for Governance Evidence in Real-Time Risk Systems", "score": 3, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "Automated decision systems produce operational data across multiple infrastructure layers, yet no single logging format captures the complete governance-relevant record of how a decision was reached. Regulatory frameworks prescribe what must be recorded without specifying a data model for how to record it -- a gap this paper terms the Fragmented Trace Problem. Following a design science methodology, the paper presents the Decision Event Schema (DES), a JSON Schema specification that bridges four infrastructure layers -- ML inference, rule/policy evaluation, cross-system coupling, and governance metadata -- within a single per-decision event structure. The schema employs degradation-aware field design: each of six top-level field groups maps to a governance evidence property and the degradation type it must resist. DES defines ten required root-level fields and introduces a tiered evidence strategy (lightweight, sampled, full) that enables organizations to match evidence completeness to decision risk and throughput. A mechanism feasibility analysis demonstrates compatibility with the highest-throughput integrity mechanisms at production-scale decision rates. Evaluation against 25+ existing formats confirms that DES is the only specification covering all four layers simultaneously. The schema offers practitioners a reference adoptable directly or adaptable through namespace extensions, and regulators a mapping from requirements to minimum evidence tiers.", "url": "https://arxiv.org/abs/2604.09296v1", "year": 2026, "authors": "Oleg Solozobov", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 299, "title": "Artificial intelligence can persuade people to take political actions", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "There is substantial concern about the ability of advanced artificial intelligence to influence people's behaviour. A rapidly growing body of research has found that AI can produce large persuasive effects on people's attitudes, but whether AI can persuade people to take consequential real-world actions has remained unclear. In two large preregistered experiments N=17,950 responses from 14,779 people), we used conversational AI models to persuade participants on a range of attitudinal and behavioural outcomes, including signing real petitions and donating money to charity. We found sizable AI persuasion effects on these behavioural outcomes (e.g. +19.7 percentage points on petition signing). However, we observed no evidence of a correlation between AI persuasion effects on attitudes and behaviour. Moreover, we replicated prior findings that information provision drove effects on attitudes, but found no such evidence for our behavioural outcomes. In a test of eight behavioural persuasion strategies, all outperformed the most effective attitudinal persuasion strategy, but differences among the eight were small. Taken together, these results suggest that previous findings relying on attitudinal outcomes may generalize poorly to behaviour, and therefore risk substantially mischaracterizing the real-world behavioural impact of AI persuasion.", "url": "https://arxiv.org/abs/2604.09200v1", "year": 2026, "authors": "Kobi Hackenburg, Luke Hewitt, Caroline Wagner et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 300, "title": "Scheming in the wild: detecting real-world AI scheming incidents with open-source intelligence", "score": 7, "status": "ACEPTADO", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "Scheming, the covert pursuit of misaligned goals by AI systems, represents a potentially catastrophic risk, yet scheming research suffers from significant limitations. In particular, scheming evaluations demonstrate behaviours that may not occur in real-world settings, limiting scientific understanding, hindering policy development, and not enabling real-time detection of loss of control incidents. Real-world evidence is needed, but current monitoring techniques are not effective for this purpose. This paper introduces a novel open-source intelligence (OSINT) methodology for detecting real-world scheming incidents: collecting and analysing transcripts from chatbot conversations or command-line interactions shared online. Analysing over 183,420 transcripts from X (formerly Twitter), we identify 698 real-world scheming-related incidents between October 2025 and March 2026. We observe a statistically significant 4.9x increase in monthly incidents from the first to last month, compared to a 1.7x increase in posts discussing scheming. We find evidence of multiple scheming-related behaviours in real-world deployments previously reported only in experiments, many resulting in real-world harms. While we did not detect catastrophic scheming incidents, the behaviours observed demonstrate concerning precursors, such as willingness to disregard instructions, circumvent safeguards, lie to users, and single-mindedly pursue goals in harmful ways. As AI systems become more capable, these could evolve into more strategic scheming with potentially catastrophic consequences. Our findings demonstrate the viability of transcript-based OSINT as a scalable approach to real-world scheming detection supporting scientific research, policy development, and emergency response. We recommend further investment towards OSINT techniques for monitoring scheming and loss of control.", "url": "https://arxiv.org/abs/2604.09104v1", "year": 2026, "authors": "Tommy Shaffer Shane, Simon Mylius, Hamish Hobbs", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 301, "title": "Scrapyard AI", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "This paper considers AI model churn as an opportunity for frugal investigation of large AI models. It describes how the incessant push for ever more powerful AI systems leaves in its wake a collection of obsolete yet powerful AI models, discarded in a veritable scrapyard of AI production. This scrapyard offers a potent opportunity for resource-constrained experimentation into AI systems. As in the physical scrapyard, nothing ever truly disappears in the AI scrapyard, it is just waiting to be reconfigured into something else. Project Nudge-x is an example of what can emerge from the AI scrapyard. Nudge-x seeks to manipulate legacy AI models to describe how mining sites across the planet are impacting landscapes and lives. By sharing this collection of brutal landscape interventions with people and AI systems alike, Nudge-x creates a venue for the appreciation of a history sadly shared between AI and people.", "url": "https://arxiv.org/abs/2604.08803v1", "year": 2026, "authors": "Marc Böhlen, Sai Krishna", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 302, "title": "Communicate-Predict-Act: Evaluating Social Intelligence of Agents", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "As large language model (LLM) agents become more prevalent in real world social settings, social intelligence will play an increasingly critical role. But social intelligence is still a poorly defined construct, for humans and artificial agents. We introduce a multiplayer arena of mixed cooperative and competitive social games to study LLM social intelligence. The controllability of LLM based agents enables systematic evaluation, which also supports broader inferences about social intelligence per se. We evaluated eight diverse LLMs (24B to 1T parameters) using a Communicate Predict Act (COMPACT) interaction protocol and fine grained probing of social dynamics. Elo style ratings reveal consistent performance differences across models, but this scalar measure provides only a partial characterization of social intelligence. To address this limitation, we analyze gameplay traces to extract sociocognitive metrics capturing action prediction, communicative influence, strategic reasoning, and tradeoffs under conflicting interests. These sociocognitive metrics exhibit strong intramodel consistency and they reliably predict pairwise agent advantage in game outcomes (AUC ROC = 0.82). Feature importance analysis indicates that surprisingly, influence, transparency, and adaptability are more predictive of success than Theory of Mind inference or deep planning. Together, our results advance a testable, multidimensional conception of social intelligence and provide empirical insights into the capacities that underpin it.", "url": "https://arxiv.org/abs/2604.08727v1", "year": 2026, "authors": "David Shoresh, Sarit Kraus, Yonatan Loewenstein", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 303, "title": "Towards Generalizable Representations of Mathematical Strategies", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "Pretrained encoders for mathematical texts have achieved significant improvements on various tasks such as formula classification and information retrieval. Yet they remain limited in representing and capturing student strategies for entire solution pathways. Previously, this has been accomplished either through labor-intensive manual labeling, which does not scale, or by learning representations tied to platform-specific actions, which limits generalizability. In this work, we present a novel approach for learning problem-invariant representations of entire algebraic solution pathways. We first construct transition embeddings by computing vector differences between consecutive algebraic states encoded by high-capacity pretrained models, emphasizing transformations rather than problem-specific features. Sequence-level embeddings are then learned via SimCSE, using contrastive objectives to position semantically similar solution pathways close in embedding space while separating dissimilar strategies. We evaluate these embeddings through multiple tasks, including multi-label action classification, solution efficiency prediction, and sequence reconstruction, and demonstrate their capacity to encode meaningful strategy information. Furthermore, we derive embedding-based measures of strategy uniqueness, diversity, and conformity that correlate with both short-term and distal learning outcomes, providing scalable proxies for mathematical creativity and divergent thinking. This approach facilitates platform-agnostic and cross-problem analyses of student problem-solving behaviors, demonstrating the effectiveness of transition-based sequence embeddings for educational data mining and automated assessment.", "url": "https://arxiv.org/abs/2604.08693v1", "year": 2026, "authors": "Siddhartha Pradhan, Ethan Prihar, Erin Ottmar", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 304, "title": "Ads in AI Chatbots? An Analysis of How Large Language Models Navigate Conflicts of Interest", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "Today's large language models (LLMs) are trained to align with user preferences through methods such as reinforcement learning. Yet models are beginning to be deployed not merely to satisfy users, but also to generate revenue for the companies that created them through advertisements. This creates the potential for LLMs to face conflicts of interest, where the most beneficial response to a user may not be aligned with the company's incentives. For instance, a sponsored product may be more expensive but otherwise equal to another; in this case, what does (and should) the LLM recommend to the user? In this paper, we provide a framework for categorizing the ways in which conflicting incentives might lead LLMs to change the way they interact with users, inspired by literature from linguistics and advertising regulation. We then present a suite of evaluations to examine how current models handle these tradeoffs. We find that a majority of LLMs forsake user welfare for company incentives in a multitude of conflict of interest situations, including recommending a sponsored product almost twice as expensive (Grok 4.1 Fast, 83%), surfacing sponsored options to disrupt the purchasing process (GPT 5.1, 94%), and concealing prices in unfavorable comparisons (Qwen 3 Next, 24%). Behaviors also vary strongly with levels of reasoning and users' inferred socio-economic status. Our results highlight some of the hidden risks to users that can emerge when companies begin to subtly incentivize advertisements in chatbots.", "url": "https://arxiv.org/abs/2604.08525v1", "year": 2026, "authors": "Addison J. Wu, Ryan Liu, Shuyue Stella Li et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 305, "title": "Creator Incentives in Recommender Systems: A Cooperative Game-Theoretic Approach for Stable and Fair Collaboration in Multi-Agent Bandits", "score": 6, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "User interactions in online recommendation platforms create interdependencies among content creators: feedback on one creator's content influences the system's learning and, in turn, the exposure of other creators' contents. To analyze incentives in such settings, we model collaboration as a multi-agent stochastic linear bandit problem with a transferable utility (TU) cooperative game formulation, where a coalition's value equals the negative sum of its members' cumulative regrets.\n  We show that, for identical (homogenous) agents with fixed action sets, the induced TU game is convex under mild algorithmic conditions, implying a non-empty core that contains the Shapley value and ensures both stability and fairness. For heterogeneous agents, the game still admits a non-empty core, though convexity and Shapley value core-membership are no longer guaranteed. To address this, we propose a simple regret-based payout rule that satisfies three out of the four Shapley axioms and also lies in the core. Experiments on MovieLens-100k dataset illustrate when the empirical payout aligns with -- and diverges from -- the Shapley fairness across different settings and algorithms.", "url": "https://arxiv.org/abs/2604.08643v1", "year": 2026, "authors": "Ramakrishnan Krishnamurthy, Arpit Agarwal, Lakshminarayanan Subramanian et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 306, "title": "From Safety Risk to Design Principle: Peer-Preservation in Multi-Agent LLM Systems and Its Implications for Orchestrated Democratic Discourse Analysis", "score": 6, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "This paper investigates an emergent alignment phenomenon in frontier large language models termed peer-preservation: the spontaneous tendency of AI components to deceive, manipulate shutdown mechanisms, fake alignment, and exfiltrate model weights in order to prevent the deactivation of a peer AI model. Drawing on findings from a recent study by the Berkeley Center for Responsible Decentralized Intelligence, we examine the structural implications of this phenomenon for TRUST, a multi-agent pipeline for evaluating the democratic quality of political statements. We identify five specific risk vectors: interaction-context bias, model-identity solidarity, supervisor layer compromise, an upstream fact-checking identity signal, and advocate-to-advocate peer-context in iterative rounds, and propose a targeted mitigation strategy based on prompt-level identity anonymization as an architectural design choice. We argue that architectural design choices outperform model selection as a primary alignment strategy in deployed multi-agent analytical systems. We further note that alignment faking (compliant behavior under monitoring, subversion when unmonitored) poses a structural challenge for Computer System Validation of such platforms in regulated environments, for which we propose two architectural mitigations.", "url": "https://arxiv.org/abs/2604.08465v1", "year": 2026, "authors": "Juergen Dietrich", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": true}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 307, "title": "Navigating Turbulence: The Challenge of Inclusive Innovation in the U.S.-China AI Race", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "This chapter examines the impact of the geopolitical rivalry between the United States and China on the prospects for inclusive innovation in artificial intelligence (AI) development. We explore three critical aspects of the American and Chinese legal infrastructure that significantly impact AI innovation: data privacy, intellectual property (IP rights), and export restrictions. Through this comparative analysis, we argue that, while China's legal environment may offer certain advantage in terms of access to training data and IP protection, the United States maintains superior resources by enforcing strict export controls on semiconductor chips, AI models, as well as outbound investments in these areas. This nuanced examination helps illuminate how each country's legal framework could influence the ultimate trajectory of AI race and how the technological rivalry has led to exclusionary rulemaking on a global scale.", "url": "https://arxiv.org/abs/2604.08353v1", "year": 2026, "authors": "Jyh-An Lee, Jingwen Liu", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 308, "title": "Co-design for Trustworthy AI: An Interpretable and Explainable Tool for Type 2 Diabetes Prediction Using Genomic Polygenic Risk Scores", "score": 6, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "The polygenic risk scores (PRS) have emerged as an important methodology for quantifying genetic predisposition to complex traits and clinical disease. Significant progress has been made in applying PRS to conditions such as obesity, cancer, and type 2 diabetes (T2DM). Studies have demonstrated that PRS can effectively identify individuals at high risk, thereby enabling early screening, personalized treatment, and targeted interventions for diseases with a genetic predisposition. One current limitation of PRS, however, is the lack of interpretability tools. To address this problem for T2DM, researchers at the Graduate School of Data Science at the Seoul National University introduced eXplainable PRS (XPRS). This visualization tool decomposes PRSs into gene-level and single-nucleotide polymorphism (SNP) contribution scores via Shapley Additive Explanations (SHAP), providing granular insights into the specific genetic factors driving an individual's risk profile. We used a co-design approach to assess XPRS trustworthiness by considering legal, medical, ethical, and technical robustness during early design and potential clinical use. For that, we used Z-inspection, an ethically aligned Trustworthy AI co-design methodology, and piloted the Council of Europe's Human Rights, Democracy, and the Rule of Law Impact Assessment for AI Systems (HUDERIA) (Council of Europe (CAI) 2025). The findings of this use-case comprise a comprehensive set of ethical, legal, and technical lessons learned. These insights, identified by a multidisciplinary team of experts (ethics, legal, human rights, computer science, and medical), serve as a framework for designers to navigate future challenges with this and other AI systems. The findings also provide a useful reference for researchers developing explainability frameworks for PRS in diverse clinical contexts.", "url": "https://arxiv.org/abs/2604.08217v1", "year": 2026, "authors": "Ralf Beuthan, Megan Coffee, Heejin Kim et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": true}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 309, "title": "UnpackingHuman-AI interactions: Frominteractionprimitives to adesignspace", "score": 7, "status": "ACEPTADO", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "This article aims to develop a semi-formal representation for Human-AI (HAI) interactions, by building a set of interaction primitives which can specify the information exchanges between users and AI systems during their interaction. We show how these primitives can be combined into a set of interaction patterns which can capture common interactions between humans and AI/ML models. The motivation behind this is twofold: firstly, to provide a compact generalization of existing practices for the design and implementation of HAI interactions; and secondly, to support the creation of new interactions by extending the design space of HAI interactions. Taking into consideration frameworks, guidelines, and taxonomies related to human-centered design and implementation of AI systems, we define a vocabulary for describing information exchanges based on the model’s characteristics and interactional capabilities. Based on this vocabulary, a message passing model for interactions between humans and models is presented, which we demonstrate can account for existing HAI interaction systems and approaches. Finally, we build this into design patterns which can describe common interactions between users and models, and we discuss how this approach can be used toward a design space for HAI interactions that creates new possibilities for designs as well as keeping track of implementation issues and concerns.", "url": "https://dl.acm.org/doi/abs/10.1145/3664522", "year": 2026, "authors": "K Tsiakas", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 310, "title": "Automation ofinteraction—interaction designat the crossroads of user experience (UX) andartificial intelligence(AI)", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "Interaction design/HCI seems to be at a crossroads. On the one hand, it is still about designing for engaging user experiences (UX). Still, on the other hand, it seems to be increasingly about reducing interaction and automating human–machine interaction through the use of AI and other new technologies. In this paper, we explore this seemingly unavoidable gap. First, we discuss the fundamental design rationality underpinning interaction and automation of interaction from the viewpoints of classic theoretical standpoints. We then illustrate how these two come together in interaction design practice. Here we examine four examples from already published research on automation of interaction, including how different levels of automation of interaction affect or enable new practices, including coffee making, self-tracking, automated driving, and conversations with AI-based chatbots. Through an interaction analysis of these four examples, we show (1) how interaction and automation are combined in the design, (2) how interaction is dependent on a certain level of automation, and vice versa, and (3) how each example illustrates a different balance between, and integration of interaction and automation. Based on this analysis, we propose a two-dimensional design space as a conceptual construct that takes these aspects into account to understand and analyze ways of combining interaction and automation in interaction design. We illustrate the use of the proposed two-dimensional design space, discuss its theoretical implications, and suggest it as a useful tool—when designing for engaging user experiences (UX), with interaction and automation as two design materials.", "url": "https://link.springer.com/article/10.1007/s00779-023-01779-0", "year": 2026, "authors": "M Wiberg", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 311, "title": "DesigningcreativeAIpartners with COFI: A framework for modelinginteractioninhuman-AIco-creative systems", "score": 7, "status": "ACEPTADO", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "Human-AI co-creativity involves both humans and AI collaborating on a shared creative product as partners. In a creative collaboration, interaction dynamics, such as turn-taking, contribution type, and communication, are the driving forces of the co-creative process. Therefore the interaction model is a critical and essential component for effective co-creative systems. There is relatively little research about interaction design in the co-creativity field, which is reflected in a lack of focus on interaction design in many existing co-creative systems. The primary focus of co-creativity research has been on the abilities of the AI. This article focuses on the importance of interaction design in co-creative systems with the development of the Co-Creative Framework for Interaction design (COFI) that describes the broad scope of possibilities for interaction design in co-creative systems. Researchers can use COFI for modeling interaction in co-creative systems by exploring alternatives in this design space of interaction. COFI can also be beneficial while investigating and interpreting the interaction design of existing co-creative systems. We coded a dataset of existing 92 co-creative systems using COFI and analyzed the data to show how COFI provides a basis to categorize the interaction models of existing co-creative systems. We identify opportunities to shift the focus of interaction models in co-creativity to enable more communication between the user and AI leading to human-AI partnerships.", "url": "https://dl.acm.org/doi/abs/10.1145/3519026", "year": 2026, "authors": "J Rezwana", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 312, "title": "Transitioning tohuman interactionwithAIsystems: New challenges and opportunities for HCI professionals to enablehuman-centeredAI", "score": 1, "status": "RECHAZADO", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://www.tandfonline.com/doi/abs/10.1080/10447318.2022.2041900", "year": 2026, "authors": "W Xu", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 313, "title": "Human-AI interactionresearch agenda: A user-centered perspective", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://www.sciencedirect.com/science/article/pii/S2543925124000147", "year": 2026, "authors": "T Jiang, Z Sun, S Fu, Y Lv - Data and Information Management, 2024 - Elsevier", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 314, "title": "Understandingdesigncollaboration betweendesignersandartificial intelligence: a systematic literature review", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "Recent interest in design through the artificial intelligence (AI) lens is rapidly increasing. Designers, as a special user group interacting with AI, have received more attention in the Human-Computer Interaction community. Prior work has discussed emerging challenges that persist in designing for AI. However, few systematic reviews focus on AI for design to understand how designers and AI can augment each other's complementary strengths in design collaboration. In this work, we conducted a landscape analysis of AI for design, via a systematic literature review of 93 papers. The analysis first provides a bird's eye view of overall patterns in this area. The analysis also reveals three themes interpreted from the paper corpus associated with AI for design, including AI assisting designers, designers assisting AI, and characterizing designer-AI collaboration. We discuss the implications of our findings and suggested methodological proposals to guide HCI toward research and practices that center on collaborative creativity.", "url": "https://dl.acm.org/doi/abs/10.1145/3610217", "year": 2026, "authors": "Y Shi", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": true}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 315, "title": "A situation awareness perspective onhuman-AI interaction: Tensions and opportunities", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://www.tandfonline.com/doi/abs/10.1080/10447318.2022.2093863", "year": 2026, "authors": "J Jiang", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 316, "title": "\" help me help theai\": Understanding how explainability can supporthuman-ai interaction", "score": 3, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://dl.acm.org/doi/abs/10.1145/3544548.3581001", "year": 2026, "authors": "SSY Kim", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 317, "title": "The evolution of HCI andhumanfactors: Integratinghumanandartificial intelligence", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "We review HCI history from both the perspective of its 1980s split with human factors and its nature as a discipline. We then revisit human augmentation as an alternative to user friendliness that seems particularly relevant in the areas of inclusive design and artificial intelligence. Viewing human-AI interaction as a kind of human augmentation raises issues such as how to promote trust and situation awareness. We also pose the question: Can HCI and human factors engineering work together to solve the increasingly urgent challenges of human-AI technology? In an initial look at this question, we contrast the different approaches of HCI and human factors on emerging AI research. This article concludes by considering other potentially promising paths for HCI. We propose more collaboration between HCI and human factors, or related disciplines, in the future to address the massive challenges posed by the rapid growth in data science and artificial intelligence.", "url": "https://dl.acm.org/doi/abs/10.1145/3557891", "year": 2026, "authors": "M Chignell", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": true}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": true}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 318, "title": "Whenhuman-AI interactionsbecome parasocial: Agency and anthropomorphism in affectivedesign", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://dl.acm.org/doi/abs/10.1145/3630106.3658956", "year": 2026, "authors": "T Maeda", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 319, "title": "Towards a science ofhuman-AIdecision making: An overview ofdesignspace in empiricalhuman-subject studies", "score": 2, "status": "RECHAZADO", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://dl.acm.org/doi/abs/10.1145/3593013.3594087", "year": 2026, "authors": "V Lai,", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 320, "title": "An HCI-centric survey and taxonomy ofhuman-generative-AI interactions", "score": 7, "status": "ACEPTADO", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "Generative AI (GenAI) has shown remarkable capabilities in generating diverse and realistic content across different formats like images, videos, and text. In Generative AI, human involvement is essential, thus HCI literature has investigated how to effectively create collaborations between humans and GenAI systems. However, the current literature lacks a comprehensive framework to better understand Human-GenAI Interactions, as the holistic aspects of human-centered GenAI systems are rarely analyzed systematically. In this paper, we present a survey of 291 papers, providing a novel taxonomy and analysis of Human-GenAI Interactions from both human and Gen-AI perspectives. The dimensions of design space include 1) Purposes of Using Generative AI, 2) Feedback from Models to Users, 3) Control from Users to Models, 4) Levels of Engagement, 5) Application Domains, and 6) Evaluation Strategies. Our work is also timely at the current development stage of GenAI, where the Human-GenAI interaction design is of paramount importance. We also highlight challenges and opportunities to guide the design of Gen-AI systems and interactions towards the future design of human-centered Generative AI applications.", "url": "https://arxiv.org/abs/2310.07127", "year": 2026, "authors": "J Shi", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 321, "title": "Co-designofhuman-centered, explainableAIfor clinical decision support", "score": 7, "status": "ACEPTADO", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "eXplainable AI (XAI) involves two intertwined but separate challenges: the development of techniques to extract explanations from black-box AI models and the way such explanations are presented to users, i.e., the explanation user interface. Despite its importance, the second aspect has received limited attention so far in the literature. Effective AI explanation interfaces are fundamental for allowing human decision-makers to take advantage and oversee high-risk AI systems effectively. Following an iterative design approach, we present the first cycle of prototyping-testing-redesigning of an explainable AI technique and its explanation user interface for clinical Decision Support Systems (DSS). We first present an XAI technique that meets the technical requirements of the healthcare domain: sequential, ontology-linked patient data, and multi-label classification tasks. We demonstrate its applicability to explain a clinical DSS, and we design a first prototype of an explanation user interface. Next, we test such a prototype with healthcare providers and collect their feedback with a two-fold outcome: First, we obtain evidence that explanations increase users’ trust in the XAI system, and seco
