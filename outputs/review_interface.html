ignificant sectoral differences in adoption levels, with Information Technology and Marketing departments showing the highest integration of GAI tools. Key barriers identified include a lack of training and qualified personnel, especially among non-users, and security concerns among occasional users. The findings suggest that while AI adoption is influenced positively by perceived benefits among frequent users, significant barriers still hinder widespread integration, particularly in less technologically driven sectors such as Tourism and Real Estate. The study contributes to the broader discourse on technology acceptance, emphasizing the need for industry-specific strategies to enhance AI adoption in SMEs.", "url": "https://link.springer.com/chapter/10.1007/978-3-031-74554-6_10", "year": 2026, "authors": "C Ziakis", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 394, "title": "BarrierstoGenerative AI AdoptionAmong Higher Vocational Students: Understanding Hesitancy and Resistance", "score": 4, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Generative Artificial Intelligence (Gen AI) presents transformative opportunities for educational environments, yet adoption within higher vocational education", "url": "https://ieeexplore.ieee.org/abstract/document/11158361/", "year": 2026, "authors": "J Lin, J Lin,", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 395, "title": "Towardsadoptionofgenerative AIin organizational settings", "score": 4, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "", "url": "https://www.tandfonline.com/doi/abs/10.1080/08874417.2023.2240744", "year": 2026, "authors": "K Prasad Agrawal", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 396, "title": "The rapidadoptionofgenerative AI", "score": 5, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Generative artificial intelligence (genAI) is a potentially important new technology, but its impact on the economy depends on the speed and intensity of adoption. This paper reports results from a series of nationally representative U.S. surveys of genAI use at work and at home. As of late 2024, 45% of the U.S. population age 18–64 uses genAI. Among employed respondents, 27% used genAI for work at least once in the previous week: 10% used it every workday and 17% on some but not all workdays. Relative to each technology’s first mass-market product launch, work adoption of genAI has been faster than the personal computer (PC), and overall adoption has outpaced both PCs and the internet by an even wider margin. Between 1% and 7% of all work hours are currently assisted by genAI, and respondents report time savings equivalent to 1.4% of total work hours. Potential productivity gains vary widely by industry, and firm climate and policies play an important role in adoption patterns.\n                  This paper was accepted by Alfonso Gambardello, business strategy.\n                  Funding: This work was supported by the Walmart Foundation [Grant 252882].\n                  Supplemental Material: The online appendix and data files are available at https://doi.org/10.1287/mnsc.2025.02523 .", "url": "https://pubsonline.informs.org/doi/abs/10.1287/mnsc.2025.02523", "year": 2026, "authors": "A Bick", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 397, "title": "Barriersto and opportunities for theadoptionofgenerative artificial intelligencein higher education in the global south: Insights from Sri Lanka", "score": 7, "status": "ACEPTADO", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Numerous studies have explored the intricacies of artificial intelligence (AI) in higher education, predominantly focusing on developed countries. However, there is a notable gap in examining the hindrances and untapped potential of AI implementation in the higher education sector within the South Asian Global South countries. This study aims to identify the barriers to integrating generative artificial intelligence (GenAI) in higher education and explore potential opportunities, with a specific focus on Sri Lanka as the country setting. Using a case study approach, data were gathered from various sources, including interviews and document analysis, concentrating on the largest management faculty in the country. The impediments were analyzed using an extended innovation barriers framework, covering technological, commercial, organizational, societal, and personal challenges. The findings highlight a landscape replete with obstacles. Key among them are the absence of comprehensive policies and guidelines at the university level, uncertainty about the reliability of information provided by GenAI tools, overreliance on these tools by learners, a lack of understanding and expertise among academics, and resistance to embracing technological advancements. Nonetheless, the study identifies several remedial actions that could be adopted to harness the potential of GenAI tools, particularly in South Asian Global South countries such as Sri Lanka.", "url": "https://link.springer.com/article/10.1007/s40593-024-00439-5", "year": 2026, "authors": "A Henadirage", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 398, "title": "Learning toadopt generative AI", "score": 7, "status": "ACEPTADO", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Recent advancements in generative AI, such as ChatGPT, have dramatically transformed how people access information. Despite its powerful capabilities, the benefits it provides may not be equally distributed among individuals, a phenomenon referred to as the digital divide. Building upon prior literature, we propose two forms of digital divide in the generative AI adoption process: (i) the learning divide, capturing individuals' heterogeneous abilities to update their perceived utility of ChatGPT; and (ii) the utility divide, representing differences in individuals' actual utility derived from per use of ChatGPT. To evaluate these two divides, we develop a Bayesian learning model that incorporates heterogeneities in both the utility and signal functions. Leveraging a large-scale clickstream dataset, we estimate the model and find significant learning and utility divides across various social characteristics. Interestingly, individuals without any college education, non-white individuals, and those with lower English literacy derive larger utility gains from ChatGPT, yet update their beliefs about its utility at a slower rate. Furthermore, males, younger individuals, and those in occupations with greater exposure to generative AI not only obtain higher utility per use from ChatGPT but also learn about its utility more rapidly. Besides, we document a phenomenon termed the belief trap, wherein users underestimate ChatGPT's utility, opt not to use the tool, and thereby lack new experiences to update their perceptions, leading to continued underutilization. Our simulation further demonstrates that the learning divide can significantly affect the probability of falling into the belief trap, another form of the digital divide in adoption outcomes (i.e., outcome divide); however, offering training programs can alleviate the belief trap and mitigate the divide.", "url": "https://arxiv.org/abs/2410.19806", "year": 2026, "authors": "L Ma", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 399, "title": "Understanding acceptance and resistance towardgenerative AItechnologies: a multi-theoretical framework integrating functional, risk, and sociolegal factors", "score": 5, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "This study explores the factors influencing college students’ acceptance and resistance toward generative AI technologies by integrating three theoretical fr...", "url": "https://www.frontiersin.org/journals/artificial-intelligence/articles/10.3389/frai.2025.1565927/full", "year": 2025, "authors": "P Shrivastava - Frontiers in", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0} l": "https://www.mdpi.com/2071-1050/15/8/6540", "year": 2026, "authors": "SF Ahmad", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 410, "title": "Artificial intelligence adoptionin the post COVID-19 new-normal and role of smarttechnologiesin transforming business: a review", "score": 2, "status": "RECHAZADO", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "", "url": "https://www.emerald.com/jstpm/article/15/3/506/1222172", "year": 2026, "authors": "P Agarwal", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 411, "title": "Artificial intelligence adoptionamong human resource professionals: Does market turbulence play a role?", "score": 6, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "AbstractDrawing from the Technology Acceptance Model (TAM) and Technology‐Organization‐Environment (TOE) framework, this study investigates the factors that influence the adoption of artificial intelligence (AI) among human resource (HR) professionals in the tourism organizations of Malaysia. Responses were collected from 389 HR employees working at tourism organizations. Based on a partial least squares‐structural equation modeling (PLS‐SEM) analysis, results revealed that perceived ease of use, perceived usefulness, technology competency, top management support, and competitive pressure have significantly positive impacts on AI adoption in the tourism industry in Malaysia. The study's contribution to the TAM and TOE models is the inclusion of market turbulence as a moderating factor, which has been found to be a significant moderator as it enhances the understanding of HR practitioners and others regarding the factors that are most influential in AI adoption among HR employees in the tourism industry. The model developed in this study highlights how market turbulence can foster the relationship between AI adoption and organizations. In addition to the managerial and theoretical implications, the study also discusses its limitations and outlines directions for future research.", "url": "https://onlinelibrary.wiley.com/doi/abs/10.1002/joe.22226", "year": 2026, "authors": "MA Islam", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 412, "title": "TheAItransformation of product innovation", "score": 1, "status": "RECHAZADO", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "", "url": "https://www.sciencedirect.com/science/article/pii/S0019850124000464", "year": 2026, "authors": "RG Cooper - Industrial Marketing Management, 2024 - Elsevier", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": false}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 413, "title": "Adoptionofartificial intelligencein financial services: a policy framework", "score": 4, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "", "url": "https://www.emerald.com/jstpm/article/15/2/396/1216079", "year": 2026, "authors": "B Kumari", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión tempor option", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 415, "title": "The rapidadoptionof generativeAI", "score": 5, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Generative artificial intelligence (genAI) is a potentially important new technology, but its impact on the economy depends on the speed and intensity of adoption. This paper reports results from a series of nationally representative U.S. surveys of genAI use at work and at home. As of late 2024, 45% of the U.S. population age 18–64 uses genAI. Among employed respondents, 27% used genAI for work at least once in the previous week: 10% used it every workday and 17% on some but not all workdays. Relative to each technology’s first mass-market product launch, work adoption of genAI has been faster than the personal computer (PC), and overall adoption has outpaced both PCs and the internet by an even wider margin. Between 1% and 7% of all work hours are currently assisted by genAI, and respondents report time savings equivalent to 1.4% of total work hours. Potential productivity gains vary widely by industry, and firm climate and policies play an important role in adoption patterns.\n                  This paper was accepted by Alfonso Gambardello, business strategy.\n                  Funding: This work was supported by the Walmart Foundation [Grant 252882].\n                  Supplemental Material: The online appendix and data files are available at https://doi.org/10.1287/mnsc.2025.02523 .", "url": "https://pubsonline.informs.org/doi/abs/10.1287/mnsc.2025.02523", "year": 2026, "a let currentFilter = 'all';
let currentId = null;
let filteredIds = [];
let decisions = {};

// Load saved decisions from localStorage
function loadDecisions() {
  const saved = localStorage.getItem('bid_ia_decisions');
  if (saved) decisions = JSON.parse(saved);
}

function saveDecisions() {
  localStorage.setItem('bid_ia_decisions', JSON.stringify(decisions));
}

function init() {
  loadDecisions();
  renderList();
  updateStats();
}

function renderList() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('paper-list');
  
  filteredIds = PAPERS
    .filter(p => {
      if (search && !p.title.toLowerCase().includes(search) && !p.authors.toLowerCase().includes(search)) return false;
      const dec = decisions[p.id];
      if (currentFilter === 'all') return true;
      if (currentFilter === 'pending') return !dec;
      if (currentFilter === 'manual_accept') return dec === 'ACEPTADO';
      if (currentFilter === 'manual_reject') return dec === 'RECHAZADO';
      if (currentFilter === 'ACEPTADO' || currentFilter === 'REVISAR') return p.status === currentFilter;
      return p.pocket === currentFilter;
    })
    .map(p => p.id);

  list.innerHTML = filteredIds.map(id => {
    const p = PAPERS[id];
    const dec = decisions[id];
    const scoreColor = p.score >= 7 ? '#22c55e' : p.score >= 5 ? '#f97316' : '#64748b';
    const itemClass = id === currentId ? 'selected' : dec === 'ACEPTADO' ? 'decided-accept' : dec === 'RECHAZADO' ? 'decided-reject' : '';
    const decIcon = dec === 'ACEPTADO' ? '✅ ' : dec === 'RECHAZADO' ? '❌ ' : '';
    return `<div class="paper-item ${itemClass}" onclick="selectPaper(${id})" data-id="${id}">
      <div class="paper-title-small">${decIcon}${p.title.substring(0,80)}${p.title.length>80?'...':''}</div>
      <div class="paper-meta-small">
        <span style="color:${p.pocket_color};font-size:10px">${p.pocket_label.substring(0,10)}</span>
        <span class="score-badge" style="background:${scoreColor}22;color:${scoreColor}">${p.score}</span>
        <span style="font-size:10px">${p.year||''}</span>
      </div>
    </div>`;
  }).join('');
  
  document.getElementById('nav-counter').textContent = `${filteredIds.length} papers`;
}

function selectPaper(id) {
  currentId = id;
  const posInFiltered = filteredIds.indexOf(id);
  document.getElementById('btn-prev').disabled = posInFiltered <= 0;
  document.getElementById('btn-next').disabled = posInFiltered >= filteredIds.length - 1;
  document.getElementById('nav-counter').textContent = `${posInFiltered+1} / ${filteredIds.length}`;
  
  // Update sidebar selection
  document.querySelectorAll('.paper-item').forEach(el => el.classList.remove('selected'));
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) { el.classList.add('selected'); el.scrollIntoView({block:'nearest'}); }
  
  renderDetail(id);
  updateProgress();
}

function navigate(dir) {
  const pos = filteredIds.indexOf(currentId);
  const newPos = pos + dir;
  if (newPos >= 0 && newPos < filteredIds.length) selectPaper(filteredIds[newPos]);
}

function renderDetail(id) {
  const p = PAPERS[id];
  const dec = decisions[id] || '';
  const note = (decisions[id + '_note']) || '';
  const bd = p.breakdown || {};
  
  const scoreColor = p.score >= 7 ? '#22c55e' : p.score >= 5 ? '#f97316' : '#64748b';
  
  const abstractHtml = p.abstract
    ? `<div class="abstract-text">${p.abstract}</div>`
    : `<div class="no-abstract">⚠️ Abstract no disponible — el scoring automático se basó solo en el título.<br><br>
       ${p.url ? `<a class="btn-link" href="${p.url}" target="_blank">↗ Abrir paper original</a>` : '<em>Sin URL disponible</em>'}
       </div>`;
  
  const breakdownCells = [
    ['Metodología', bd.methodology, 4],
    ['Causalidad', bd.causalidity, 2],
    ['Top-Tier', bd.top_tier, 2],
    ['Novedad', bd.novelty, 1],
    ['Relevancia', bd.relevance, 2],
  ].map(([name, val, max]) => {
    const c = val >= max*0.7 ? '#22c55e' : val > 0 ? '#f59e0b' : val < 0 ? '#ef4444' : '#475569';
    return `<div class="score-cell">
      <div class="score-cell-val" style="color:${c}">${val}</div>
      <div class="score-cell-lbl">${name}</div>
      <div class="score-cell-max">/${max}</div>
    </div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="paper-detail">
      <div class="paper-detail-header">
        <div class="paper-title-full">${p.title}</div>
        <div class="paper-tags">
          <span class="tag" style="background:${p.pocket_color}22;color:${p.pocket_color}">${p.pocket_label}</span>
          <span class="tag" style="background:${scoreColor}22;color:${scoreColor}">Score: ${p.score}/11</span>
          <span class="tag" style="background:#33415544;color:#94a3b8">${p.status}</span>
          ${dec ? `<span class="tag" style="background:${dec==='ACEPTADO'?'#16a34a':'#dc2626'}44;color:${dec==='ACEPTADO'?'#22c55e':'#ef4444'}">★ Manual: ${dec}</span>` : ''}
        </div>
        <div class="paper-info-row">
          ${p.authors ? `<span>👤 ${p.authors}</span>` : ''}
          ${p.year ? `<span>📅 ${p.year}</span>` : ''}
          ${p.venue ? `<span>📰 ${p.venue}</span>` : ''}
          ${p.citations ? `<span>📊 ${p.citations} citas</span>` : ''}
          ${p.url ? `<a class="btn-link" href="${p.url}" target="_blank">↗ Ver paper</a>` : '<span style="color:#3a5a80;font-size:12px">Sin URL</span>'}
        </div>
      </div>
      
      <div class="abstract-section">
        <div class="section-label">Abstract</div>
        ${abstractHtml}
      </div>
      
      <div class="score-section">
        <div class="section-label">Score automático: ${p.score}/11 — ${p.status}</div>
        <div class="score-grid">${breakdownCells}</div>
        <p style="font-size:11px;color:#475569;margin-top:10px">
          Scores calculados automáticamente. Tu decisión manual override al score automático.
        </p>
      </div>

      ${p.criteria && p.criteria.length ? `
      <div class="criteria-section">
        <div class="section-label">Requisitos de aceptación — ${p.pocket_label}</div>
        <div class="criteria-grid">
          ${p.criteria.map(c => `
            <div class="criteria-item ${c.met ? 'met' : 'unmet'}">
              <span class="criteria-icon">${c.met ? '✅' : '❌'}</span>
              <div class="criteria-text"><strong>${c.desc}</strong></div>
            </div>
          `).join('')}
        </div>
        <p style="font-size:11px;color:#475569;margin-top:8px">
          ${p.criteria.filter(c=>c.met).length}/${p.criteria.length} criterios cumplidos. Basado en texto del abstract/título.
        </p>
      </div>` : ''}

      <div class="decision-section">
        <div class="section-label">Tu decisión manual</div>
        <div class="decision-btns">
          <button class="btn-accept ${dec==='ACEPTADO'?'active':''}" onclick="decide(${id},'ACEPTADO')">✅ Aceptar</button>
          <button class="btn-reject ${dec==='RECHAZADO'?'active':''}" onclick="decide(${id},'RECHAZADO')">❌ Rechazar</button>
          <button class="btn-pending ${!dec?'active':''}" onclick="decide(${id},'')">⏳ Pendiente</button>
        </div>
        <div class="section-label" style="margin-top:12px">Notas (opcional)</div>
        <textarea class="note-input" id="note-${id}" placeholder="Por qué aceptas/rechazas, qué nivel analiza (tarea/trabajador/equipo/firma), metodología, gap que cubre...">${note}</textarea>
        <div style="display:flex;align-items:center">
          <button class="save-btn" onclick="saveNote(${id})">Guardar nota</button>
          <span class="save-confirm" id="save-confirm-${id}">✅ Guardado</span>
        </div>
      </div>
    </div>`;
}

function decide(id, decision) {
  decisions[id] = decision;
  saveDecisions();
  renderDetail(id);
  renderList();
  updateStats();
  // Auto-advance to next paper if decision made
  if (decision) {
    setTimeout(() => navigate(1), 400);
  }
}

function saveNote(id) {
  const note = document.getElementById(`note-${id}`).value;
  decisions[id + '_note'] = note;
  saveDecisions();
  const confirm = document.getElementById(`save-confirm-${id}`);
  confirm.style.display = 'inline';
  setTimeout(() => confirm.style.display = 'none', 2000);
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function filterPapers() { renderList(); }

function updateStats() {
  const accepted = Object.values(decisions).filter(d => d === 'ACEPTADO').length;
  const rejected = Object.values(decisions).filter(d => d === 'RECHAZADO').length;
  const pending = PAPERS.length - accepted - rejected;
  document.getElementById('stat-accepted').textContent = `✅ ${accepted} aceptados`;
  document.getElementById('stat-pending').textContent = `⏳ ${pending} pendientes`;
  document.getElementById('stat-rejected').textContent = `❌ ${rejected} rechazados`;
  document.getElementById('stat-total').textContent = `${PAPERS.length} total`;
}

function updateProgress() {
  const decided = Object.keys(decisions).filter(k => !k.includes('_note') && decisions[k]).length;
  const pct = (decided / PAPERS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function exportJSON() {
  const result = PAPERS.map(p => ({
    ...p,
    manual_decision: decisions[p.id] || '',
    manual_note: decisions[p.id + '_note'] || '',
  }));
  download('bid_ia_reviewed.json', JSON.stringify(result, null, 2));
}

function exportCSV() {
  const rows = [['ID','Title','Pocket','Score','Auto Status','Manual Decision','Note','URL','Year','Authors']];
  PAPERS.forEach(p => rows.push([
    p.id, `"${p.title.replace(/"/g,'""')}"`, p.pocket_label, p.score,
    p.status, decisions[p.id]||'', `"${(decisions[p.id+'_note']||'').replace(/"/g,'""')}"`,
    p.url, p.year, `"${p.authors}"`
  ]));
  download('bid_ia_reviewed.csv', rows.map(r => r.join(',')).join(String.fromCharCode(10)));
}

function exportAccepted() {
  const accepted = PAPERS.filter(p => decisions[p.id] === 'ACEPTADO' || (!decisions[p.id] && p.status === 'ACEPTADO'));
  download('bid_ia_accepted.json', JSON.stringify(accepted, null, 2));
}

function download(filename, content) {
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(content);
  a.download = filename;
  a.click();
  document.getElementById('export-msg').style.display = 'inline';
  setTimeout(() => document.getElementById('export-msg').style.display = 'none', 2000);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'j') navigate(1);
  if (e.key === 'ArrowLeft' || e.key === 'k') navigate(-1);
  if (e.key === 'a' || e.key === 'A') currentId !== null && decide(currentId, 'ACEPTADO');
  if (e.key === 'r' || e.key === 'R') currentId !== null && decide(currentId, 'RECHAZADO');
  if (e.key === 'p' || e.key === 'P') currentId !== null && decide(currentId, '');
});

init();
// Select first paper automatically
if (PAPERS.length > 0) setTimeout(() => selectPaper(filteredIds[0]), 100);
</script>
</body>
</html>
