l": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Diabetic retinopathy can be prevented with screening and early detection. We hypothesized that autonomous artificial intelligence (AI) diabetic eye exams at the point-of-care would increase diabetic eye exam completion rates in a racially and ethnically diverse youth population. AI for Children’s diabetiC Eye ExamS (NCT05131451) is a parallel randomized controlled trial that randomized youth (ages 8-21 years) with type 1 and type 2 diabetes to intervention (autonomous artificial intelligence diabetic eye exam at the point of care), or control (scripted eye care provider referral and education) in an academic pediatric diabetes center. The primary outcome was diabetic eye exam completion rate within 6 months. The secondary outcome was the proportion of participants who completed follow-through with an eye care provider if deemed appropriate. Diabetic eye exam completion rate was significantly higher (100%, 95%CI: 95.5%, 100%) in the intervention group ( n = 81) than the control group ( n = 83) (22%, 95%CI: 14.2%, 32.4%)(p < 0.001). In the intervention arm, 25/81 participants had an abnormal result, of whom 64% (16/25) completed follow-through with an eye care provider, compared to 22% in the control arm (p < 0.001). Autonomous AI increases diabetic eye exam completion rates in youth with diabetes.", "url": "https://www.nature.com/articles/s41467-023-44676-z", "year": 2026, "authors": "RM Wolf", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 140, "title": "Measuring the impact of early-2025AIon experienced open-source developerproductivity", "score": 9, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Despite widespread adoption, the impact of AI tools on software development in the wild remains understudied. We conduct a randomized controlled trial (RCT) to understand how AI tools at the February-June 2025 frontier affect the productivity of experienced open-source developers. 16 developers with moderate AI experience complete 246 tasks in mature projects on which they have an average of 5 years of prior experience. Each task is randomly assigned to allow or disallow usage of early 2025 AI tools. When AI tools are allowed, developers primarily use Cursor Pro, a popular code editor, and Claude 3.5/3.7 Sonnet. Before starting tasks, developers forecast that allowing AI will reduce completion time by 24%. After completing the study, developers estimate that allowing AI reduced completion time by 20%. Surprisingly, we find that allowing AI actually increases completion time by 19%--AI tooling slowed developers down. This slowdown also contradicts predictions from experts in economics (39% shorter) and ML (38% shorter). To understand this result, we collect and evaluate evidence for 20 properties of our setting that a priori could contribute to the observed slowdown effect--for example, the size and quality standards of projects, or prior developer experience with AI tooling. Although the influence of experimental artifacts cannot be entirely ruled out, the robustness of the slowdown effect across our analyses suggests it is unlikely to primarily be a function of our experimental design.", "url": "https://arxiv.org/abs/2507.09089", "year": 2026, "authors": "J Becker", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 141, "title": "The impact of artificial intelligence onproductivity, distribution and growth", "score": 4, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "", "url": "https://iris.luiss.it/handle/11385/240418", "year": 2026, "authors": "F Filippucci", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 142, "title": "Human-AICollaborative Diagnostics: MeasuringProductivity, Accuracy, andClinicalDecision Confidence", "score": 4, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "", "url": "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=6200098", "year": 2026, "authors": "H Raposo", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 143, "title": "The effects of generativeAIon high-skilled work: Evidence from three field experiments with software developers", "score": 9, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "This study evaluates the effect of generative artificial intelligence (AI) on software developer productivity via randomized controlled trials at Microsoft, Accenture, and an anonymous Fortune 100 company. These field experiments, run by the companies as part of their ordinary course of business, provided a random subset of developers with access to an AI-based coding assistant suggesting intelligent code completions. Although each experiment is noisy and results vary across experiments, when data are combined across three experiments and 4,867 developers, our analysis reveals a 26.08% increase (standard error: 10.3%) in completed tasks among developers using the AI tool. Notably, less experienced developers had higher adoption rates and greater productivity gains.\n                  This paper was accepted by Jean-Pierre Dube, marketing.\n                  Funding: M. Demirer and T. Salz thank the MIT GenAI Initiative for funding.\n                  Supplemental Material: The online appendices and data files are available at https://doi.org/10.1287/mnsc.2025.00535 .", "url": "https://pubsonline.informs.org/doi/abs/10.1287/mnsc.2025.00535", "year": 2026, "authors": "KZ Cui", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 144, "title": "AIandProductivityin Europe", "score": 4, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "", "url": "https://books.google.com/books?hl=en&lr=&id=UKxUEQAAQBAJ&oi=fnd&pg=PA3&dq=randomized+controlled+trial+AI+productivity&ots=-wh2lvU0S3&sig=g-Nf2B9kXg3KRRU0UsBOTZg9g18", "year": 2026, "authors": "F Misch, B Park,", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 145, "title": "Effectiveness of mycophenolate mofetil among patients with progressive IgA nephropathy: arandomized clinical trial", "score": 3, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "", "url": "https://jamanetwork.com/journals/jamanetworkopen/article-abstract/2800997", "year": 2026, "authors": "FF Hou, D Xie,", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": false}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 146, "title": "Save", "score": 4, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Default options can lead to striking differences in preferences, with significant economic impact. The\n authors\n of this Policy Forum use natural and experimental data to examine the impact of simple policy defaults on the decision to become an organ donor, finding large effects that significantly increase donation rates.", "url": "javascript:void(0)", "year": 2026, "authors": "TV Kumar - 2024", "venue": "", "citations": 1986, "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": false}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 147, "title": "Howaiand human behaviors shape psychosocial effects of extended chatbot use: A longitudinalrandomized controlled study", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "As people increasingly seek emotional support and companionship from AI chatbots, understanding how such interactions impact mental well-being becomes critical. We conducted a four-week randomized controlled experiment (n=981, >300k messages) to investigate how interaction modes (text, neutral voice, and engaging voice) and conversation types (open-ended, non-personal, and personal) influence four psychosocial outcomes: loneliness, social interaction with real people, emotional dependence on AI, and problematic AI usage. No significant effects were detected from experimental conditions, despite conversation analyses revealing differences in AI and human behavioral patterns across the conditions. Instead, participants who voluntarily used the chatbot more, regardless of assigned condition, showed consistently worse outcomes. Individuals' characteristics, such as higher trust and social attraction towards the AI chatbot, are associated with higher emotional dependence and problematic use. These findings raise deeper questions about how artificial companions may reshape the ways people seek, sustain, and substitute human connections.", "url": "https://arxiv.org/abs/2503.17473", "year": 2026, "authors": "CM Fang", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 148, "title": "HowAIimpacts skill formation", "score": 9, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "AI assistance produces significant productivity gains across professional domains, particularly for novice workers. Yet how this assistance affects the development of skills required to effectively supervise AI remains unclear. Novice workers who rely heavily on AI to complete unfamiliar tasks may compromise their own skill acquisition in the process. We conduct randomized experiments to study how developers gained mastery of a new asynchronous programming library with and without the assistance of AI. We find that AI use impairs conceptual understanding, code reading, and debugging abilities, without delivering significant efficiency gains on average. Participants who fully delegated coding tasks showed some productivity improvements, but at the cost of learning the library. We identify six distinct AI interaction patterns, three of which involve cognitive engagement and preserve learning outcomes even when participants receive AI assistance. Our findings suggest that AI-enhanced productivity is not a shortcut to competence and AI assistance should be carefully adopted into workflows to preserve skill formation -- particularly in safety-critical domains.", "url": "https://arxiv.org/abs/2601.20245", "year": 2026, "authors": "JH Shen", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 149, "title": "Ai-powered lawyering:Aireasoning models, retrieval augmented generation, and the future of legal practice", "score": 9, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Generative AI is set to transform the legal profession, though its most promising uses and ultimate effects are still unclear. While AI models like GPT-4 improve efficiency, they can also “hallucinate” and may undermine legal judgment, particularly in complex tasks typically handled by skilled lawyers. This article examines two emerging AI innovations that may mitigate these concerns: Retrieval Augmented Generation (RAG), which grounds AI-powered analysis in legal sources, and AI reasoning models, which structure complex reasoning before generating output. We conduct the first randomized controlled trial assessing these technologies, assigning upper-level law students to complete legal tasks using a RAG-powered legal AI tool (Vincent AI, 2024), an AI reasoning model (OpenAI’s o1-preview), or no AI. We find that both AI tools significantly enhance legal work quality, a marked contrast with previous research examining older large language models like GPT-4. Moreover, these newer models appear to maintain the efficiency benefits associated with older AI technologies. Our findings also show that these AI tools significantly boost productivity in five out of six tested legal tasks, with statistically significant gains of anywhere from 50% to 130%. They perform exceptionally well in complex tasks like drafting persuasive letters and analyzing complaints. Notably, o1-preview improves the analytical depth of work product and Vincent AI avoids introducing more hallucinations, suggesting that integrating domain-specific RAG capabilities with reasoning models could yield even larger improvements.", "url": "https://journals.sagepub.com/doi/abs/10.1177/2755323X261427048", "year": 2026, "authors": "D Schwarcz", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 150, "title": "Dear Diary: Arandomized controlled trialofGenerative AIcoding tools in theworkplace", "score": 9, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Generative AI coding tools are relatively new and their impact on developers extends beyond traditional coding metrics, influencing beliefs about work and devel", "url": "https://ieeexplore.ieee.org/abstract/document/11121735/", "year": 2026, "authors": "J Butler", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 151, "title": "Generative AITransformed My Work: Decoding Its Direct and Mediated Effects on Work Engagement Among Knowledge Workers", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "", "url": "https://search.proquest.com/openview/177d6fc3cf63b17f1286c961676dd23f/1?pq-origsite=gscholar&cbl=18750&diss=y", "year": 2026, "authors": "J Yuan - 2025 - search.proquest.com", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 152, "title": "Arandomized controlled trialon evaluating clinician-supervisedgenerative AIfor decision support", "score": 9, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "", "url": "https://www.sciencedirect.com/science/article/pii/S1386505624003642", "year": 2026, "authors": "RE Harari", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 153, "title": "AIfeedback andworkplacesocial support in enhancing occupational self-efficacy: arandomized controlled trialin Japan", "score": 9, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "As AI is expected to take on the role of providing workplace feedback to employees in the future, understanding how AI and humans can complement effectively in this context is crucial. This study explores this through a randomized controlled experiment testing the feedback effectiveness of two different Chat-GPT-based AI chatbots—one that delivers positive feedback focused on individual strengths ( n = 54) and the other that provides negative feedback aimed at areas for improvement ( n = 48). Japanese office workers, including freelancers, participated in this study. We conducted mixed-effects model analysis to assess whether the effects of these AI chatbots on occupational self-efficacy are moderated by the level of social support from supervisors and colleagues. The results showed that positive feedback from the AI chatbots significantly enhanced occupational self-efficacy. Furthermore, negative feedback also boosted self-efficacy, but only when employees perceived a high level of emotional support from their supervisors and colleagues. These findings point to effective ways of integrating AI into the workplace, where humans and AI can assume complementary roles in employee development.", "url": "https://www.nature.com/articles/s41598-025-94985-0", "year": 2026, "authors": "Y Watanabe", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 154, "title": "ChatGPT and Beyond: Exploring the Responsible Use ofGenerative AIin theWorkplace: M. Söllner et al.", "score": 4, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "", "url": "https://link.springer.com/article/10.1007/s12599-025-00932-8", "year": 2026, "authors": "M Söllner", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 155, "title": "The Meta-RCTApproach to MeasuringAI'sLabor Market Impact", "score": 8, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "", "url": "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5486566", "year": 2026, "authors": "K Gulati", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 156, "title": "Using a random controlled trial to explore the impact ofAI-enabled learning", "score": 4, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Much is being made of AI’s role in learning. However, there have been few studies that evaluate AI’s ability to make learning more efficient or more effective and specifically the learner’s willingness to embrace and use AI-enabled learning tools over conventional learning methodologies. Working with a manufacturing company, we used a randomized control trial approach (matching pairs) to present two groups of employees with a course on design thinking, one presented via a traditional learning management system (LMS Group) and other through an AI enabled tool (AI Group), with the content being identical in order to compare completion rates, time to completion, learning outcomes (subject matter knowledge retained) and the learner’s perceptions of value and experience. We also were able to compare the AI enabled version of the course to the same version with the addition of a face-to-face instructional component. While we found that those participants in the AI Group completed the course in a shorter period of time, had better learning outcomes and expressed higher perceptions of course value, the AI Group significantly underperformed the LMS Group in terms of course commencement and completion rates. Our finding suggest that the adoption of AI enabled learning tools may follow similar patterns of adoption rates of new technologies -- and require educating learners regarding the use, benefits, value and limitations of new AI enabled tools before widespread acceptance and usage.", "url": "https://search.proquest.com/openview/ee8c5e8eb777980ff094703c5ddde5a3/1?pq-origsite=gscholar&cbl=4425142", "year": 2026, "authors": "D Lynch, M DeGenarro - International Journal of Advanced …, 2024 - search.proquest.com", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 157, "title": "Approaches for the use ofAIinworkplacehealth promotion and prevention: systematic scoping review", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Background: Artificial intelligence (AI) is an umbrella term for various algorithms and rapidly emerging technologies with huge potential for workplace health promotion and prevention (WHPP). WHPP interventions aim to improve people’s health and well-being through behavioral and organizational measures or by minimizing the burden of workplace-related diseases and associated risk factors. While AI has been the focus of research in other health-related fields, such as public health or biomedicine, the transition of AI into WHPP research has yet to be systematically investigated. Objective: The systematic scoping review aims to comprehensively assess an overview of the current use of AI in WHPP. The results will be then used to point to future research directions. The following research questions were derived: (1) What are the study characteristics of studies on AI algorithms and technologies in the context of WHPP? (2) What specific WHPP fields (prevention, behavioral, and organizational approaches) were addressed by the AI algorithms and technologies? (3) What kind of interventions lead to which outcomes? Methods: A systematic scoping literature review (PRISMA-ScR [Preferred Reporting Items for Systematic Reviews and Meta-Analyses extension for Scoping Reviews]) was conducted in the 3 academic databases PubMed, Institute of Electrical and Electronics Engineers, and Association for Computing Machinery in July 2023, searching for papers published between January 2000 and December 2023. Studies needed to be (1) peer-reviewed, (2) written in English, and (3) focused on any AI-based algorithm or technology that (4) were conducted in the context of WHPP or (5) an associated field. Information on study design, AI algorithms and technologies, WHPP fields, and the patient or population, intervention, comparison, and outcomes framework were extracted blindly with Rayyan and summarized. Results: A total of 10 studies were included. Risk prevention and modeling were the most identified WHPP fields (n=6), followed by behavioral health promotion (n=4) and organizational health promotion (n=1). Further, 4 studies focused on mental health. Most AI algorithms were machine learning-based, and 3 studies used combined deep learning algorithms. AI algorithms and technologies were primarily implemented in smartphone apps (eg, in the form of a chatbot) or used the smartphone as a data source (eg, Global Positioning System). Behavioral approaches ranged from 8 to 12 weeks and were compared to control groups. Additionally, 3 studies evaluated the robustness and accuracy of an AI model or framework. Conclusions: Although AI has caught increasing attention in health-related research, the review reveals that AI in WHPP is marginally investigated. Our results indicate that AI is promising for individualization and risk prediction in WHPP, but current research does not cover the scope of WHPP. Beyond that, future research will profit from an extended range of research in all fields of WHPP, longitudinal data, and reporting guidelines. Trial Registration: OSF Registries osf.io/hsu2w; https://osf.io/hsu2w/", "url": "https://ai.jmir.org/2024/1/e53506/", "year": 2026, "authors": "M Lange, A Löwe,", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 158, "title": "DoesGenerative AINarrow Education-Based Productivity Gaps? Evidence from a Randomized Experiment", "score": 9, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Does generative artificial intelligence (AI) reinforce or reduce productivity differences across workers? Existing evidence largely studies AI within firms and occupations, where organizational selection compresses educational heterogeneity, leaving unclear whether AI narrows productivity gaps across individuals with substantially different levels of formal education. We address this question using a randomized online experiment conducted outside firms, in which 1,174 adults aged 25–45 with heterogeneous educational backgrounds complete an incentivized, workplace-style business problem-solving task. The task is a general (not domain-specific) exercise, and participants perform it either with or without access to a generative-AI assistant. Unlike prior work that studies heterogeneity within relatively homogeneous worker samples, our design targets the between–education-group productivity gap as the primary estimand. We find that AI increases productivity for all participants, with substantially larger gains for lower-education individuals. In the absence of AI access, higher-education participants outperform lower-education participants by 0.548 standard deviations; with AI access, this gap falls to 0.139 standard deviations, implying that generative AI closes three-quarters of the initial productivity gap. We interpret this pattern as evidence that generative AI narrows effective productivity differences in task execution by relaxing constraints that are more binding for lower-education individuals, even though underlying skill differences remain, as reflected in persistent education gaps in task performance and in a follow-up exercise without AI assistance.", "url": "https://www.nber.org/papers/w34851", "year": 2026, "authors": "G Cruces", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 159, "title": "Whengenerative AImeetsworkplacelearning: Creating a realistic & motivating learning experience with agenerativePCA", "score": 9, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Workplace learning is used to train employees systematically, e.g., via e-learning or in 1:1 training. However, this is often deemed ineffective and costly. Whereas pure e-learning lacks the possibility of conversational exercise and personal contact, 1:1 training with human instructors involves a high level of personnel and organizational costs. Hence, pedagogical conversational agents (PCAs), based on generative AI, seem to compensate for the disadvantages of both forms. Following Action Design Research, this paper describes an organizational communication training with a Generative PCA (GenPCA). The evaluation shows promising results: the agent was perceived positively among employees and contributed to an improvement in self-determined learning. However, the integration of such agent comes not without limitations. We conclude with suggestions concerning the didactical methods, which are supported by a GenPCA, and possible improvements of such an agent for workplace learning.", "url": "https://arxiv.org/abs/2405.15561", "year": 2026, "authors": "A Bucher", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 160, "title": "Enhancing work engagement throughgenerative AIconversations: a controlled trial on the positive and negative feedback in high vs. Low relational mobility …", "score": 9, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "In light of the rapid advancement of generative AI technologies, exemplified by ChatGPT, there is growing interest in AI systems’ potential to complement, supplement, or replace traditional human managerial roles of providing work feedback to employees. This study investigated the impact of AI-driven chatbots as feedback providers on Work Engagement under varying conditions of Relational Mobility—flexibility to develop new relationships with others. Using a randomized controlled trial design, participants engaged in work-reflection sessions with ChatGPT-based chatbots programmed to provide either positive feedback (focusing on strengths) or negative feedback (focusing on improvements). The experiment recruited Japanese employees, including freelancers, with 54 participants assigned to the positive-feedback group and 48 to the negative-feedback group. The subsequent impact on Work Engagement levels was assessed with different degrees of Relational Mobility using mixed effect model analysis with R software. In environments characterized by low Relational Mobility (workplaces with fixed business relationships and limited opportunities for new relations), positive feedback from AI chatbots significantly enhanced Work Engagement. However, negative feedback showed no significant effect in either low or high Relational Mobility environments (workplaces with frequent job changes and abundant opportunities for new connections). AI-driven feedback systems demonstrate potential for improving Work Engagement under specific circumstances, even when substituting human managerial feedback. However, the findings contradict existing cultural psychology theories, which suggest negative feedback is more effective in low Relational Mobility environments. This discrepancy highlights the necessity for further research to elucidate the mechanisms by which AI-driven feedback systems enhance Work Engagement.", "url": "https://link.springer.com/article/10.1007/s12144-025-08129-8", "year": 2026, "authors": "Y Watanabe", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 161, "title": "Generative AIand Software Developer Productivity-A Pilot Case Study at a Finnish Technology Consultancy", "score": 9, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "This thesis examines the causal impact of generative AI tools on software developer productivity through a pilot randomized field experiment. As organizations rapidly adopt these technologies despite limited causal evidence, understanding their productivity effects becomes critical for informed investment decisions. Using a three-arm randomized controlled trial with 25 professional developers across 130 task observations at a Finnish technology consultancy, I study whether access to generative AI tools affects development speed and code quality, and whether structured training on using the tools moderates these effects. Developers given GenAI access finish standardized tasks 40.2 percent faster and write 26.2 percent higher quality code according to an expert judge, though wide confidence intervals reflect limited statistical precision from the small sample. Lee (2009) bounds suggest these effects persist under extreme selection assumptions, despite high differential attrition between the treatment groups. Additionally, structured training appears to amplify quality improvements, whereas time savings emerge even from access alone, hinting at complementarities between technology and human-capital investments. This pilot study demonstrates the feasibility of randomized field experiments for evaluating workplace AI tools while highlighting critical methodological challenges. The 35.9 percent overall attrition rate and post-hoc power of only 25 percent for time effects and 19 percent for quality improvements underscore the need for larger samples in future research. Results provide suggestive evidence that generative AI tools may enhance developer productivity, particularly when coupled with appropriate training and implementation support.", "url": "https://aaltodoc.aalto.fi/items/826ea826-a839-40c5-a543-e285c6932fb4", "year": 2026, "authors": "P Häkkinen - 2025 - aaltodoc.aalto.fi", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 162, "title": "AGenerative AIFramework for Cognitive Intervention in Older Adults: An Integrated Engineering Design and Clinical Protocol", "score": 6, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "", "url": "https://www.mdpi.com/2227-9032/13/24/3225", "year": 2025, "authors": "T Jeong, G Hwang,", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 163, "title": "The effects ofgenerative AIon high-skilled work: Evidence from three field experiments with software developers", "score": 9, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "This study evaluates the effect of generative artificial intelligence (AI) on software developer productivity via randomized controlled trials at Microsoft, Accenture, and an anonymous Fortune 100 company. These field experiments, run by the companies as part of their ordinary course of business, provided a random subset of developers with access to an AI-based coding assistant suggesting intelligent code completions. Although each experiment is noisy and results vary across experiments, when data are combined across three experiments and 4,867 developers, our analysis reveals a 26.08% increase (standard error: 10.3%) in completed tasks among developers using the AI tool. Notably, less experienced developers had higher adoption rates and greater productivity gains.\n                  This paper was accepted by Jean-Pierre Dube, marketing.\n                  Funding: M. Demirer and T. Salz thank the MIT GenAI Initiative for funding.\n                  Supplemental Material: The online appendices and data files are available at https://doi.org/10.1287/mnsc.2025.00535 .", "url": "https://pubsonline.informs.org/doi/abs/10.1287/mnsc.2025.00535", "year": 2026, "authors": "KZ Cui", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 164, "title": "Evaluating the impact of government orientation on theadoptionofAIin business: acausal inferencestudy", "score": 3, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "", "url": "https://www.iris.unisa.it/handle/11386/4918039", "year": 2026, "authors": "C Lea,", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 165, "title": "Causalityandcausal inferencefor engineers: Beyond correlation, regression, prediction andartificial intelligence", "score": 7, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "AbstractIn order to engineer new materials, structures, systems, and processes that address persistent challenges, engineers seek to tie causes to effects and understand the effects of causes. Such a pursuit requires a causal investigation to uncover the underlying structure of the data generating process (DGP) governing phenomena. A causal approach derives causal models that engineers can adopt to infer the effects of interventions (and explore possible counterfactuals). Yet, and for the most part, we continue to design experiments in the hope of empirically observing engineered intervention(s). Such experiments are idealized, complex, and costly and hence are narrow in scope. On the contrary, a causal investigation will allow us to peek into the how and why of a DGP and provide us with the essential means to articulate a causal model that accurately describes the phenomenon on hand and better predicts the outcome of possible interventions. Adopting a causal approach in engineering is perhaps more warranted than ever—especially with the rise of big data and the adoption of artificial intelligence (AI); wherein AI models are naivety presumed to describe causal ties. To bridge such knowledge gap, this primer presents fundamental principles behind causal discovery, causal inference, and counterfactuals from an engineering perspective and contrasts that to those pertaining to correlation, regression, and AI.This article is categorized under:\nApplication Areas &gt; Industry Specific Applications\nAlgorithmic Development &gt; Causality Discovery\nApplication Areas &gt; Science and Technology\nTechnologies &gt; Machine Learning", "url": "https://wires.onlinelibrary.wiley.com/doi/abs/10.1002/widm.1533", "year": 2026, "authors": "MZ Naser", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 166, "title": "Evaluating digital agriculture recommendations withcausal inference", "score": 6, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "In contrast to the rapid digitalization of several industries, agriculture suffers from low adoption of smart farming tools. Even though recent advancements in AI-driven digital agriculture can offer high-performing predictive functionalities, they lack tangible quantitative evidence on their benefits to the farmers. Field experiments can derive such evidence, but are often costly, time consuming and hence limited in scope and scale of application. To this end, we propose an observational causal inference framework for the empirical evaluation of the impact of digital tools on target farm performance indicators (e.g., yield in this case). This way, we can increase farmers' trust via enhancing the transparency of the digital agriculture market, and in turn accelerate the adoption of technologies that aim to secure farmer income resilience and global agricultural sustainability against a changing climate. As a case study, we designed and implemented a recommendation system for the optimal sowing time of cotton based on numerical weather predictions, which was used by a farmers' cooperative during the growing season of 2021. We then leverage agricultural knowledge, collected yield data, and environmental information to develop a causal graph of the farm system. Using the back-door criterion, we identify the impact of sowing recommendations on the yield and subsequently estimate it using linear regression, matching, inverse propensity score weighting and meta-learners. The results revealed that a field sown according to our recommendations exhibited a statistically significant yield increase that ranged from 12% to 17%, depending on the method. The effect estimates were robust, as indicated by the agreement among the estimation methods and four successful refutation tests. We argue that this approach can be implemented for decision support systems of other fields, extending their evaluation beyond a performance assessment of internal functionalities.", "url": "https://ojs.aaai.org/index.php/AAAI/article/view/26697", "year": 2026, "authors": "I Tsoumas", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 167, "title": "Causal inferenceinAIbased decision support: Beyond correlation tocausation", "score": 3, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "In the emergent and evolving landscape of artificial intelligence, decision support systems have a vital role in the choice-making functions, right from the hea", "url": "https://ieeexplore.ieee.org/abstract/document/10866582/", "year": 2026, "authors": "MK Mannava", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 168, "title": "A survey oncausal inferencefor recommendation", "score": 3, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "", "url": "https://www.cell.com/the-innovation/fulltext/S2666-6758(24)00028-6", "year": 2026, "authors": "H Luo", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": false}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 169, "title": "Advanced A/B testing andcausal inferenceforAI-driven digital platforms: A comprehensive framework for US digital markets", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "", "url": "https://www.academia.edu/download/131661208/ijcatr13061004.pdf", "year": 2026, "authors": "KA Taiwo", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 170, "title": "Causalanalysis ofartificial intelligence adoptionin project management", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Artificial intelligence (AI) technologies have great potential to improve decision-making and automation processes in various sectors, including project management. AI technologies could significantly contribute to overcoming the complexity of project management through process automation, cognitive insight, and engagement. However, the adoption of AI technologies still faces many challenges due to technical, human resource-related, organizational, and legal issues. Our research identified the potential factors that lead to the willingness of people and organizations to adopt AI technologies in project management. This paper proposes a causal model describing multivariate causal relationships between the driving factors and the willingness to adopt AI. The causal model is a set of hypotheses evaluated through a survey and causal analysis using the structural equation modeling (SEM) technique. The analysis focused on six factors influencing the willingness to adopt AI in project management, i.e., performance effectiveness, price, previous experience, feedback, complexity, and complementary technologies. Our research found that the perception of the high effectiveness of AI technologies leading to higher profits and overall the state of the project is the main factor influencing the willingness to adopt AI technologies in project management.", "url": "https://link.springer.com/chapter/10.1007/978-3-031-47721-8_17", "year": 2026, "authors": "E Sarafanov,", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 171, "title": "Causalityfor trustworthyartificial intelligence: status, challenges and perspectives", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Causal inference is the idea of cause and effect; this fundamental area of sciences can be applied to problem space associated with Newton’s laws or the devastating COVID-19 pandemic. The cause explains the “why,” whereas the effect describes the “what.” The domain itself encompasses a plethora of disciplines from statistics and computer science to economics and philosophy. Recent advancements in machine learning and artificial intelligence systems have nourished a renewed interest in identifying and estimating the cause-and-effect relationship from the substantial amount of available observational data. This has resulted in various new studies aimed at providing novel methods for identifying and estimating causal inference. We include a detailed taxonomy of causal inference frameworks, methods, and evaluation. An overview of causality for security is also provided. Open challenges are detailed, and approaches for evaluating the robustness of causal inference methods are described. This article aims to provide a comprehensive survey on such studies of causality. We provide an in-depth review of causality frameworks and describe the different methods.", "url": "https://dl.acm.org/doi/abs/10.1145/3665494", "year": 2026, "authors": "A Rawal, A Raglin,", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 172, "title": "Recent developments incausal inferenceand machine learning", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "This article reviews recent advances in causal inference relevant to sociology. We focus on a selective subset of contributions aligning with four broad topics: causal effect identification and estimation in general, causal effect heterogeneity, causal effect mediation, and temporal and spatial interference. We describe how machine learning, as an estimation strategy, can be effectively combined with causal inference, which has been traditionally concerned with identification. The incorporation of machine learning in causal inference enables researchers to better address potential biases in estimating causal effects and uncover heterogeneous causal effects. Uncovering sources of effect heterogeneity is key for generalizing to populations beyond those under study. While sociology has long emphasized the importance of causal mechanisms, historical and life-cycle variation, and social contexts involving network interactions, recent conceptual and computational advances facilitate more principled estimation of causal effects under these settings. We encourage sociologists to incorporate these insights into their empirical research.", "url": "https://www.annualreviews.org/content/journals/10.1146/annurev-soc-030420-015345", "year": 2026, "authors": "JE Brand", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": false}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 173, "title": "Causal inferencein recommender systems: A survey and future directions", "score": 3, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Recommender systems have become crucial in information filtering nowadays. Existing recommender systems extract user preferences based on the correlation in data, such as behavioral correlation in collaborative filtering, feature-feature, or feature-behavior correlation in click-through rate prediction. However, unfortunately, the real world is driven by\n            causality\n            , not just correlation, and correlation does not imply causation. For instance, recommender systems might recommend a battery charger to a user after buying a phone, where the latter can serve as the cause of the former; such a causal relation cannot be reversed. Recently, to address this, researchers in recommender systems have begun utilizing causal inference to extract causality, thereby enhancing the recommender system. In this survey, we offer a comprehensive review of the literature on causal inference-based recommendation. Initially, we introduce the fundamental concepts of both recommender system and causal inference as the foundation for subsequent content. We then highlight the typical issues faced by non-causality recommender system. Following that, we thoroughly review the existing work on causal inference-based recommender systems, based on a taxonomy of three-aspect challenges that causal inference can address. Finally, we discuss the open problems in this critical research area and suggest important potential future works.", "url": "https://dl.acm.org/doi/abs/10.1145/3639048", "year": 2026, "authors": "C Gao", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": false}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 174, "title": "Large language models andcausal inferencein collaboration: A comprehensive survey", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Xiaoyu Liu, Paiheng Xu, Junda Wu, Jiaxin Yuan, Yifan Yang, Yuhang Zhou, Fuxiao Liu, Tianrui Guan, Haoliang Wang, Tong Yu, Julian McAuley, Wei Ai, Furong Huang. Findings of the Association for Computational Linguistics: NAACL 2025. 2025.", "url": "https://aclanthology.org/2025.findings-naacl.427/", "year": 2026, "authors": "…,", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 175, "title": "AI adoptionin America: Who, what, and where", "score": 3, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "AbstractWe study the early adoption and diffusion of five artificial intelligence (AI)‐related technologies (automated‐guided vehicles, machine learning, machine vision, natural language processing, and voice recognition) as documented in the 2018 Annual Business Survey of 850,000 firms across the United States. We find that fewer than 6% of firms used any of the AI‐related technologies we measure, though most very large firms reported at least some AI use. Weighted by employment, average adoption was just over 18%. AI use in production, while varying considerably by industry, was found in every sector of the economy and clustered with emerging technologies, such as cloud computing and robotics. Among dynamic young firms, AI use was highest alongside more‐educated, more‐experienced, and younger owners, including owners motivated by bringing new ideas to market or helping the community. AI adoption was also more common in startups displaying indicators of high‐growth entrepreneurship, including venture capital funding, recent product and process innovation, and growth‐oriented business strategies. Early AI adoption was far from evenly distributed: a handful of “superstar” cities and emerging hubs led startups' adoption of AI. These patterns of early AI use foreshadow economic and social impacts far beyond this limited initial diffusion, with the possibility of a growing “AI divide” if early patterns persist.", "url": "https://onlinelibrary.wiley.com/doi/abs/10.1111/jems.12576", "year": 2026, "authors": "K McElheran", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 176, "title": "The role ofcausalityin explainableartificial intelligence", "score": 8, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "ABSTRACTCausality and eXplainable Artificial Intelligence (XAI) have developed as separate fields in computer science, even though the underlying concepts of causation and explanation share common ancient roots. This is further enforced by the lack of review works jointly covering these two fields. In this paper, we investigate the literature to try to understand how and to what extent causality and XAI are intertwined. More precisely, we seek to uncover what kinds of relationships exist between the two concepts and how one can benefit from them, for instance, in building trust in AI systems. As a result, three main perspectives are identified. In the first one, the lack of causality is seen as one of the major limitations of current AI and XAI approaches, and the “optimal” form of explanations is investigated. The second is a pragmatic perspective and considers XAI as a tool to foster scientific exploration for causal inquiry, via the identification of pursue‐worthy experimental manipulations. Finally, the third perspective supports the idea that causality is propaedeutic to XAI in three possible manners: exploiting concepts borrowed from causality to support or improve XAI, utilizing counterfactuals for explainability, and considering accessing a causal model as explaining itself. To complement our analysis, we also provide relevant software solutions used to automate causal tasks. We believe our work provides a unified view of the two fields of causality and XAI by highlighting potential domain bridges and uncovering possible limitations.", "url": "https://wires.onlinelibrary.wiley.com/doi/abs/10.1002/widm.70015", "year": 2026, "authors": "G Carloni", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 177, "title": "Counterfactual Forecasting of Human Behavior using GenerativeAIandCausalGraphs", "score": 7, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "This study presents a novel framework for counterfactual user behavior forecasting that combines structural causal models with transformer-based generative artificial intelligence. To model fictitious situations, the method creates causal graphs that map the connections between user interactions, adoption metrics, and product features. The framework generates realistic behavioral trajectories under counterfactual conditions by using generative models that are conditioned on causal variables. Tested on datasets from web interactions, mobile applications, and e-commerce, the methodology outperforms conventional forecasting and uplift modeling techniques. Product teams can effectively simulate and assess possible interventions prior to deployment thanks to the framework improved interpretability through causal path visualization.", "url": "https://arxiv.org/abs/2511.07484", "year": 2026, "authors": "DP Uddandarao, RK Vadlamani - arXiv preprint arXiv:2511.07484, 2025 - arxiv.org", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 178, "title": "Causal Inferencefor Recommendation: Foundations, Methods, and Applications", "score": 3, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Recommender systems are important and powerful tools for various personalized services. Traditionally, these systems use data mining and machine learning techniques to make recommendations based on correlations found in the data. However, relying solely on correlation without considering the underlying causal mechanism may lead to various practical issues such as fairness, explainability, robustness, bias, echo chamber, and controllability problems. Therefore, researchers in related area have begun incorporating causality into recommendation systems to address these issues. In this survey, we review the existing literature on causal inference in recommender systems. We discuss the fundamental concepts of both recommender systems and causal inference as well as their relationship, and review the existing work on causal methods for different problems in recommender systems. Finally, we discuss open problems and future directions in the field of causal inference for recommendations.", "url": "https://dl.acm.org/doi/abs/10.1145/3714430", "year": 2026, "authors": "S Xu", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 179, "title": "Yes, But Not Always. Generative AI Needs Nuanced Opt-in", "score": 5, "status": "REVISAR", "pocket": "desigualdad", "pocket_label": "Desigualdad", "pocket_color": "#ef4444", "abstract": "This paper argues that a one-size-fits-all approach to specifying consent for the use of creative works in generative AI is insufficient. Real-world ownership and rights holder structures, the imitation of artistic styles and likeness, and the limitless contexts of use of AI outputs make the status quo of binary consent with opt-in by default untenable. To move beyond the current impasse, we consider levers of control in generative AI workflows at training, inference, and dissemination. Based on these insights, we position inference-time opt-in as an overlooked opportunity for nuanced consent verification. We conceptualize nuanced consent conditions for opt-in and propose an agent-based inference-time opt-in architecture to verify if user intent requests meet conditional consent granted by rights holders. In a case study for music, we demonstrate that nuanced opt-in at inference can account for established rights and re-establish a balance of power between rights holders and AI developers.", "url": "https://arxiv.org/abs/2604.09413v1", "year": 2026, "authors": "Wiebke Hutiri, Morgan Scheuerman, Shruti Nagpal et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "inequality", "desc": "Mide desigualdad, brecha o disparidad", "met": false}, {"key": "heterogeneous", "desc": "Analiza efectos heterogéneos por característica", "met": false}, {"key": "distributional", "desc": "Análisis distributivo (no solo efecto promedio)", "met": false}, {"key": "context", "desc": "Contexto MiPyME / LATAM / economía en desarrollo", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 180, "title": "Insights from Farmer-Managed Decentralized Solar Irrigation Systems", "score": 3, "status": "REVISAR", "pocket": "desigualdad", "pocket_label": "Desigualdad", "pocket_color": "#ef4444", "abstract": "Solar irrigation systems are increasingly deployed in rural regions, yet their distributed and remote deployment makes maintenance challenging for farmers. While formal monitoring processes and applications exist, they often fall short in practice. We present insights from grid-connected solar irrigation schemes that incentivize farmers to feed energy to the grid, focusing on how farmers maintain their systems. We found that farmers face multiple challenges but are also devising strategies, including the appropriation of WhatsApp to share daily generation data with peers and compare performance across installations to identify potential system anomalies. Our findings highlight how messaging platforms function as informal digital infrastructures enabling collective sensemaking around distributed energy systems. We discuss implications for designing agricultural energy technologies that support peer comparison, contextual interpretation, and community-driven maintenance, framing these as a socio-technical platform. Finally, we o
