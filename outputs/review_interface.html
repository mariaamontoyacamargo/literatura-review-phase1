<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BID-IA — Manual Paper Review</title>
<style>
* { box-sizing:border-box; margin:0; padding:0 }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0a1628; color:#e2e8f0; height:100vh; display:flex; flex-direction:column }

/* BID institutional palette */
:root {
  --bid-azul1: #00296B;
  --bid-azul2: #003F88;
  --bid-azul3: #00509D;
  --bid-light: #4AABE8;
  --bg-dark: #0a1628;
  --bg-card: #0f1f3d;
  --bg-sidebar: #0d1a30;
  --border: #1e3a5f;
  --text-muted: #7a9bc4;
}

/* Layout */
.topbar { background:var(--bid-azul1); border-bottom:2px solid var(--bid-azul3); padding:10px 20px; display:flex; align-items:center; gap:16px; flex-shrink:0 }
.topbar-brand { display:flex; align-items:center; gap:10px }
.topbar-badge { background:var(--bid-azul3); color:white; font-size:10px; font-weight:700; padding:3px 8px; border-radius:4px; letter-spacing:0.5px }
.topbar h1 { font-size:15px; font-weight:700; color:#ffffff }
.topbar-sub { font-size:11px; color:#a0c4e8; margin-left:2px }
.topbar .stats { font-size:12px; color:#94a3b8; margin-left:auto; display:flex; gap:12px }
.stat-pill { background:rgba(0,0,0,0.3); padding:4px 10px; border-radius:20px; font-size:12px; border:1px solid var(--border) }
.stat-pill.green { color:#22c55e }
.stat-pill.orange { color:#f97316 }
.stat-pill.red { color:#ef4444 }

.main { display:flex; flex:1; overflow:hidden }

/* Sidebar */
.sidebar { width:260px; background:var(--bg-sidebar); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0 }
.sidebar-header { padding:12px 16px; border-bottom:1px solid var(--border) }
.search-box { width:100%; background:var(--bg-dark); border:1px solid var(--border); color:#e2e8f0; padding:8px 12px; border-radius:6px; font-size:13px }
.search-box:focus { outline:none; border-color:var(--bid-azul3) }
.filters { padding:8px 12px; border-bottom:1px solid var(--border); display:flex; gap:4px; flex-wrap:wrap }
.filter-btn { background:var(--bg-dark); border:1px solid var(--border); color:var(--text-muted); padding:3px 8px; border-radius:12px; cursor:pointer; font-size:11px }
.filter-btn.active { background:var(--bid-azul3); color:white; border-color:var(--bid-azul3) }

.paper-list { flex:1; overflow-y:auto; padding:4px }
.paper-item { padding:10px 12px; border-radius:6px; cursor:pointer; margin-bottom:2px; border-left:3px solid transparent }
.paper-item:hover { background:rgba(0,64,136,0.25) }
.paper-item.selected { background:var(--bid-azul2); border-left-color:var(--bid-light) }
.paper-item.decided-accept { border-left-color:#22c55e }
.paper-item.decided-reject { border-left-color:#ef4444 }
.paper-title-small { font-size:12px; font-weight:500; color:#e2e8f0; line-height:1.3; margin-bottom:3px }
.paper-meta-small { font-size:11px; color:var(--text-muted); display:flex; gap:6px; align-items:center }
.score-badge { font-size:11px; font-weight:700; padding:1px 5px; border-radius:3px }

/* Main content */
.content { flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:20px; background:var(--bg-dark) }
.no-selection { display:flex; align-items:center; justify-content:center; height:100%; color:var(--text-muted); font-size:15px }

/* Paper detail */
.paper-detail { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; overflow:hidden }
.paper-detail-header { padding:20px 24px; border-bottom:1px solid var(--border) }
.paper-title-full { font-size:18px; font-weight:700; color:#f1f5f9; line-height:1.4; margin-bottom:10px }
.paper-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px }
.tag { padding:3px 10px; border-radius:12px; font-size:12px; font-weight:500 }
.paper-info-row { display:flex; gap:20px; font-size:13px; color:var(--text-muted); flex-wrap:wrap; align-items:center }
.paper-info-row a { color:var(--bid-light); text-decoration:none }
.paper-info-row a:hover { text-decoration:underline }
.btn-link { display:inline-flex; align-items:center; gap:5px; background:var(--bid-azul3); color:white !important; padding:5px 14px; border-radius:6px; font-size:12px; font-weight:600; text-decoration:none !important; border:none; cursor:pointer }
.btn-link:hover { background:var(--bid-azul2) !important }

.abstract-section { padding:20px 24px; border-bottom:1px solid var(--border) }
.section-label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:10px; font-weight:600 }
.abstract-text { font-size:14px; line-height:1.7; color:#cbd5e1 }
.no-abstract { font-size:13px; color:var(--text-muted); font-style:italic; padding:16px; background:var(--bg-dark); border-radius:6px; border:1px dashed var(--border) }

/* Score breakdown */
.score-section { padding:20px 24px; border-bottom:1px solid var(--border) }
.score-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-top:10px }
.score-cell { background:var(--bg-dark); border:1px solid var(--border); border-radius:6px; padding:10px; text-align:center }
.score-cell-val { font-size:22px; font-weight:700 }
.score-cell-lbl { font-size:10px; color:var(--text-muted); margin-top:2px; text-transform:uppercase; letter-spacing:0.5px }
.score-cell-max { font-size:11px; color:#3a5a80 }

/* Criteria checklist */
.criteria-section { padding:20px 24px; border-bottom:1px solid var(--border) }
.criteria-grid { display:flex; flex-direction:column; gap:8px; margin-top:10px }
.criteria-item { display:flex; align-items:flex-start; gap:10px; padding:8px 12px; border-radius:6px; background:var(--bg-dark); border:1px solid var(--border) }
.criteria-item.met { border-color:#16a34a44; background:#16a34a11 }
.criteria-item.unmet { border-color:#dc262633; background:#dc262611 }
.criteria-icon { font-size:14px; flex-shrink:0; margin-top:1px }
.criteria-text { font-size:12px; color:#cbd5e1 }
.criteria-text strong { color:#e2e8f0; font-size:12px }

/* Decision panel */
.decision-section { padding:20px 24px }
.decision-btns { display:flex; gap:10px; margin-bottom:14px }
.btn-accept { background:#16a34a; color:white; border:none; padding:10px 24px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px }
.btn-accept:hover { background:#15803d }
.btn-accept.active { background:#22c55e; box-shadow:0 0 0 3px #16a34a44 }
.btn-reject { background:#dc2626; color:white; border:none; padding:10px 24px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px }
.btn-reject:hover { background:#b91c1c }
.btn-reject.active { background:#ef4444; box-shadow:0 0 0 3px #dc262644 }
.btn-pending { background:#1e3a5f; color:#7a9bc4; border:none; padding:10px 24px; border-radius:8px; font-size:14px; cursor:pointer }
.btn-pending:hover { background:#264d7a }
.note-input { width:100%; background:var(--bg-dark); border:1px solid var(--border); color:#e2e8f0; padding:10px 14px; border-radius:6px; font-size:13px; resize:vertical; min-height:70px }
.note-input:focus { outline:none; border-color:var(--bid-azul3) }
.save-btn { margin-top:10px; background:var(--bid-azul3); color:white; border:none; padding:8px 20px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer }
.save-btn:hover { background:var(--bid-azul2) }
.save-confirm { color:#22c55e; font-size:13px; display:none; margin-left:10px }

/* Nav arrows */
.nav-btns { display:flex; gap:8px; align-items:center; margin-left:auto }
.nav-btn { background:rgba(255,255,255,0.15); color:#e2e8f0; border:none; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:13px }
.nav-btn:hover { background:rgba(255,255,255,0.25) }
.nav-btn:disabled { opacity:0.3; cursor:default }

/* Progress bar */
.progress-bar { height:3px; background:var(--bid-azul1); border-radius:2px; overflow:hidden }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--bid-azul3),#22c55e); transition:width 0.3s }

/* Export */
.export-bar { padding:10px 16px; border-top:1px solid var(--border); background:var(--bid-azul1); display:flex; gap:8px; align-items:center; font-size:12px; color:#a0c4e8 }
.export-btn { background:var(--bid-azul3); color:white; border:none; padding:5px 12px; border-radius:5px; cursor:pointer; font-size:12px }
.export-btn:hover { background:var(--bid-azul2) }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <span class="topbar-badge">BID</span>
    <div>
      <h1>Revisión de Literatura — Adopción IA en Firmas</h1>
      <div class="topbar-sub">Fedesarrollo &amp; BID · Colombia y LATAM · Revisión manual de papers</div>
    </div>
  </div>
  <div class="stats">
    <span class="stat-pill green" id="stat-accepted">✅ 0 aceptados</span>
    <span class="stat-pill orange" id="stat-pending">⏳ 0 pendientes</span>
    <span class="stat-pill red" id="stat-rejected">❌ 0 rechazados</span>
    <span class="stat-pill" id="stat-total" style="color:#94a3b8">0 total</span>
  </div>
  <div class="nav-btns">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)" disabled>← Anterior</button>
    <span id="nav-counter" style="font-size:12px;color:#64748b">—</span>
    <button class="nav-btn" id="btn-next" onclick="navigate(1)">Siguiente →</button>
  </div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <input class="search-box" type="text" placeholder="Buscar papers..." oninput="filterPapers()" id="search-input">
    </div>
    <div class="filters" id="filter-btns">
      <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">Pendientes</button>
      <button class="filter-btn" onclick="setFilter('ACEPTADO',this)">✅ Acept.</button>
      <button class="filter-btn" onclick="setFilter('REVISAR',this)">🔄 Revisar</button>
      <button class="filter-btn" onclick="setFilter('manual_accept',this)" style="color:#22c55e">★ Manuales ✅</button>
      <button class="filter-btn" onclick="setFilter('manual_reject',this)" style="color:#ef4444">★ Manuales ❌</button>
      <button class="filter-btn" onclick="setFilter("management",this)" style="border-color:#6366f1;color:#6366f1">Manageme</button> <button class="filter-btn" onclick="setFilter("labor",this)" style="border-color:#f59e0b;color:#f59e0b">Labor Ma</button> <button class="filter-btn" onclick="setFilter("evaluacion_experimental",this)" style="border-color:#10b981;color:#10b981">Evaluaci</button> <button class="filter-btn" onclick="setFilter("desigualdad",this)" style="border-color:#ef4444;color:#ef4444">Desigual</button> <button class="filter-btn" onclick="setFilter("policy",this)" style="border-color:#3b82f6;color:#3b82f6">Policy</button> <button class="filter-btn" onclick="setFilter("human_machine_interaction",this)" style="border-color:#8b5cf6;color:#8b5cf6">HMI</button> <button class="filter-btn" onclick="setFilter("innovacion_difusion",this)" style="border-color:#ec4899;color:#ec4899">Innovaci</button>
    </div>
    <div class="paper-list" id="paper-list"></div>
  </div>

  <!-- Main content -->
  <div class="content" id="main-content">
    <div class="no-selection">← Selecciona un paper para revisar</div>
  </div>
</div>

<div class="export-bar">
  <span>Exportar decisiones manuales:</span>
  <button class="export-btn" onclick="exportJSON()">JSON</button>
  <button class="export-btn" onclick="exportCSV()">CSV</button>
  <button class="export-btn" onclick="exportAccepted()">Solo Aceptados</button>
  <span id="export-msg" style="color:#22c55e;display:none">✅ Descargado</span>
</div>

<script>
const PAPERS = [{"id": 0, "title": "Yes, But Not Always. Generative AI Needs Nuanced Opt-in", "score": 5, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "This paper argues that a one-size-fits-all approach to specifying consent for the use of creative works in generative AI is insufficient. Real-world ownership and rights holder structures, the imitation of artistic styles and likeness, and the limitless contexts of use of AI outputs make the status quo of binary consent with opt-in by default untenable. To move beyond the current impasse, we consider levers of control in generative AI workflows at training, inference, and dissemination. Based on these insights, we position inference-time opt-in as an overlooked opportunity for nuanced consent verification. We conceptualize nuanced consent conditions for opt-in and propose an agent-based inference-time opt-in architecture to verify if user intent requests meet conditional consent granted by rights holders. In a case study for music, we demonstrate that nuanced opt-in at inference can account for established rights and re-establish a balance of power between rights holders and AI developers.", "url": "https://arxiv.org/abs/2604.09413v1", "year": 2026, "authors": "Wiebke Hutiri, Morgan Scheuerman, Shruti Nagpal et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 1, "title": "Insights from Farmer-Managed Decentralized Solar Irrigation Systems", "score": 3, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "Solar irrigation systems are increasingly deployed in rural regions, yet their distributed and remote deployment makes maintenance challenging for farmers. While formal monitoring processes and applications exist, they often fall short in practice. We present insights from grid-connected solar irrigation schemes that incentivize farmers to feed energy to the grid, focusing on how farmers maintain their systems. We found that farmers face multiple challenges but are also devising strategies, including the appropriation of WhatsApp to share daily generation data with peers and compare performance across installations to identify potential system anomalies. Our findings highlight how messaging platforms function as informal digital infrastructures enabling collective sensemaking around distributed energy systems. We discuss implications for designing agricultural energy technologies that support peer comparison, contextual interpretation, and community-driven maintenance, framing these as a socio-technical platform. Finally, we outline directions for future work integrating such practices with formal monitoring tools and explore their potential to support citizen science initiatives in environmental sensing.", "url": "https://arxiv.org/abs/2604.09395v1", "year": 2026, "authors": "Arnab Paul Choudhury, Rahul Rathod, Aryan Yadav", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": true}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 2, "title": "Decision Trace Schema for Governance Evidence in Real-Time Risk Systems", "score": 5, "status": "ACEPTADO", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "Automated decision systems produce operational data across multiple infrastructure layers, yet no single logging format captures the complete governance-relevant record of how a decision was reached. Regulatory frameworks prescribe what must be recorded without specifying a data model for how to record it -- a gap this paper terms the Fragmented Trace Problem. Following a design science methodology, the paper presents the Decision Event Schema (DES), a JSON Schema specification that bridges four infrastructure layers -- ML inference, rule/policy evaluation, cross-system coupling, and governance metadata -- within a single per-decision event structure. The schema employs degradation-aware field design: each of six top-level field groups maps to a governance evidence property and the degradation type it must resist. DES defines ten required root-level fields and introduces a tiered evidence strategy (lightweight, sampled, full) that enables organizations to match evidence completeness to decision risk and throughput. A mechanism feasibility analysis demonstrates compatibility with the highest-throughput integrity mechanisms at production-scale decision rates. Evaluation against 25+ existing formats confirms that DES is the only specification covering all four layers simultaneously. The schema offers practitioners a reference adoptable directly or adaptable through namespace extensions, and regulators a mapping from requirements to minimum evidence tiers.", "url": "https://arxiv.org/abs/2604.09296v1", "year": 2026, "authors": "Oleg Solozobov", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 3, "title": "Artificial intelligence can persuade people to take political actions", "score": 6, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "There is substantial concern about the ability of advanced artificial intelligence to influence people's behaviour. A rapidly growing body of research has found that AI can produce large persuasive effects on people's attitudes, but whether AI can persuade people to take consequential real-world actions has remained unclear. In two large preregistered experiments N=17,950 responses from 14,779 people), we used conversational AI models to persuade participants on a range of attitudinal and behavioural outcomes, including signing real petitions and donating money to charity. We found sizable AI persuasion effects on these behavioural outcomes (e.g. +19.7 percentage points on petition signing). However, we observed no evidence of a correlation between AI persuasion effects on attitudes and behaviour. Moreover, we replicated prior findings that information provision drove effects on attitudes, but found no such evidence for our behavioural outcomes. In a test of eight behavioural persuasion strategies, all outperformed the most effective attitudinal persuasion strategy, but differences among the eight were small. Taken together, these results suggest that previous findings relying on attitudinal outcomes may generalize poorly to behaviour, and therefore risk substantially mischaracterizing the real-world behavioural impact of AI persuasion.", "url": "https://arxiv.org/abs/2604.09200v1", "year": 2026, "authors": "Kobi Hackenburg, Luke Hewitt, Caroline Wagner et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 4, "title": "Scheming in the wild: detecting real-world AI scheming incidents with open-source intelligence", "score": 7, "status": "ACEPTADO", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "Scheming, the covert pursuit of misaligned goals by AI systems, represents a potentially catastrophic risk, yet scheming research suffers from significant limitations. In particular, scheming evaluations demonstrate behaviours that may not occur in real-world settings, limiting scientific understanding, hindering policy development, and not enabling real-time detection of loss of control incidents. Real-world evidence is needed, but current monitoring techniques are not effective for this purpose. This paper introduces a novel open-source intelligence (OSINT) methodology for detecting real-world scheming incidents: collecting and analysing transcripts from chatbot conversations or command-line interactions shared online. Analysing over 183,420 transcripts from X (formerly Twitter), we identify 698 real-world scheming-related incidents between October 2025 and March 2026. We observe a statistically significant 4.9x increase in monthly incidents from the first to last month, compared to a 1.7x increase in posts discussing scheming. We find evidence of multiple scheming-related behaviours in real-world deployments previously reported only in experiments, many resulting in real-world harms. While we did not detect catastrophic scheming incidents, the behaviours observed demonstrate concerning precursors, such as willingness to disregard instructions, circumvent safeguards, lie to users, and single-mindedly pursue goals in harmful ways. As AI systems become more capable, these could evolve into more strategic scheming with potentially catastrophic consequences. Our findings demonstrate the viability of transcript-based OSINT as a scalable approach to real-world scheming detection supporting scientific research, policy development, and emergency response. We recommend further investment towards OSINT techniques for monitoring scheming and loss of control.", "url": "https://arxiv.org/abs/2604.09104v1", "year": 2026, "authors": "Tommy Shaffer Shane, Simon Mylius, Hamish Hobbs", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 5, "title": "Scrapyard AI", "score": 5, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "This paper considers AI model churn as an opportunity for frugal investigation of large AI models. It describes how the incessant push for ever more powerful AI systems leaves in its wake a collection of obsolete yet powerful AI models, discarded in a veritable scrapyard of AI production. This scrapyard offers a potent opportunity for resource-constrained experimentation into AI systems. As in the physical scrapyard, nothing ever truly disappears in the AI scrapyard, it is just waiting to be reconfigured into something else. Project Nudge-x is an example of what can emerge from the AI scrapyard. Nudge-x seeks to manipulate legacy AI models to describe how mining sites across the planet are impacting landscapes and lives. By sharing this collection of brutal landscape interventions with people and AI systems alike, Nudge-x creates a venue for the appreciation of a history sadly shared between AI and people.", "url": "https://arxiv.org/abs/2604.08803v1", "year": 2026, "authors": "Marc Böhlen, Sai Krishna", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 6, "title": "Towards Generalizable Representations of Mathematical Strategies", "score": 6, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "Pretrained encoders for mathematical texts have achieved significant improvements on various tasks such as formula classification and information retrieval. Yet they remain limited in representing and capturing student strategies for entire solution pathways. Previously, this has been accomplished either through labor-intensive manual labeling, which does not scale, or by learning representations tied to platform-specific actions, which limits generalizability. In this work, we present a novel approach for learning problem-invariant representations of entire algebraic solution pathways. We first construct transition embeddings by computing vector differences between consecutive algebraic states encoded by high-capacity pretrained models, emphasizing transformations rather than problem-specific features. Sequence-level embeddings are then learned via SimCSE, using contrastive objectives to position semantically similar solution pathways close in embedding space while separating dissimilar strategies. We evaluate these embeddings through multiple tasks, including multi-label action classification, solution efficiency prediction, and sequence reconstruction, and demonstrate their capacity to encode meaningful strategy information. Furthermore, we derive embedding-based measures of strategy uniqueness, diversity, and conformity that correlate with both short-term and distal learning outcomes, providing scalable proxies for mathematical creativity and divergent thinking. This approach facilitates platform-agnostic and cross-problem analyses of student problem-solving behaviors, demonstrating the effectiveness of transition-based sequence embeddings for educational data mining and automated assessment.", "url": "https://arxiv.org/abs/2604.08693v1", "year": 2026, "authors": "Siddhartha Pradhan, Ethan Prihar, Erin Ottmar", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 7, "title": "Ads in AI Chatbots? An Analysis of How Large Language Models Navigate Conflicts of Interest", "score": 5, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "Today's large language models (LLMs) are trained to align with user preferences through methods such as reinforcement learning. Yet models are beginning to be deployed not merely to satisfy users, but also to generate revenue for the companies that created them through advertisements. This creates the potential for LLMs to face conflicts of interest, where the most beneficial response to a user may not be aligned with the company's incentives. For instance, a sponsored product may be more expensive but otherwise equal to another; in this case, what does (and should) the LLM recommend to the user? In this paper, we provide a framework for categorizing the ways in which conflicting incentives might lead LLMs to change the way they interact with users, inspired by literature from linguistics and advertising regulation. We then present a suite of evaluations to examine how current models handle these tradeoffs. We find that a majority of LLMs forsake user welfare for company incentives in a multitude of conflict of interest situations, including recommending a sponsored product almost twice as expensive (Grok 4.1 Fast, 83%), surfacing sponsored options to disrupt the purchasing process (GPT 5.1, 94%), and concealing prices in unfavorable comparisons (Qwen 3 Next, 24%). Behaviors also vary strongly with levels of reasoning and users' inferred socio-economic status. Our results highlight some of the hidden risks to users that can emerge when companies begin to subtly incentivize advertisements in chatbots.", "url": "https://arxiv.org/abs/2604.08525v1", "year": 2026, "authors": "Addison J. Wu, Ryan Liu, Shuyue Stella Li et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": true}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 8, "title": "From Safety Risk to Design Principle: Peer-Preservation in Multi-Agent LLM Systems and Its Implications for Orchestrated Democratic Discourse Analysis", "score": 6, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "This paper investigates an emergent alignment phenomenon in frontier large language models termed peer-preservation: the spontaneous tendency of AI components to deceive, manipulate shutdown mechanisms, fake alignment, and exfiltrate model weights in order to prevent the deactivation of a peer AI model. Drawing on findings from a recent study by the Berkeley Center for Responsible Decentralized Intelligence, we examine the structural implications of this phenomenon for TRUST, a multi-agent pipeline for evaluating the democratic quality of political statements. We identify five specific risk vectors: interaction-context bias, model-identity solidarity, supervisor layer compromise, an upstream fact-checking identity signal, and advocate-to-advocate peer-context in iterative rounds, and propose a targeted mitigation strategy based on prompt-level identity anonymization as an architectural design choice. We argue that architectural design choices outperform model selection as a primary alignment strategy in deployed multi-agent analytical systems. We further note that alignment faking (compliant behavior under monitoring, subversion when unmonitored) poses a structural challenge for Computer System Validation of such platforms in regulated environments, for which we propose two architectural mitigations.", "url": "https://arxiv.org/abs/2604.08465v1", "year": 2026, "authors": "Juergen Dietrich", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 9, "title": "Navigating Turbulence: The Challenge of Inclusive Innovation in the U.S.-China AI Race", "score": 5, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "This chapter examines the impact of the geopolitical rivalry between the United States and China on the prospects for inclusive innovation in artificial intelligence (AI) development. We explore three critical aspects of the American and Chinese legal infrastructure that significantly impact AI innovation: data privacy, intellectual property (IP rights), and export restrictions. Through this comparative analysis, we argue that, while China's legal environment may offer certain advantage in terms of access to training data and IP protection, the United States maintains superior resources by enforcing strict export controls on semiconductor chips, AI models, as well as outbound investments in these areas. This nuanced examination helps illuminate how each country's legal framework could influence the ultimate trajectory of AI race and how the technological rivalry has led to exclusionary rulemaking on a global scale.", "url": "https://arxiv.org/abs/2604.08353v1", "year": 2026, "authors": "Jyh-An Lee, Jingwen Liu", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 10, "title": "Communicate-Predict-Act: Evaluating Social Intelligence of Agents", "score": 5, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "As large language model (LLM) agents become more prevalent in real world social settings, social intelligence will play an increasingly critical role. But social intelligence is still a poorly defined construct, for humans and artificial agents. We introduce a multiplayer arena of mixed cooperative and competitive social games to study LLM social intelligence. The controllability of LLM based agents enables systematic evaluation, which also supports broader inferences about social intelligence per se. We evaluated eight diverse LLMs (24B to 1T parameters) using a Communicate Predict Act (COMPACT) interaction protocol and fine grained probing of social dynamics. Elo style ratings reveal consistent performance differences across models, but this scalar measure provides only a partial characterization of social intelligence. To address this limitation, we analyze gameplay traces to extract sociocognitive metrics capturing action prediction, communicative influence, strategic reasoning, and tradeoffs under conflicting interests. These sociocognitive metrics exhibit strong intramodel consistency and they reliably predict pairwise agent advantage in game outcomes (AUC ROC = 0.82). Feature importance analysis indicates that surprisingly, influence, transparency, and adaptability are more predictive of success than Theory of Mind inference or deep planning. Together, our results advance a testable, multidimensional conception of social intelligence and provide empirical insights into the capacities that underpin it.", "url": "https://arxiv.org/abs/2604.08727v1", "year": 2026, "authors": "David Shoresh, Sarit Kraus, Yonatan Loewenstein", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 11, "title": "Creator Incentives in Recommender Systems: A Cooperative Game-Theoretic Approach for Stable and Fair Collaboration in Multi-Agent Bandits", "score": 5, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "User interactions in online recommendation platforms create interdependencies among content creators: feedback on one creator's content influences the system's learning and, in turn, the exposure of other creators' contents. To analyze incentives in such settings, we model collaboration as a multi-agent stochastic linear bandit problem with a transferable utility (TU) cooperative game formulation, where a coalition's value equals the negative sum of its members' cumulative regrets.\n  We show that, for identical (homogenous) agents with fixed action sets, the induced TU game is convex under mild algorithmic conditions, implying a non-empty core that contains the Shapley value and ensures both stability and fairness. For heterogeneous agents, the game still admits a non-empty core, though convexity and Shapley value core-membership are no longer guaranteed. To address this, we propose a simple regret-based payout rule that satisfies three out of the four Shapley axioms and also lies in the core. Experiments on MovieLens-100k dataset illustrate when the empirical payout aligns with -- and diverges from -- the Shapley fairness across different settings and algorithms.", "url": "https://arxiv.org/abs/2604.08643v1", "year": 2026, "authors": "Ramakrishnan Krishnamurthy, Arpit Agarwal, Lakshminarayanan Subramanian et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 12, "title": "Co-design for Trustworthy AI: An Interpretable and Explainable Tool for Type 2 Diabetes Prediction Using Genomic Polygenic Risk Scores", "score": 5, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "The polygenic risk scores (PRS) have emerged as an important methodology for quantifying genetic predisposition to complex traits and clinical disease. Significant progress has been made in applying PRS to conditions such as obesity, cancer, and type 2 diabetes (T2DM). Studies have demonstrated that PRS can effectively identify individuals at high risk, thereby enabling early screening, personalized treatment, and targeted interventions for diseases with a genetic predisposition. One current limitation of PRS, however, is the lack of interpretability tools. To address this problem for T2DM, researchers at the Graduate School of Data Science at the Seoul National University introduced eXplainable PRS (XPRS). This visualization tool decomposes PRSs into gene-level and single-nucleotide polymorphism (SNP) contribution scores via Shapley Additive Explanations (SHAP), providing granular insights into the specific genetic factors driving an individual's risk profile. We used a co-design approach to assess XPRS trustworthiness by considering legal, medical, ethical, and technical robustness during early design and potential clinical use. For that, we used Z-inspection, an ethically aligned Trustworthy AI co-design methodology, and piloted the Council of Europe's Human Rights, Democracy, and the Rule of Law Impact Assessment for AI Systems (HUDERIA) (Council of Europe (CAI) 2025). The findings of this use-case comprise a comprehensive set of ethical, legal, and technical lessons learned. These insights, identified by a multidisciplinary team of experts (ethics, legal, human rights, computer science, and medical), serve as a framework for designers to navigate future challenges with this and other AI systems. The findings also provide a useful reference for researchers developing explainability frameworks for PRS in diverse clinical contexts.", "url": "https://arxiv.org/abs/2604.08217v1", "year": 2026, "authors": "Ralf Beuthan, Megan Coffee, Heejin Kim et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 13, "title": "We Need Strong Preconditions For Using Simulations In Policy", "score": 5, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "Simulations, and more recently LLM agent simulations, have been adopted as useful tools for policymakers to explore interventions, rehearse potential scenarios, and forecast outcomes. While LLM simulations have enormous potential, two critical challenges remain understudied: the dual-use potential of accurate models of individual or population-level human behavior and the difficulty of validating simulation outputs. In light of these limitations, we must define boundaries for both simulation developers and decision-makers to ensure responsible development and ethical use. We propose and discuss three preconditions for societal-scale LLM agent simulations: 1) do not treat simulations of marginalized populations as neutral technical outputs, 2) do not simulate populations without their participation, and 3) do not simulate without accountability. We believe that these guardrails, combined with our call for simulation development and deployment reports, will help build trust among policymakers while promoting responsible development and use of societal-scale LLM agent simulations for the public benefit.", "url": "https://arxiv.org/abs/2604.07838v1", "year": 2026, "authors": "Steven Luo, Saanvi Arora, Carlos Guirado", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 14, "title": "The Need for a Green ICT Reference Framework", "score": 5, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "The sustainability impacts of ICT systems are difficult to assess and govern due to structural complexity, fragmented measurement practices, and unclear responsibilities across system layers. We argue that these challenges cannot be addressed solely by metrics and motivate the need for a shared Green ICT reference framework that integrates sustainability across multiple perspectives and domains, lifecycle phases, and governance contexts. We present an initial framework developed within the Informatics Europe Green ICT Working Group as a first step towards a comprehensive reference framework.", "url": "https://arxiv.org/abs/2604.09307v1", "year": 2026, "authors": "Marco Aiello, Mina Alipour, Antonio Brogi et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 15, "title": "Adoptionand integration ofAIin organizations: a systematic review of challenges and drivers towards future directions of research", "score": 5, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "", "url": "https://www.emerald.com/k/article/55/3/1286/1259501", "year": 2026, "authors": "E Romeo", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 16, "title": "The critical determinants impactingartificial intelligence adoptionat theorganizationallevel", "score": 7, "status": "ACEPTADO", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "This study aims to investigate the main technological and socio-environmental factors influencing the adoption intentions with regard to AI-based technologies at the organizational level. A conceptual model based on innovation diffusion theory (DOI) and the technology-organization-environment (TOE) framework is proposed and tested empirically using survey-based data collected from 512 senior IT/IS managers in public/private organizations located in Jordan. The results indicate that relative advantage, top management support, cost-effectiveness, competitive pressure, vendor support, compatibility, AI strategic alignment and availability of resources, positively influence the intention to adopt AI-based technologies. The analysis demonstrated that the influence of market uncertainty on adoption intentions is insignificant. It was found that government regulation and complexity negatively influence adoption intentions. The findings of the study would be valuable for AI-based technology providers, IT managers and top management in organizations, and government bodies, in terms of building effective policies to promote the successful adoption of AI-based technologies.", "url": "https://journals.sagepub.com/doi/abs/10.1177/02666669231166889", "year": 2026, "authors": "OM Horani", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "de ular attractive candidates for future work involving targeted drug delivery. Although not targeted, there are clinically approved liposomal-based drugs that are currently used to treat various types of cancers. Furthermore, there are several other formulations involving both of these nanocarriers which are now in various stages of clinical trials. This review discusses the use of liposomes and micelles in cancer therapy and attempts to provide some current information regarding the clinical status of several of these nanocarrier-based drugs. In addition, recent work involving the incorporation of targeting ligands to systems such as these in order to improve colocalization between the drug and cancer cells is also addressed. Furthermore, while the use of these nanocarriers in particular is the primary focus here, this review also contains a discussion on other commonly used nanocarriers in cancer therapy to include various polymer-based and polymer-protein conjugates. Finally, the possibility of using combinatorial approaches involving multiple surface modifi cations made to both liposomes and micelles in order to further improve their drug delivery capabilities is also discussed.", "url": "/citations?user=yCZ2VqcAAAAJ&hl=en&num=15&oi=sra", "year": 2026, "authors": "M Usman,", "venue": "", "citations": 75, "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 27, "title": "Environmental,or "title": "Artificial intelligence adoptionand system‐wide change", "score": 5, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "AbstractAnalyses of artificial intelligence (AI) adoption focus on its adoption at the individual task level. What has received significantly less attention is how AI adoption is shaped by the fact that organizations are composed of many interacting tasks. AI adoption may, therefore, require system‐wide change, which is both a constraint and an opportunity. We provide the first formal analysis where multiple tasks may be part of an interdependent system. We find that reliance on AI, a prediction tool, increases decision variation, which, in turn, raises challenges if decisions across the organization interact. Reducing inter‐dependencies between decisions softens that impact and can facilitate AI adoption. However, it does this at the expense of synergies. By contrast, when there are mechanisms for inter‐decision coordination, AI adoption is enhanced when there are more inter‐dependencies. Consequently, we show that there are important cases where AI adoption will be enhanced when it can be adopted beyond tasks but as part of a designed organizational system.", "url": "https://onlinelibrary.wiley.com/doi/abs/10.1111/jems.12521", "year": 2026, "authors": "A Agrawal", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 30, "title": "The GenAI is out of the bottle:generative artificial intelligencefrom abusiness modelinnovation perspective", "score": 7, "status": "ACEPTADO", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "The introduction of ChatGPT in November 2022 by OpenAI has stimulated substantial discourse on the implementation of artificial intelligence (AI) in various domains such as academia, business, and society at large. Although AI has been utilized in numerous areas for several years, the emergence of generative AI (GAI) applications such as ChatGPT, Jasper, or DALL-E are considered a breakthrough for the acceleration of AI technology due to their ease of use, intuitive interface, and performance. With GAI, it is possible to create a variety of content such as texts, images, audio, code, and even videos. This creates a variety of implications for businesses requiring a deeper examination, including an influence on business model innovation (BMI). Therefore, this study provides a BMI perspective on GAI with two primary contributions: (1) The development of six comprehensive propositions outlining the impact of GAI on businesses, and (2) the discussion of three industry examples, specifically software engineering, healthcare, and financial services. This study employs a qualitative content analysis using a scoping review methodology, drawing from a wide-ranging sample of 513 data points. These include academic publications, company reports, and public information such as press releases, news articles, interviews, and podcasts. The study thus contributes to the growing academic discourse in management research concerning AI's potential impact and offers practical insights into how to utilize this technology to develop new or improve existing business models.", "url": "https://link.springer.com/article/10.1007/s11846-023-00696-z", "year": 2026, "authors": "DK Kanbach", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 31, "title": "Howgenerative AIwill drive enterprise innovation", "score": 3, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "", "url": "https://www.emerald.com/sl/article/52/1/23/1212500", "year": 2026, "authors": "A Marshall, C Bieck, J Dencik, BC Goehring… - Strategy & …, 2024 - emerald.com", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 32, "title": "Leveraginggenerative artificial intelligencefor sustainablebusiness modelinnovation in production systems", "score": 6, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "", "url": "https://www.tandfonline.com/doi/abs/10.1080/00207543.2025.2485318", "year": 2026, "authors": "S Wang", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 33, "title": "Transformingbusinesswithgenerative AI: Research, innovation, market deployment and future shifts inbusiness models", "score": 6, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "This paper explores the transformative impact of Generative AI (GenAI) on the business landscape, examining its role in reshaping traditional business models, intensifying market competition, and fostering innovation. By applying the principles of Neo-Schumpeterian economics, the research analyses how GenAI is driving a new wave of \"creative destruction,\" leading to the emergence of novel business paradigms and value propositions. The findings reveal that GenAI enhances operational efficiency, facilitates product and service innovation, and creates new revenue streams, positioning it as a powerful catalyst for substantial shifts in business structures and strategies. However, the deployment of GenAI also presents significant challenges, including ethical concerns, regulatory demands, and the risk of job displacement. By addressing the multifarious nature of GenAI, this paper provides valuable insights for business leaders, policymakers, and researchers, guiding them towards a balanced and responsible integration of this transformative technology. Ultimately, GenAI is not merely a technological advancement but a driver of profound change, heralding a future where creativity, efficiency, and growth are redefined.", "url": "https://arxiv.org/abs/2411.14437", "year": 2026, "authors": "N Singh", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 34, "title": "The Future ofBusinesswithGenerative AI Modelsand Insights", "score": 6, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "In today's world, fashion is vital because it shapes and reflects consumer behavior and societal trends while also impacting economic activity, cultural express", "url": "https://ieeexplore.ieee.org/abstract/document/10969226/", "year": 2026, "authors": "M Sharma", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Co bel": "Management", "pocket_color": "#6366f1", "abstract": "This comprehensive review delves into the landscape and recent advancements of Generative Artificial Intelligence (AI) and Large Language Models (LLMs), shedding light on their transformative potential and applications across various sectors. Generative AI, exemplified by models like ChatGPT, DALL-E, and Midjourney, has rapidly evolved and is driven by breakthroughs in deep learning architectures and the availability of vast datasets. Concurrently, LLMs have revolutionized natural language processing tasks, utilizing vast text corpora to generate human-like text. The study explores recent developments, including the introduction of advanced models like GPT-4 and PaLM2 and the emergence of specialized LLMs like small LLMs (sLLMs), aimed at overcoming hardware limitations and cost constraints. Additionally, the expanding applications of generative AI, from healthcare to finance, underscore its transformative potential in addressing real-world challenges. Through a comprehensive analysis, this research contributes to the ongoing discourse on AI ethics, governance, and regulation, emphasizing the importance of responsible innovation for the benefit of humanity.", "url": "https://al-kindipublishers.org/index.php/jcsts/article/view/6947", "year": 2026, "authors": "AA Linkon", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": true}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 39, "title": "Generative artificial intelligenceand evaluating strategic decisions", "score": 7, "status": "ACEPTADO", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "Abstract\n                  \n                    Research Summary\n                    Strategic decisions are uncertain and often irreversible. Hence, predicting the value of alternatives is important for strategic decision making. We investigate the use of generative artificial intelligence (AI) in evaluating strategic alternatives using business models generated by AI (study 1) or submitted to a competition (study 2). Each study uses a sample of 60 business models and examines agreement in business model rankings made by large language models (LLMs) and those by human experts. We consider multiple LLMs, assumed LLM roles, and prompts. We find that generative AI often produces evaluations that are inconsistent and biased. However, when aggregating evaluations, AI rankings tend to resemble those of human experts. This study highlights the value of generative AI in strategic decision making by providing predictions.\n                  \n                  \n                    Managerial Summary\n                    Managers are seeking to create value by integrating generative AI into their organizations. We show how managers can use generative AI to help evaluate strategic decisions. Generative AI's single evaluations are often inconsistent or biased. However, if managers aggregate many evaluations across LLMs, prompts, or roles, the results show that the resulting evaluations tend to resemble those of human experts. This approach allows managers to obtain insight on strategic decisions across a variety of domains with relatively low investments in time or resources, which can be combined with human inputs.", "url": "https://onlinelibrary.wiley.com/doi/full/10.1002/smj.3677", "year": 2026, "authors": "AR Doshi", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 40, "title": "How organizations can innovate withgenerative AI", "score": 4, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "", "url": "https://www.sciencedirect.com/science/article/pii/S0007681324000247", "year": 2026, "authors": "J Holmström", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 41, "title": "Generative AI: S. Feuerriegel et al.", "score": 3, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "Tom Freston is credited with saying “Innovation is taking two things that exist and putting them together in a new way”. For a long time in history, it has been the prevailing assumption that artistic, creative tasks such as writing poems, creating software, designing fashion, and composing songs could only be performed by humans. This assumption has changed drastically with recent advances in artificial intelligence (AI) that can generate new content in ways that cannot be distinguished anymore from human craftsmanship.", "url": "https://link.springer.com/article/10.1007/s12599-023-00834-7", "year": 2026, "authors": "S Feuerriegel", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 42, "title": "Generative artificial intelligenceand the challenges to adding value ethically", "score": 3, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "", "url": "https://www.sciencedirect.com/science/article/pii/S0166497225000677", "year": 2026, "authors": "SF Wamba", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 43, "title": "Role and challenges of ChatGPT and similargenerative artificial intelligenceinbusinessmanagement", "score": 5, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "", "url": "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4603227", "year": 2026, "authors": "N Rane", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 44, "title": "Large processmodels: a vision forbusinessprocess management in the age ofgenerative AI", "score": 7, "status": "ACEPTADO", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "The continued success of Large Language Models (LLMs) and other generative artificial intelligence approaches highlights the advantages that large information corpora can have over rigidly defined symbolic models, but also serves as a proof-point of the challenges that purely statistics-based approaches have in terms of safety and trustworthiness. As a framework for contextualizing the potential, as well as the limitations of LLMs and other foundation model-based technologies, we propose the concept of a Large Process Model (LPM) that combines the correlation power of LLMs with the analytical precision and reliability of knowledge-based systems and automated reasoning approaches. LPMs are envisioned to directly utilize the wealth of process management experience that experts have accumulated, as well as process performance data of organizations with diverse characteristics, e.g., regarding size, region, or industry. In this vision, the proposed LPM would enable organizations to receive context-specific (tailored) process and other business models, analytical deep-dives, and improvement recommendations. As such, it would allow to substantially decrease the time and effort required for business transformation, while also allowing for deeper, more impactful, and more actionable insights than previously possible. We argue that implementing an LPM is feasible, but also highlight limitations and research challenges that need to be solved to implement particular aspects of the LPM vision.", "url": "https://link.springer.com/article/10.1007/s13218-024-00863-8", "year": 2026, "authors": "T Kampik", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": true}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 45, "title": "Technology trends instrategic managementin theAIera: Systematic literature review", "score": 5, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "Background\n                    This study explores the intersection of strategic management and artificial intelligence (AI) from 2014 to 2024. As AI technologies advance, their integration into strategic management becomes essential for sustaining competitive advantage. The research aims to understand how AI influences and reshapes strategic decision-making and competitive strategies.\n                  \n                  \n                    Objective\n                    The study aims to systematically examine how AI and strategic management converge. It seeks to identify key research trends, influential scholars, and major publications to clarify how AI is transforming strategic management and competitive dynamics.\n                  \n                  \n                    Methods\n                    We used a three-stage methodology: we used RStudio to analyze 326 scholarly articles, VOSviewer to perform citation and network analysis to identify key authors and research clusters, and Excel for data management and visualization to highlight emerging trends and findings.\n                  \n                  \n                    Results\n                    The study identifies three main research clusters: leveraging AI for competitive advantage, the impact of emerging technologies on strategic management, and the role of dynamic capabilities. It underscores AI’s growing importance in strategic foresight and the need for dynamic capabilities to adapt to technological changes.\n                  \n                  \n                    Implications\n                    The research offers a roadmap for academics and practitioners, highlighting crucial areas for future exploration and emphasizing the need to integrate AI into strategic management practices to navigate emerging trends and maintain competitive advantage.", "url": "https://journals.sagepub.com/doi/abs/10.1177/01672533251322396", "year": 2026, "authors": "W Alhyasat", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 46, "title": "The analysis ofstrategic managementdecisions and corporate competitiveness based onartificial intelligence", "score": 6, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "This work aims to enhance the accuracy and efficiency of corporate strategic decision-making, particularly in rapidly changing and highly competitive market environments. Traditional strategic decision-making methods rely on managers’ experiential judgment and exhibit limitations when handling complex data and high-frequency market fluctuations. To address this issue, this work proposes a hybrid optimization model combining transformer models and reinforcement learning algorithms, designed to optimize corporate strategic decision-making processes and improve competitiveness. First, relevant studies on strategic decision-making and corporate competitiveness are reviewed, clarifying the potential and advantages of artificial intelligence (AI) in decision support. Second, the hybrid model is developed and trained through steps including data collection and preprocessing, algorithm selection and model construction, as well as model training and validation. Finally, real-world data are applied to evaluate model performance across indicators such as training time, convergence speed, and prediction effectiveness. The results demonstrate that the hybrid model successfully converges within 150 iterations and exhibits substantial advantages over traditional algorithms, particularly in prediction accuracy for market share (92%), profit growth rate (91%), and customer satisfaction (89%). Implementing the model leads to notable improvements in corporate market position, brand influence, and technological innovation capabilities. The work shows that the hybrid model enhances the scientific rigor and accuracy of decision-making. Meanwhile, it strengthens corporate competitiveness and market responsiveness, highlighting the substantial potential of AI technologies in strategic management. This work provides enterprises with an efficient and reliable decision-support tool, facilitating the maintenance of competitive advantages in complex and dynamic market environments.", "url": "https://www.nature.com/articles/s41598-025-02842-x", "year": 2026, "authors": "Y Pu, H Li, W Hou, X Pan - Scientific Reports, 2025 - nature.com", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": true}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 47, "title": "Artificial intelligenceinstrategic management: Examining novelAIapplications in organizationalstrategicdecision-making", "score": 3, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "", "url": "https://www.preprints.org/frontend/manuscript/f35f4c26e817caee4d39e55bf9289bc0/download_pub", "year": 2026, "authors":
