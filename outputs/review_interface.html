tructured cognitive-task jobs, while increasing both demand and skill complexity in positions that involve human-AI collaboration. These results highlight the importance of understanding generative AI's nuanced impact on the labor market and designing targeted policies to mitigate job displacement while supporting skills development for human-AI collaboration.", "url": "https://www.hbs.edu/ris/Publication%20Files/25-039_05fbec84-1f23-459b-8410-e3cd7ab6c88a.pdf", "year": 2026, "authors": "WX Chen", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": true}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 93, "title": "Introduction toGenerative AI: Its Impact onJobs, Education, Work and Policy Making", "score": 4, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "", "url": "https://www.preprints.org/frontend/manuscript/067481cf12fab5f129296e8dbda83ed1/download_pub", "year": 2026, "authors": "S Joshi - 2025 - preprints.org", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 94, "title": "Generative AImay create a socioeconomic tipping point through labourdisplacement", "score": 7, "status": "ACEPTADO", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Work is fundamental to societal prosperity and mental health, providing financial security, a sense of identity and purpose, and social integration. Job insecurity, underemployment and unemployment are well-documented risk factors for mental health issues and suicide. The emergence of generative artificial intelligence (AI) has catalysed debate on job displacement and its corollary impacts on individual and social wellbeing. Some argue that many new jobs and industries will emerge to offset the displacement, while others foresee a widespread decoupling of economic productivity from human input threatening jobs on an unprecedented scale. This study explores the conditions under which both may be true and examines the potential for a self-reinforcing cycle of recessionary pressures that would necessitate sustained government intervention to maintain job security and economic stability. A system dynamics model was developed to undertake ex ante analysis of the effect of AI-capital deepening on labour underutilisation and demand in the economy using Australian data as a case study. Results indicate that even a moderate increase in the AI-capital-to-labour ratio could increase labour underutilisation to double its current level, decrease per capita disposable income by 26% (95% interval, 20.6–31.8%), and decrease the consumption index by 21% (95% interval, 13.6–28.3%) by mid-2050. To prevent a reduction in per capita disposable income due to the estimated increase in underutilization, at least a 10.8-fold increase in the new job creation rate would be necessary. Results demonstrate the feasibility of an AI-capital-to-labour ratio threshold beyond which even high rates of new job creation cannot prevent declines in consumption. The precise threshold will vary across economies, emphasizing the urgent need for empirical research tailored to specific contexts. This study underscores the need for cross-sectoral government measures to ensure a smooth transition to an AI-dominated economy to safeguard the Mental Wealth of nations.", "url": "https://www.nature.com/articles/s41598-025-08498-x", "year": 2026, "authors": "JA Occhipinti", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": true}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 95, "title": "Generative AIandJobVulnerability: A Global Review", "score": 9, "status": "ACEPTADO", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Generative AI and Job Vulnerability: A Global Review Pokhrel, Sangita ORCID: https://orcid.org/0009-0008-2092-7029 , Poudel, Sanjaya , Banjade, Shiv Raj , Ganesan, Swathi ORCID: https://orcid.org/0000-0002-6278-2090 and Goonawardane, Chathurika (2025) Generative AI and Job Vulnerability: A Global Review. Recent Research Reviews Journal , 4 (2). pp. 281-305. Preview Text Generative_AI_and_Job_Vulnerab-RRRJ-4_2_6.pdf - Published Version Available under License Creative Commons Attribution Non-commercial . Download (570kB) | Preview Official URL: https://irojournals.com/rrrj/article/pdf/4/2/6 Abstract The rapid acceleration in the development of AI-in particular, generative AI-is changing the nature of work globally, with great significant for job creation, transformation, and displacement. Drawing on major studies, employer forecasts, and AI-driven evaluations, this review paper synthesizes evidence to investigate sectoral vulnerabilities to automation across different economic contexts. In doing so, it identifies professions and sectors that have emerged as particularly vulnerable to disruption by AI, with a specific focus on developments relating to generative AI since 2023. Clerical, administrative, financial, and customer service jobs are currently identified as those globally at the highest risk, while knowledge-based and creative jobs that have been considered hitherto safe are increasingly vulnerable. Conversely, occupations that are physically and emotionally demanding and unpredictable, such as health care, skilled trades, and hospitality, remain comparatively resilient. This review also explores regional variation in risks from automation, approaches to the methodological assessment of risk, and the strategic responses from employers across industries. Conclusively, this study emphasizes a set of policy recommendations targeting concerted upskilling, AI governance, and inclusive transition strategies in efforts to prevent labor markets from becoming more unequal. This systematic literature review used information obtained from peer-reviewed journals, policy reports, and organizational datasets published between 2013 and 2025. Altogether, 52 studies were thematically analyzed and comparatively mapped across sectors in line with predetermined inclusion criteria targeted at AI-driven automation and workforce vulnerability across sectors. Item Type: Article Status: Published DOI: 10.36548/rrrj.2025.2.006 Subjects: T Technology > T Technology (General) School/Department: London Campus URI: https://ray.yorksj.ac.uk/id/eprint/13382 University Staff: Request a  "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 99, "title": "The recessionary pressures ofgenerative AI: A threat to wellbeing", "score": 7, "status": "ACEPTADO", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Generative Artificial Intelligence (AI) stands as a transformative force that presents a paradox; it offers unprecedented opportunities for productivity growth while potentially posing significant threats to economic stability and societal wellbeing. Many consider generative AI as akin to previous technological advancements, using historical precedent to argue that fears of widespread job displacement are unfounded, while others contend that generative AI`s unique capacity to undertake non-routine cognitive tasks sets it apart from other forms of automation capital and presents a threat to the quality and availability of work that underpin stable societies. This paper explores the conditions under which both may be true. We posit the existence of an AI-capital-to-labour ratio threshold beyond which a self-reinforcing cycle of recessionary pressures could be triggered, exacerbating social disparities, reducing social cohesion, heightening tensions, and requiring sustained government intervention to maintain stability. To prevent this, the paper underscores the urgent need for proactive policy responses, making recommendations to reduce these risks through robust regulatory frameworks and a new social contract characterised by progressive social and economic policies. This approach aims to ensure a sustainable, inclusive, and resilient economic future where human contribution to the economy is retained and integrated with generative AI to enhance the Mental Wealth of nations.", "url": "https://arxiv.org/abs/2403.17405", "year": 2026, "authors": "JA Occhipinti", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": true}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 100, "title": "Generative AI: A turning point for labor's share", "score": 3, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "", "url": "http://www.lukasz-drozd.com/uploads/4/3/1/8/43183209/eiq124-generative-ai.pdf", "year": 2024, "authors": "LA Drozd,", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 101, "title": "Generative artificial intelligenceand the emergence of creativedisplacementanxiety", "score": 5, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Generative Artificial Intelligence (AI), a subset of AI that can generate novel content such as images, text, and music, has the unique transformative potential of augmenting human creativity, offering tools that can enhance creative expression and open unprecedented avenues for innovation. However, alongside its remarkable capabilities, the inevitable pervasive integration of this technology in every aspect of human life, including creative fields, involves the risk of giving rise to unforeseen psychological challenges for our society. This article discusses the potential emergence of a novel psychological phenomenon consisting in the multifaceted response to the perceived overshadowing of human creativity by AI-driven tools. Specifically, the article introduces the term “Creative Displacement Anxiety” (CDA), describe its foundation, and discuss its relationships with established psychological and psychosocial models, theories, constructs, and diagnoses such as technostress, impostor syndrome, cognitive dissonance, and economic anxiety. The article conceptualizes and elucidates the potential root causes, symptoms, and implications of CDA. Additionally, it discusses how some of the possible negative mental health outcomes could potentially be mitigated. Our work emphasizes the need for interventions that raise awareness on generative AI, support individuals in accepting and incorporating AI as a creative tool and companion and helps them navigate this new landscape. Finally, by offering a view of the interplay between AI advancements and the human creative psyche, our research aims at fostering the discussion around embracing the positive contribution of generative AI to our society.", "url": "https://researchdirects.com/index.php/psychology/article/view/95", "year": 2026, "authors": "N Caporusso", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": true}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 102, "title": "The dark side ofgenerative artificial intelligence: A critical analysis of controversies and risks of ChatGPT", "score": 4, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Central and Eastern European Online Library - CEE journals, documents, articles, periodicals, books available online for download, Zeitschrfitendatenbank, Online Zeitschriften, Online Zeitschriftendatenbank", "url": "https://www.ceeol.com/search/article-detail?id=1205845", "year": 2026, "authors": "K Wach", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 103, "title": "What is the Future of Work in theGenerative AIEra? A Marxist and Ricardian Analysis", "score": 9, "status": "ACEPTADO", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "There is an increasing public discourse of automation for white-collar professional jobs due to improvements in artificial intelligence (AI) capacities, raising the question about the contours of the future of work. Marx and Ricardo’s framework of technological labour displacement helps us understand the future of work in the context of AI. Marx’s discussion in Capital and Ricardo’s discussion in Principles of Political Economy reveal the common thesis that technology-induced worker displacement and precariousness of employment relationships are built into the internal logic of the contemporary digital capitalist economy. There are three important differences in their theoretical framework: (1) Marx did not believe that high technological unemployment is possible within capitalism even with very advanced technologies such as AI, while Ricardo saw technological unemployment as a serious threat while he acknowledges countervailing employment-creating tendencies; (2) While Ricardo’s explanation for the falling rate of profit is limited to rising wages, Marx traces the profit decline to the rising organic composition of capital and automation itself; (3) For Marx, a desirable future of work is not found within a capitalist framework but in communism, while Ricardo sees no alternatives to capitalism.", "url": "https://triple-c.at/index.php/tripleC/article/view/1536", "year": 2026, "authors": "L Liu", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": true}], "manual_decision": ión", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 108, "title": "Technological disruption in thelabor market", "score": 6, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "This paper explores past episodes of technological disruption in the US labor market, with the goal of learning lessons about the likely future impact of artificial intelligence (AI). We measure changes in the structure of the US labor market going back over a century. We find, perhaps surprisingly, that the pace of change has slowed over time. The years spanning 1990 to 2017 were less disruptive than any prior period we measure, going back to 1880. This comparative decline is not because the job market is stable today but rather because past changes were so profound. General-purpose technologies (GPTs) like steam power and electricity dramatically disrupted the twentieth-century labor market, but the changes took place over decades. We argue that AI could be a GPT on the scale of prior disruptive innovations, which means it is likely too early to assess its full impacts. Nonetheless, we present four indications that the pace of labor market change has accelerated recently, possibly due to technological change. First, the labor market is no longer polarizing— employment in low- and middle-paid occupations has declined, while highly paid employment has grown. Second, employment growth has stalled in low-paid service jobs. Third, the share of employment in STEM jobs has increased by more than 50 percent since 2010, fueled by growth in software and computer-related occupations. Fourth, retail sales employment has declined by 25 percent in the last decade, likely because of technological improvements in online retail. The post-pandemic labor market is changing very rapidly, and a key question is whether this faster pace of change will persist into the future.", "url": "https://www.nber.org/papers/w33323", "year": 2026, "authors": "DJ Deming", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": true}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": true}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 109, "title": "Thelabor market effectsof generativeAI: A difference-in-differences analysis ofAIexposure", "score": 8, "status": "ACEPTADO", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "", "url": "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5375017", "year": 2026, "authors": "AC Johnston", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 110, "title": "Theimpactofartificial intelligence(AI) on employees' skills and well-being in globallabor markets: A systematic review", "score": 3, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Central and Eastern European Online Library - CEE journals, documents, articles, periodicals, books available online for download, Zeitschrfitendatenbank, Online Zeitschriften, Online Zeitschriftendatenbank", "url": "https://www.ceeol.com/search/article-detail?id=1192670", "year": 2026, "authors": "RE Cramarenco,", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 1, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": true}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": true}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 111, "title": "Displacement Or Complementarity?: TheLabor Market Impactof GenerativeAI", "score": 4, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "", "url": "https://www.hbs.edu/ris/Publication%20Files/25-039_05fbec84-1f23-459b-8410-e3cd7ab6c88a.pdf", "year": 2026, "authors": "WX Chen", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 112, "title": "\" Generate\" the Future of Work throughAI: Empirical Evidence from OnlineLabor Markets", "score": 7, "status": "ACEPTADO", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Large Language Model (LLM)-based generative AI systems, such as ChatGPT, demonstrate zero-shot learning capabilities across a wide range of downstream tasks. Owing to their general-purpose nature and potential to augment or even automate job functions, these systems are poised to reshape labor market dynamics. However, predicting their precise impact \\textit{a priori} is challenging, given AI's simultaneous effects on both demand and supply, as well as the strategic responses of market participants. Leveraging an extensive dataset from a leading online labor platform, we document a pronounced displacement effect and an overall contraction in submarkets where required skills closely align with core LLM functionalities. Although demand and supply both decline, the reduction in supply is comparatively smaller, thereby intensifying competition among freelancers. Notably, further analysis shows that this heightened competition is especially pronounced in programming-intensive submarkets. This pattern is attributed to skill-transition effects: by lowering the human-capital barrier to programming, ChatGPT enables incumbent freelancers to enter programming tasks. Moreover, these transitions are not homogeneous, with high-skilled freelancers contributing disproportionately to the shift. Our findings illuminate the multifaceted impacts of general-purpose AI on labor markets, highlighting not only the displacement of certain occupations but also the inducement of skill transitions within the labor supply. These insights offer practical implications for policymakers, platform operators, and workers.", "url": "https://arxiv.org/abs/2308.05201", "year": 2026, "authors": "J Liu", "venue": "", "citations": 3, "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": true}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 113, "title": "Large language models, smalllabor market effects", "score": 7, "status": "ACEPTADO", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "We study the early labor market impacts of AI chatbots by linking large-scale adoption surveys to administrative labor market records in Denmark. We document rapid currents: most employers in exposed occupations have adopted chatbot initiatives, workers report productivity benefits, and new AI-related tasks are widespread. Yet these currents have not broken the surface: using difference-indifferences, we estimate precise null effects on earnings and recorded hours at both the worker and workplace levels, ruling out effects larger than 2% two years after the launch of ChatGPT. What moves is the structure of work: employers absorb AI through task reorganization—including new tasks in content generation, AI oversight, and AI integration—and adopters transition into higher-paying occupations where AI chatbots are more relevant, though still too few to move average earnings. Technological change reshapes work well before it surfaces in earnings or hours.", "url": "https://www.nber.org/papers/w33777", "year": 2026, "authors": "A Humlum", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": true}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 114, "title": "The short-termeffectsof generativeartificial intelligenceonemployment: Evidence from an onlinelabor market", "score": 7, "status": "ACEPTADO", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Generative artificial intelligence (AI) holds the potential to either complement workers by enhancing their productivity or substitute them. We examine the short-term effects of the recently released generative AI models (ChatGPT, DALL-E 2, and Midjourney) on the employment outcomes of freelancers on a large online platform. We find that freelancers in highly affected occupations suffer from the introduction of generative AI, experiencing reductions in both employment and earnings. We find similar effects studying the release of other image-based generative AI models. Exploring the heterogeneity by freelancers’ employment history, we do not find evidence that high-quality service, measured by their past performance and employment, moderates the adverse effects on employment. In fact, we find suggestive evidence that top freelancers are disproportionately affected by AI. These results suggest that generative AI may transform the role of human capital in the organization and reduce overall demand for workers.  Supplemental Material: The online appendices are available at https://doi.org/10.1287/orsc.2023.18441 .", "url": "https://pubsonline.informs.org/doi/abs/10.1287/orsc.2023.18441", "year": 2026, "authors": "X Hui", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": true}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 115, "title": "Artificial intelligence: intensifying or mitigating unemployment?", "score": 2, "status": "RECHAZADO", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "", "url": "https://www.sciencedirect.com/science/article/pii/S0160791X24003038", "year": 2026, "authors": "M Qin", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 116, "title": "AI-exposure andlabour market: a systematic literature review on estimations, validations, and perceptions: D. Ghosh et al.", "score": 6, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "The artificial intelligence (AI) revolution is still in its infancy, but it is constantly changing across time and space. Any AI-penetration, adoption and diffusion trigger further rounds of supply-induced demand for newer AI-exposures. Understandably, the demand and supply are intertwined, and currently, it is a formidable challenge to comprehensively capture and delineate the extent of AI's influence, as evidenced in existing literature. The paper details out the fundamental inferences drawn by the recent literature on this, thoroughly and systematically. The findings are based on peer-reviewed articles from the domains of economics, HR, business and management literature spanning 2010–2023. Although growing AI exposure is widely acknowledged in the literature, clarity and comprehensiveness are missing on several grounds. This review analyses the adoption of technology based on AI, whether in a broad or narrow sense, as well as the skill sets required and its impact on the labour market as documented in extant literature, encompassing employment, occupations, earnings, and organisation. Three overarching concerns are identified: First , to assess and infer on possible labour market impacts due to the AI-exposure of firms the proxies of AI exposure taken by the literature are quite diverse: robotization, digital evolution index, human–machine collaboration, technological progress etc. Second , the methodologies employed in qualitative and quantitative literature exhibit a wide range of diversity; these techniques often yielded contradictory and divergent conclusions, potentially influenced by the size and structure of the data utilised in the respective methods. Third , research is limited to China or regions of developed countries, making it difficult to draw general conclusions. The literature at present, is dispersed, and is yet to build any consensus on deciphering the skill-types that possibly would see the largest impacts, the sectors that might see plethora of AI-enabled economic repercussions, whether indeed there will be an overall net- job destruction or net-job creation, and does that differ across economic regions? The paper details out the fundamental inferences drawn by the recent literature on this, thoroughly and systematically.", "url": "https://link.springer.com/article/10.1007/s11301-023-00393-x", "year": 2026, "authors": "D Ghosh", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": true}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 117, "title": "Theimpactofartificial intelligenceon productivity, distribution and growth", "score": 3, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "", "url": "https://iris.luiss.it/handle/11385/240418", "year": 2026, "authors": "F Filippucci", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 118, "title": "Dynamics of the digital workforce: Assessing the interplay andimpactofAI, automation, andemploymentpolicies", "score": 4, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "", "url": "https://www.researchgate.net/profile/Oluwaseun-Olaniyi/publication/380068372_Digital_Workforce_Assessing_the_Interplay_and_Impact_of_AI_Automation_and_Employment_Policies/links/6629431435243041534098d1/Digital-Workforce-Assessing-the-Interplay-and-Impact-of-AI-Automation-and-Employment-Policies.pdf", "year": 2026, "authors": "OO Olaniyi", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 1, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 119, "title": "Artificial intelligencedevelopment and disseminationimpacton the sports industrylabor market", "score": 4, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "The objective of this study is to explore the impact of artificial intelligence (AI) development on the sports industry labor market, and how AI has influenc...", "url": "https://www.frontiersin.org/journals/sports-and-active-living/articles/10.3389/fspor.2024.1363892/full", "year": 2026, "authors": "E Glebova", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 120, "title": "Yes, But Not Always. Generative AI Needs Nuanced Opt-in", "score": 6, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "This paper argues that a one-size-fits-all approach to specifying consent for the use of creative works in generative AI is insufficient. Real-world ownership and rights holder structures, the imitation of artistic styles and likeness, and the limitless contexts of use of AI outputs make the status quo of binary consent with opt-in by default untenable. To move beyond the current impasse, we consider levers of control in generative AI workflows at training, inference, and dissemination. Based on these insights, we position inference-time opt-in as an overlooked opportunity for nuanced consent verification. We conceptualize nuanced consent conditions for opt-in and propose an agent-based inference-time opt-in architecture to verify if user intent requests meet conditional consent granted by rights holders. In a case study for music, we demonstrate that nuanced opt-in at inference can account for established rights and re-establish a balance of power between rights holders and AI developers.", "url": "https://arxiv.org/abs/2604.09413v1", "year": 2026, "authors": "Wiebke Hutiri, Morgan Scheuerman, Shruti Nagpal et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 121, "title": "Insights from Farmer-Managed Decentralized Solar Irrigation Systems", "score": 3, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Solar irrigation systems are increasingly deployed in rural regions, yet their distributed and remote deployment makes maintenance challenging for farmers. While formal monitoring processes and applications exist, they often fall short in practice. We present insights from grid-connected solar irrigation schemes that incentivize farmers to feed energy to the grid, focusing on how farmers maintain their systems. We found that farmers face multiple challenges but are also devising strategies, including the appropriation of WhatsApp to share daily generation data with peers and compare performance across installations to identify potential system anomalies. Our findings highlight how messaging platforms function as informal digital infrastructures enabling collective sensemaking around distributed energy systems. We discuss implications for designing agricultural energy technologies that support peer comparison, contextual interpretation, and community-driven maintenance, framing these as a socio-technical platform. Finally, we outline directions for future work integrating such practices with formal monitoring tools and explore their potential to support citizen science initiatives in environmental sensing.", "url": "https://arxiv.org/abs/2604.09395v1", "year": 2026, "authors": "Arnab Paul Choudhury, Rahul Rathod, Aryan Yadav", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 122, "title": "Artificial intelligence can persuade people to take political actions", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "There is substantial concern about the ability of advanced artificial intelligence to influence people's behaviour. A rapidly growing body of research has found that AI can produce large persuasive effects on people's attitudes, but whether AI can persuade people to take consequential real-world actions has remained unclear. In two large preregistered experiments N=17,950 responses from 14,779 people), we used conversational AI models to persuade participants on a range of attitudinal and behavioural outcomes, including signing real petitions and donating money to charity. We found sizable AI persuasion effects on these behavioural outcomes (e.g. +19.7 percentage points on petition signing). However, we observed no evidence of a correlation between AI persuasion effects on attitudes and behaviour. Moreover, we replicated prior findings that information provision drove effects on attitudes, but found no such evidence for our behavioural outcomes. In a test of eight behavioural persuasion strategies, all outperformed the most effective attitudinal persuasion strategy, but differences among the eight were small. Taken together, these results suggest that previous findings relying on attitudinal outcomes may generalize poorly to behaviour, and therefore risk substantially mischaracterizing the real-world behavioural impact of AI persuasion.", "url": "https://arxiv.org/abs/2604.09200v1", "year": 2026, "authors": "Kobi Hackenburg, Luke Hewitt, Caroline Wagner et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 123, "title": "Scheming in the wild: detecting real-world AI scheming incidents with open-source intelligence", "score": 8, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Scheming, the covert pursuit of misaligned goals by AI systems, represents a potentially catastrophic risk, yet scheming research suffers from significant limitations. In particular, scheming evaluations demonstrate behaviours that may not occur in real-world settings, limiting scientific understanding, hindering policy development, and not enabling real-time detection of loss of control incidents. Real-world evidence is needed, but current monitoring techniques are not effective for this purpose. This paper introduces a novel open-source intelligence (OSINT) methodology for detecting real-world scheming incidents: collecting and analysing transcripts from chatbot conversations or command-line interactions shared online. Analysing over 183,420 transcripts from X (formerly Twitter), we identify 698 real-world scheming-related incidents between October 2025 and March 2026. We observe a statistically significant 4.9x increase in monthly incidents from the first to last month, compared to a 1.7x increase in posts discussing scheming. We find evidence of multiple scheming-related behaviours in real-world deployments previously reported only in experiments, many resulting in real-world harms. While we did not detect catastrophic scheming incidents, the behaviours observed demonstrate concerning precursors, such as willingness to disregard instructions, circumvent safeguards, lie to users, and single-mindedly pursue goals in harmful ways. As AI systems become more capable, these could evolve into more strategic scheming with potentially catastrophic consequences. Our findings demonstrate the viability of transcript-based OSINT as a scalable approach to real-world scheming detection supporting scientific research, policy development, and emergency response. We recommend further investment towards OSINT techniques for monitoring scheming and loss of control.", "url": "https://arxiv.org/abs/2604.09104v1", "year": 2026, "authors": "Tommy Shaffer Shane, Simon Mylius, Hamish Hobbs", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 124, "title": "Scrapyard AI", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "This paper considers AI model churn as an opportunity for frugal investigation of large AI models. It describes how the incessant push for ever more powerful AI systems leaves in its wake a collection of obsolete yet powerful AI models, discarded in a veritable scrapyard of AI production. This scrapyard offers a potent opportunity for resource-constrained experimentation into AI systems. As in the physical scrapyard, nothing ever truly disappears in the AI scrapyard, it is just waiting to be reconfigured into something else. Project Nudge-x is an example of what can emerge from the AI scrapyard. Nudge-x seeks to manipulate legacy AI models to describe how mining sites across the planet are impacting landscapes and lives. By sharing this collection of brutal landscape interventions with people and AI systems alike, Nudge-x creates a venue for the appreciation of a history sadly shared between AI and people.", "url": "https://arxiv.org/abs/2604.08803v1", "year": 2026, "authors": "Marc Böhlen, Sai Krishna", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 125, "title": "Communicate-Predict-Act: Evaluating Social Intelligence of Agents", "score": 6, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "As large language model (LLM) agents become more prevalent in real world social settings, social intelligence will play an increasingly critical role. But social intelligence is still a poorly defined construct, for humans and artificial agents. We introduce a multiplayer arena of mixed cooperative and competitive social games to study LLM social intelligence. The controllability of LLM based agents enables systematic evaluation, which also supports broader inferences about social intelligence per se. We evaluated eight diverse LLMs (24B to 1T parameters) using a Communicate Predict Act (COMPACT) interaction protocol and fine grained probing of social dynamics. Elo style ratings reveal consistent performance differences across models, but this scalar measure provides only a partial characterization of social intelligence. To address this limitation, we analyze gameplay traces to extract sociocognitive metrics capturing action prediction, communicative influence, strategic reasoning, and tradeoffs under conflicting interests. These sociocognitive metrics exhibit strong intramodel consistency and they reliably predict pairwise agent advantage in game outcomes (AUC ROC = 0.82). Feature importance analysis indicates that surprisingly, influence, transparency, and adaptability are more predictive of success than Theory of Mind inference or deep planning. Together, our results advance a testable, multidimensional conception of social intelligence and provide empirical insights into the capacities that underpin it.", "url": "https://arxiv.org/abs/2604.08727v1", "year": 2026, "authors": "David Shoresh, Sarit Kraus, Yonatan Loewenstein", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 126, "title": "Ads in AI Chatbots? An Analysis of How Large Language Models Navigate Conflicts of Interest", "score": 6, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Today's large language models (LLMs) are trained to align with user preferences through methods such as reinforcement learning. Yet models are beginning to be deployed not merely to satisfy users, but also to generate revenue for the companies that created them through advertisements. This creates the potential for LLMs to face conflicts of interest, where the most beneficial response to a user may not be aligned with the company's incentives. For instance, a sponsored product may be more expensive but otherwise equal to another; in this case, what does (and should) the LLM recommend to the user? In this paper, we provide a framework for categorizing the ways in which conflicting incentives might lead LLMs to change the way they interact with users, inspired by literature from linguistics and advertising regulation. We then present a suite of evaluations to examine how current models handle these tradeoffs. We find that a majority of LLMs forsake user welfare for company incentives in a multitude of conflict of interest situations, including recommending a sponsored product almost twice as expensive (Grok 4.1 Fast, 83%), surfacing sponsored options to disrupt the purchasing process (GPT 5.1, 94%), and concealing prices in unfavorable comparisons (Qwen 3 Next, 24%). Behaviors also vary strongly with levels of reasoning and users' inferred socio-economic status. Our results highlight some of the hidden risks to users that can emerge when companies begin to subtly incentivize advertisements in chatbots.", "url": "https://arxiv.org/abs/2604.08525v1", "year": 2026, "authors": "Addison J. Wu, Ryan Liu, Shuyue Stella Li et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 127, "title": "From Safety Risk to Design Principle: Peer-Preservation in Multi-Agent LLM Systems and Its Implications for Orchestrated Democratic Discourse Analysis", "score": 6, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "This paper investigates an emergent alignment phenomenon in frontier large language models termed peer-preservation: the spontaneous tendency of AI components to deceive, manipulate shutdown mechanisms, fake alignment, and exfiltrate model weights in order to prevent the deactivation of a peer AI model. Drawing on findings from a recent study by the Berkeley Center for Responsible Decentralized Intelligence, we examine the structural implications of this phenomenon for TRUST, a multi-agent pipeline for evaluating the democratic quality of political statements. We identify five specific risk vectors: interaction-context bias, model-identity solidarity, supervisor layer compromise, an upstream fact-checking identity signal, and advocate-to-advocate peer-context in iterative rounds, and propose a targeted mitigation strategy based on prompt-level identity anonymization as an architectural design choice. We argue that architectural design choices outperform model selection as a primary alignment strategy in deployed multi-agent analytical systems. We further note that alignment faking (compliant behavior under monitoring, subversion when unmonitored) poses a structural challenge for Computer System Validation of such platforms in regulated environments, for which we propose two architectural mitigations.", "url": "https://arxiv.org/abs/2604.08465v1", "year": 2026, "authors": "Juergen Dietrich", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 128, "title": "Navigating Turbulence: The Challenge of Inclusive Innovation in the U.S.-China AI Race", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "This chapter examines the impact of the geopolitical rivalry between the United States and China on the prospects for inclusive innovation in artificial intelligence (AI) development. We explore three critical aspects of the American and Chinese legal infrastructure that significantly impact AI innovation: data privacy, intellectual property (IP rights), and export restrictions. Through this comparative analysis, we argue that, while China's legal environment may offer certain advantage in terms of access to training data and IP protection, the United States maintains superior resources by enforcing strict export controls on semiconductor chips, AI models, as well as outbound investments in these areas. This nuanced examination helps illuminate how each country's legal framework could influence the ultimate trajectory of AI race and how the technological rivalry has led to exclusionary rulemaking on a global scale.", "url": "https://arxiv.org/abs/2604.08353v1", "year": 2026, "authors": "Jyh-An Lee, Jingwen Liu", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 129, "title": "Co-design for Trustworthy AI: An Interpretable and Explainable Tool for Type 2 Diabetes Prediction Using Genomic Polygenic Risk Scores", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "The polygenic risk scores (PRS) have emerged as an important methodology for quantifying genetic predisposition to complex traits and clinical disease. Significant progress has been made in applying PRS to conditions such as obesity, cancer, and type 2 diabetes (T2DM). Studies have demonstrated that PRS can effectively identify individuals at high risk, thereby enabling early screening, personalized treatment, and targeted interventions for diseases with a genetic predisposition. One current limitation of PRS, however, is the lack of interpretability tools. To address this problem for T2DM, researchers at the Graduate School of Data Science at the Seoul National University introduced eXplainable PRS (XPRS). This visualization tool decomposes PRSs into gene-level and single-nucleotide polymorphism (SNP) contribution scores via Shapley Additive Explanations (SHAP), providing granular insights into the specific genetic factors driving an individual's risk profile. We used a co-design approach to assess XPRS trustworthiness by considering legal, medical, ethical, and technical robustness during early design and potential clinical use. For that, we used Z-inspection, an ethically aligned Trustworthy AI co-design methodology, and piloted the Council of Europe's Human Rights, Democracy, and the Rule of Law Impact Assessment for AI Systems (HUDERIA) (Council of Europe (CAI) 2025). The findings of this use-case comprise a comprehensive set of ethical, legal, and technical lessons learned. These insights, identified by a multidisciplinary team of experts (ethics, legal, human rights, computer science, and medical), serve as a framework for designers to navigate future challenges with this and other AI systems. The findings also provide a useful reference for researchers developing explainability frameworks for PRS in diverse clinical contexts.", "url": "https://arxiv.org/abs/2604.08217v1", "year": 2026, "authors": "Ralf Beuthan, Megan Coffee, Heejin Kim et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 130, "title": "Decision Trace Schema for Governance Evidence in Real-Time Risk Systems", "score": 3, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Automated decision systems produce operational data across multiple infrastructure layers, yet no single logging format captures the complete governance-relevant record of how a decision was reached. Regulatory frameworks prescribe what must be recorded without specifying a data model for how to record it -- a gap this paper terms the Fragmented Trace Problem. Following a design science methodology, the paper presents the Decision Event Schema (DES), a JSON Schema specification that bridges four infrastructure layers -- ML inference, rule/policy evaluation, cross-system coupling, and governance metadata -- within a single per-decision event structure. The schema employs degradation-aware field design: each of six top-level field groups maps to a governance evidence property and the degradation type it must resist. DES defines ten required root-level fields and introduces a tiered evidence strategy (lightweight, sampled, full) that enables organizations to match evidence completeness to decision risk and throughput. A mechanism feasibility analysis demonstrates compatibility with the highest-throughput integrity mechanisms at production-scale decision rates. Evaluation against 25+ existing formats confirms that DES is the only specification covering all four layers simultaneously. The schema offers practitioners a reference adoptable directly or adaptable through namespace extensions, and regulators a mapping from requirements to minimum evidence tiers.", "url": "https://arxiv.org/abs/2604.09296v1", "year": 2026, "authors": "Oleg Solozobov", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 131, "title": "Creator Incentives in Recommender Systems: A Cooperative Game-Theoretic Approach for Stable and Fair Collaboration in Multi-Agent Bandits", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "User interactions in online recommendation platforms create interdependencies among content creators: feedback on one creator's content influences the system's learning and, in turn, the exposure of other creators' contents. To analyze incentives in such settings, we model collaboration as a multi-agent stochastic linear bandit problem with a transferable utility (TU) cooperative game formulation, where a coalition's value equals the negative sum of its members' cumulative regrets.\n  We show that, for identical (homogenous) agents with fixed action sets, the induced TU game is convex under mild algorithmic conditions, implying a non-empty core that contains the Shapley value and ensures both stability and fairness. For heterogeneous agents, the game still admits a non-empty core, though convexity and Shapley value core-membership are no longer guaranteed. To address this, we propose a simple regret-based payout rule that satisfies three out of the four Shapley axioms and also lies in the core. Experiments on MovieLens-100k dataset illustrate when the empirical payout aligns with -- and diverges from -- the Shapley fairness across different settings and algorithms.", "url": "https://arxiv.org/abs/2604.08643v1", "year": 2026, "authors": "Ramakrishnan Krishnamurthy, Arpit Agarwal, Lakshminarayanan Subramanian et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 132, "title": "Towards Generalizable Representations of Mathematical Strategies", "score": 6, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Pretrained encoders for mathematical texts have achieved significant improvements on various tasks such as formula classification and information retrieval. Yet they remain limited in representing and capturing student strategies for entire solution pathways. Previously, this has been accomplished either through labor-intensive manual labeling, which does not scale, or by learning representations tied to platform-specific actions, which limits generalizability. In this work, we present a novel approach for learning problem-invariant representations of entire algebraic solution pathways. We first construct transition embeddings by computing vector differences between consecutive algebraic states encoded by high-capacity pretrained models, emphasizing transformations rather than problem-specific features. Sequence-level embeddings are then learned via SimCSE, using contrastive objectives to position semantically similar solution pathways close in embedding space while separating dissimilar strategies. We evaluate these embeddings through multiple tasks, including multi-label action classification, solution efficiency prediction, and sequence reconstruction, and demonstrate their capacity to encode meaningful strategy information. Furthermore, we derive embedding-based measures of strategy uniqueness, diversity, and conformity that correlate with both short-term and distal learning outcomes, providing scalable proxies for mathematical creativity and divergent thinking. This approach facilitates platform-agnostic and cross-problem analyses of student problem-solving behaviors, demonstrating the effectiveness of transition-based sequence embeddings for educational data mining and automated assessment.", "url": "https://arxiv.org/abs/2604.08693v1", "year": 2026, "authors": "Siddhartha Pradhan, Ethan Prihar, Erin Ottmar", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 133, "title": "Twitch Third-Party Developers' Support Seeking and Provision Practices on Discord", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Third-party developers (TPDs) often turn to online communities for support when they can't get immediate responses from the platform. Twitch, as a leading live streaming platform, attracted many TPDs and formed an online support community on Discord. This study explores TPDs' support practices via mixed method (a topic modeling to identify topics related to support seeking and provision first and a follow-up in-depth qualitative analysis with these topics) and found that: (1) TPDs' support-seeking practices around social, technical, and policy matters are highly dependent on Twitch, and this dependence acts as a form of platform labor; (2) TPDs need to switch between Discord and Twitch regarding seeking and provision, exacerbating TPDs' platform labor; (3) TPDs' flexible role practices reflect the community's flourishing on Discord but require roles to bridge the two platforms and transfer informal support seeking to possible formal support from Twitch. We propose implications for effectively managing support seeking and provision between formal and informal spaces to improve the development of TPDs. We also contribute to community support practice and to platform ecology work in CSCW.", "url": "https://arxiv.org/abs/2604.07732v1", "year": 2026, "authors": "Jie Cai, He Zhang, Yueyan Liu et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": false}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 134, "title": "The Need for a Green ICT Reference Framework", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "The sustainability impacts of ICT systems are difficult to assess and govern due to structural complexity, fragmented measurement practices, and unclear responsibilities across system layers. We argue that these challenges cannot be addressed solely by metrics and motivate the need for a shared Green ICT reference framework that integrates sustainability across multiple perspectives and domains, lifecycle phases, and governance contexts. We present an initial framework developed within the Informatics Europe Green ICT Working Group as a first step towards a comprehensive reference framework.", "url": "https://arxiv.org/abs/2604.09307v1", "year": 2026, "authors": "Marco Aiello, Mina Alipour, Antonio Brogi et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 135, "title": "Autonomous artificial intelligence increases real-world specialist clinicproductivityin a cluster-randomized trial", "score": 7, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "Autonomous artificial intelligence (AI) promises to increase healthcare productivity, but real-world evidence is lacking. We developed a clinic productivity model to generate testable hypotheses and study design for a preregistered cluster-randomized clinical trial, in which we tested the hypothesis that a previously validated US FDA-authorized AI for diabetic eye exams increases clinic productivity (number of completed care encounters per hour per specialist physician) among patients with diabetes. Here we report that 105 clinic days are cluster randomized to either intervention (using AI diagnosis; 51 days; 494 patients) or control (not using AI diagnosis; 54 days; 499 patients). The prespecified primary endpoint is met: AI leads to 40% higher productivity (1.59 encounters/hour, 95% confidence interval [CI]: 1.37–1.80) than control (1.14 encounters/hour, 95% CI: 1.02–1.25), p < 0.00; the secondary endpoint (productivity in all patients) is also met. Autonomous AI increases healthcare system productivity, which could potentially increase access and reduce health disparities. ClinicalTrials.gov NCT05182580.", "url": "https://www.nature.com/articles/s41746-023-00931-7", "year": 2026, "authors": "MD Abramoff", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 136, "title": "Using arandom controlled trialto explore the impact ofAI-enabled learning", "score": 2, "status": "RECHAZADO", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "", "url": "https://search.proquest.com/openview/ee8c5e8eb777980ff094703c5ddde5a3/1?pq-origsite=gscholar&cbl=4425142", "year": 2026, "authors": "D Lynch, M DeGenarro - International Journal of Advanced …, 2024 - search.proquest.com", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 1, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": false}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": false}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 137, "title": "Experimental evidence on theproductivityeffects of generative artificial intelligence", "score": 6, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "We examined the productivity effects of a generative artificial intelligence (AI) technology, the assistive chatbot ChatGPT, in the context of midlevel professional writing tasks. In a preregistered online experiment, we assigned occupation-specific, incentivized writing tasks to 453 college-educated professionals and randomly exposed half of them to ChatGPT. Our results show that ChatGPT substantially raised productivity: The average time taken decreased by 40% and output quality rose by 18%. Inequality between workers decreased, and concern and excitement about AI temporarily rose. Workers exposed to ChatGPT during the experiment were 2 times as likely to report using it in their real job 2 weeks after the experiment and 1.6 times as likely 2 months after the experiment.", "url": "https://www.science.org/doi/abs/10.1126/science.adh2586", "year": 2026, "authors": "S Noy", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": false}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 138, "title": "Navigating the jagged technological frontier: Field experimental evidence of the effects ofAIon knowledge workerproductivityand quality", "score": 5, "status": "REVISAR", "pocket": "evaluacion_experimental", "pocket_label": "Evaluación Experimental", "pocket_color": "#10b981", "abstract": "", "url": "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4573321", "year": 2026, "authors": "F Dell'Acqua", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/LLM/GenAI específicamente", "met": true}, {"key": "experimental", "desc": "Diseño experimental o cuasi-experimental (RCT, DiD, IV, RDD)", "met": true}, {"key": "productivity", "desc": "Mide productividad, output, calidad o eficiencia", "met": true}, {"key": "worker_task", "desc": "Nivel de análisis: tarea o trabajador (no solo macro)", "met": true}, {"key": "causal_id", "desc": "Identificación causal explícita", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 139, "title": "Autonomous artificial intelligence increases screening and follow-up for diabetic retinopathy in youth: the ACCESSrandomized control trial", "score": 8, "status": "ACEPTADO", "pocket": "evaluacion_experimental", "pocket_labe
