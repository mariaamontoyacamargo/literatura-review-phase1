nd, we obtain useful insights on the perceived deficiencies of their interaction with the system, so we can re-design a better, more human-centered explanation interface.", "url": "https://dl.acm.org/doi/abs/10.1145/3587271", "year": 2026, "authors": "C Panigutti", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": true}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 322, "title": "Artificial intelligence(AI) for user experience (UX)design: a systematic literature review and future research agenda", "score": 3, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "Purpose The aim of this article is to map the use of AI in the user experience (UX) design process. Disrupting the UX process by introducing novel digital tools such as artificial intelligence (AI) has the potential to improve efficiency and accuracy, while creating more innovative and creative solutions. Thus, understanding how AI can be leveraged for UX has important research and practical implications. Design/methodology/approach This article builds on a systematic literature review approach and aims to understand how AI is used in UX design today, as well as uncover some prominent themes for future research. Through a process of selection and filtering, 46 research articles are analysed, with findings synthesized based on a user-centred design and development process. Findings The authors’ analysis shows how AI is leveraged in the UX design process at different key areas. Namely, these include understanding the context of use, uncovering user requirements, aiding solution design, and evaluating design, and for assisting development of solutions. The authors also highlight the ways in which AI is changing the UX design process through illustrative examples. Originality/value While there is increased interest in the use of AI in organizations, there is still limited work on how AI can be introduced into processes that depend heavily on human creativity and input. Thus, the authors show the ways in which AI can enhance such activities and assume tasks that have been typically performed by humans.", "url": "https://www.emerald.com/itp/article-abstract/37/6/2324/1231169", "year": 2026, "authors": "Å Stige,", "venue": "", "citations": 137, "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 323, "title": "Investigating how practitioners usehuman-aiguidelines: A case study on the people+aiguidebook", "score": 4, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://dl.acm.org/doi/abs/10.1145/3544548.3580900", "year": 2026, "authors": "N Yildirim", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 324, "title": "Generative AI, why, how, and outcomes: Auser adoptionstudy", "score": 6, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "Drawing on the extended unified theory of acceptance and use of technology (UTAUT2) and task-technology fit (TTF) theory, we developed an integrated research model to explore the factors affecting ChatGPT use and its subsequent effects on whether users continue using ChatGPT and recommend it to others. We also examined the main activities of ChatGPT use as well as the moderating role of curiosity in the relationships between various influencing factors and ChatGPT use. We conducted a quantitative study with data that we collected from 671 users in Vietnam. We found that, first, most UTAUT2 and TTF dimensions affected ChatGPT use. Interestingly, contrary to our expectations, effort expectancy, social influence, and trust had no effect on ChatGPT use. Second, ChatGPT use directly influenced intention to continue using ChatGPT and word of mouth (WOM). Third, intention to continue using ChatGPT had a significant effect on WOM. Finally, we found that curiosity acted as a moderator in only three paths from hedonic motivation, facilitating conditions, and performance expectancy to ChatGPT use. With this study, we contribute a unique research model that combines the UTAUT2 and the TTF (including both trust and curiosity) as well as knowledge about users’ behavioral process in technology adoption by examining a comprehensive process, namely, actual usage– continuance intention to use–recommending. Practical implications for ChatGPT providers, policymakers, and business marketers are also discussed.", "url": "https://aisel.aisnet.org/thci/vol16/iss1/1/", "year": 2026, "authors": "LV Huy", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": true}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 325, "title": "Adoptionand impacts ofgenerative artificial intelligence: Theoretical underpinnings and research agenda", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://www.sciencedirect.com/science/article/pii/S2667096824000211", "year": 2026, "authors": "R Gupta", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 326, "title": "The rapidadoptionofgenerative AI", "score": 3, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "Generative artificial intelligence (genAI) is a potentially important new technology, but its impact on the economy depends on the speed and intensity of adoption. This paper reports results from a series of nationally representative U.S. surveys of genAI use at work and at home. As of late 2024, 45% of the U.S. population age 18–64 uses genAI. Among employed respondents, 27% used genAI for work at least once in the previous week: 10% used it every workday and 17% on some but not all workdays. Relative to each technology’s first mass-market product launch, work adoption of genAI has been faster than the personal computer (PC), and overall adoption has outpaced both PCs and the internet by an even wider margin. Between 1% and 7% of all work hours are currently assisted by genAI, and respondents report time savings equivalent to 1.4% of total work hours. Potential productivity gains vary widely by industry, and firm climate and policies play an important role in adoption patterns.\n                  This paper was accepted by Alfonso Gambardello, business strategy.\n                  Funding: This work was supported by the Walmart Foundation [Grant 252882].\n                  Supplemental Material: The online appendix and data files are available at https://doi.org/10.1287/mnsc.2025.02523 .", "url": "https://pubsonline.informs.org/doi/abs/10.1287/mnsc.2025.02523", "year": 2026, "authors": "A Bick", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 327, "title": "An empirical evaluation of agenerative artificial intelligencetechnologyadoptionmodel from entrepreneurs' perspectives", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://www.mdpi.com/2079-8954/12/3/103", "year": 2026, "authors": "V Gupta - Systems, 2024 - mdpi.com", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 328, "title": "Breaking barriers: investigatinggenerative AI adoptionand organizationaluse", "score": 3, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://www.emerald.com/jeim/article/39/1/267/1269903", "year": 2026, "authors": "N Albishri", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 329, "title": "Learning to adoptgenerative AI", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "Recent advancements in generative AI, such as ChatGPT, have dramatically transformed how people access information. Despite its powerful capabilities, the benefits it provides may not be equally distributed among individuals, a phenomenon referred to as the digital divide. Building upon prior literature, we propose two forms of digital divide in the generative AI adoption process: (i) the learning divide, capturing individuals' heterogeneous abilities to update their perceived utility of ChatGPT; and (ii) the utility divide, representing differences in individuals' actual utility derived from per use of ChatGPT. To evaluate these two divides, we develop a Bayesian learning model that incorporates heterogeneities in both the utility and signal functions. Leveraging a large-scale clickstream dataset, we estimate the model and find significant learning and utility divides across various social characteristics. Interestingly, individuals without any college education, non-white individuals, and those with lower English literacy derive larger utility gains from ChatGPT, yet update their beliefs about its utility at a slower rate. Furthermore, males, younger individuals, and those in occupations with greater exposure to generative AI not only obtain higher utility per use from ChatGPT but also learn about its utility more rapidly. Besides, we document a phenomenon termed the belief trap, wherein users underestimate ChatGPT's utility, opt not to use the tool, and thereby lack new experiences to update their perceptions, leading to continued underutilization. Our simulation further demonstrates that the learning divide can significantly affect the probability of falling into the belief trap, another form of the digital divide in adoption outcomes (i.e., outcome divide); however, offering training programs can alleviate the belief trap and mitigate the divide.", "url": "https://arxiv.org/abs/2410.19806", "year": 2026, "authors": "L Ma", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 330, "title": "Generative artificial intelligence(AI) technologyadoptionmodel for entrepreneurs: case of ChatGPT", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://www.tandfonline.com/doi/abs/10.1080/10875301.2023.2300114", "year": 2026, "authors": "V Gupta, H Yang - Internet Reference Services Quarterly, 2024 - Taylor & Francis", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "co ctive. In this work we attempt to establish a proof of concept framework whereby technology adoption of innovative healthcare solutions can be built using generative AI. By considering established and validated clinical questionnaires for the purposes of assessing technology adoption for patients we have created a new suite of questionnaires that can be used for care givers. The approach was evaluated with a set of 28 patient focussed questions. All of the questions produced by the generative AI were deemed to be correct with an average Rouge-1 F1 score of 0.71.", "url": "https://link.springer.com/chapter/10.1007/978-3-031-48306-6_20", "year": 2026, "authors": "C Nugent", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 333, "title": "Driving factors ofgenerative AI adoptionin new product development teams from a UTAUT perspective", "score": 3, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://www.tandfonline.com/doi/abs/10.1080/10447318.2024.2375686", "year": 2025, "authors": "Y Xia,", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola) enue": "", "citations": 1986, "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": false}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 336, "title": "Determinants ofgenerative AIsystemadoptionand usage behavior in Korean companies: Applying the UTAUT model", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://www.mdpi.com/2076-328X/14/11/1035", "year": 2024, "authors": "Y Kim, V Blazquez,", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 337, "title": "Navigating the complexity ofgenerative ai adoptionin software engineering", "score": 7, "status": "ACEPTADO", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "This article explores the adoption of Generative Artificial Intelligence (AI) tools within the domain of software engineering, focusing on the influencing factors at the individual, technological, and social levels. We applied a convergent mixed-methods approach to offer a comprehensive understanding of AI adoption dynamics. We initially conducted a questionnaire survey with 100 software engineers, drawing upon the Technology Acceptance Model, the Diffusion of Innovation Theory, and the Social Cognitive Theory as guiding theoretical frameworks. Employing the Gioia methodology, we derived a theoretical model of AI adoption in software engineering: the Human-AI Collaboration and Adaptation Framework. This model was then validated using Partial Least Squares–Structural Equation Modeling based on data from 183 software engineers. Findings indicate that at this early stage of AI integration, the compatibility of AI tools within existing development workflows predominantly drives their adoption, challenging conventional technology acceptance theories. The impact of perceived usefulness, social factors, and personal innovativeness seems less pronounced than expected. The study provides crucial insights for future AI tool design and offers a framework for developing effective organizational implementation strategies.", "url": "https://dl.acm.org/doi/abs/10.1145/3652154", "year": 2026, "authors": "D Russo", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 338, "title": "Is it the end of the technology acceptance model in the era ofgenerative artificial intelligence?", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://www.emerald.com/insight/content/doi/10.1108/ijchm-08-2023-1271/full/pdf", "year": 2026, "authors": "E Mogaji", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 339, "title": "Predicting theusabilityof mobile applications usingAItools: the rise of large userinterfacemodels, opportunities, and challenges", "score": 3, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://www.sciencedirect.com/science/article/pii/S1877050924013127", "year": 2026, "authors": "A Namoun", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 340, "title": "U “AI” testing: userinterfaceandusabilitytesting of a chest X-rayAItool in a simulated real-world workflow", "score": 6, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "Purpose: To observe interactions of practicing radiologists with a chest x-ray AI tool and evaluate its usability and impact on workflow efficiency. Methods: Using a simulated clinical workflow and remote multi-monitor screensharing, we prospectively assessed the interactions of 10 staff radiologists (5–33 years of experience) with a PACS-embedded, regulatory-approved chest x-ray AI tool. Qualitatively, we collected feedback using a think-aloud method and post-testing semi-structured interview; transcript themes were categorized by: (1) AI tool features, (2) deployment considerations, and (3) broad human-AI interactions. Quantitatively, we used time-stamped video recordings to compare reporting and decision-making efficiency with and without AI assistance. Results: For AI tool features, radiologists appreciated the simple binary classification (normal vs abnormal) and found the heatmap essential to understand what the AI considered abnormal; users were uncertain of how to interpret confidence values. Regarding deployment considerations, radiologists thought the tool would be especially helpful for identifying subtle diagnoses; opinions were mixed on whether the tool impacted perceived efficiency, accuracy, and confidence. Considering general human-AI interactions, radiologists shared concerns about automation bias especially when relying on an automated triage function. Regarding decision-making and workflow efficiency, participants began dictating 5 seconds later (42% increase, P = .02) and took 14 seconds longer to complete cases (33% increase, P = .09) with AI assistance. Conclusions: Radiologist usability testing provided insights into effective AI tool features, deployment considerations, and human-AI interactions that can guide successful AI deployment. Early AI adoption may increase radiologists’ decision-making and total reporting time but improves with experience.", "url": "https://journals.sagepub.com/doi/abs/10.1177/08465371221131200", "year": 2026, "authors": "J Lam Shin Cheung, A Ali… - … of Radiologists Journal, 2023 - journals.sagepub.com", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": true}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 341, "title": "Towards anAI-driven userinterfacedesign for web applications", "score": 3, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://www.sciencedirect.com/science/article/pii/S1877050924011104", "year": 2026, "authors": "A Costa", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outc
