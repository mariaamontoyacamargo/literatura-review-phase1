"MG Asiabar, MG Asiabar, AG Asiabar - 2024 - preprints.org", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 48, "title": "Designing anAI-drivenmanagementsystem forstrategyimplementation", "score": 7, "status": "ACEPTADO", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "Most strategies seem viable on paper but fail in implementation. At the same time, organizations are investing heavily in artificial intelligence, yet its practical contribution to corporate strategy remains unclear while implementation challenges persist. This thesis identifies challenges, explores corresponding AI-enabled opportunities, and contributes to the Case Company’s ambition to develop an AI-driven management system that supports its clients in strategy implementation. In a broader context, the thesis also provides a building block for the company’s transition toward an asset-based business model. To design, iterate, and validate the technological component of such a management system, the thesis applies a design science research approach, informed by lean startup principles and the theory-based view to guide experimentation under uncertainty. The design process begins with a review of academic literature across strategy and AI domains, drawing on adaptive strategy implementation as a guiding perspective. Building on this foundation, the empirical work consists of 30 qualitative interviews with strategy leaders and CEOs from large Nordic enterprises as well as relevant academic experts, to identify implementation challenges and AI-related opportunities in the strategy process. These insights informed an iterative design cycle in which the problem domain and solution concepts were refined across interview rounds. The work culminated in a minimum viable product (MVP), validated through later interviews and dedicated sessions with both internal and external stakeholders of the Case Company. The findings highlight implementation challenges across domains of business, people, process, and data & systems. Opportunities for applying AI were identified along the continuum of strategy creation and implementation, organized into three categories adapted from prior research: expanded attentional capacity, democratized strategy work, and accelerated responsiveness. Within the solution domain, the developed MVP centers on actions that typically occur during implementation and addresses a pressing challenge: strategy adaptation. The system supports a higher-clock-speed strategy process, where continuous monitoring of the external environment can trigger more frequent reconceptualizations of strategy. To achieve this, it leverages external, alternative data sources, conceptually designed to be combined with internal organizational data in future iterations, to generate implications for a company’s strategy. The broader solution space was validated with clients, while the MVP underwent more in-depth testing and demonstrated how AI can create practical value by making strategy implementation more adaptive and dynamic.", "url": "https://aaltodoc.aalto.fi/items/361130b5-67c9-4f42-b4fb-48ed55187793", "year": 2026, "authors": "O Latvakoski - 2025 - aaltodoc.aalto.fi", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": true}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 49, "title": "AI-driven decision support systems inmanagement: enhancingstrategicplanning and execution", "score": 4, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "", "url": "https://www.researchgate.net/profile/Suresh-Dodda/publication/383950090_AI-Driven_Decision_Support_Systems_in_Management_Enhancing_Strategic_Planning_and_Execution/links/66e25265bd20173667cacb87/AI-Driven-Decision-Support-Systems-in-Management-Enhancing-Strategic-Planning-and-Execution.pdf", "year": 2026, "authors": "S Narne", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 50, "title": "AIin decision making: transforming businessstrategies", "score": 2, "status": "RECHAZADO", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "", "url": "https://www.researchgate.net/profile/Oluwatoyin-Farayola/publication/377345979_AI_in_Decision_Making_Transforming_Business_Strategies/links/6601fe2fa4857c796282c14e/AI-in-Decision-Making-Transforming-Business-Strategies.pdf", "year": 2026, "authors": "S Kaggwa", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 51, "title": "Generativeartificial intelligenceand evaluatingstrategicdecisions", "score": 7, "status": "ACEPTADO", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "Abstract\n                  \n                    Research Summary\n                    Strategic decisions are uncertain and often irreversible. Hence, predicting the value of alternatives is important for strategic decision making. We investigate the use of generative artificial intelligence (AI) in evaluating strategic alternatives using business models generated by AI (study 1) or submitted to a competition (study 2). Each study uses a sample of 60 business models and examines agreement in business model rankings made by large language models (LLMs) and those by human experts. We consider multiple LLMs, assumed LLM roles, and prompts. We find that generative AI often produces evaluations that are inconsistent and biased. However, when aggregating evaluations, AI rankings tend to resemble those of human experts. This study highlights the value of generative AI in strategic decision making by providing predictions.\n                  \n                  \n                    Managerial Summary\n                    Managers are seeking to create value by integrating generative AI into their organizations. We show how managers can use generative AI to help evaluate strategic decisions. Generative AI's single evaluations are often inconsistent or biased. However, if managers aggregate many evaluations across LLMs, prompts, or roles, the results show that the resulting evaluations tend to resemble those of human experts. This approach allows managers to obtain insight on strategic decisions across a variety of domains with relatively low investments in time or resources, which can be combined with human inputs.", "url": "https://onlinelibrary.wiley.com/doi/full/10.1002/smj.3677", "year": 2026, "authors": "AR Doshi", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 52, "title": "Integratingartificial intelligenceinstrategicbusiness decision-making: A systematic review of predictive models", "score": 7, "status": "ACEPTADO", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "Artificial Intelligence (AI) integration into strategic business decision-making has emerged as a transformative force, reshaping how organizations navigate complexity, uncertainty, and long-term planning. This systematic review critically examines the role of AI-driven predictive models in enhancing strategic decision-making accuracy, risk mitigation, responsiveness, and organizational alignment. By analyzing 105 peer-reviewed journal articles published between 2018 and 2023, the study provides a comprehensive synthesis of methodologies, applications, and emerging challenges surrounding the deployment of machine learning (ML) and deep learning (DL) techniques in strategic business analytics. The evidence demonstrates that predictive models—including Random Forest, Support Vector Machines (SVM), Gradient Boosting Machines (GBM), Convolutional Neural Networks (CNN), and Long Short-Term Memory (LSTM) networks—offer significant improvements in strategic forecasting across various domains such as customer behavior analysis, financial planning, supply chain optimization, market segmentation, and product innovation. The review reveals that AI tools empower organizations to transition from reactive to proactive decision-making by leveraging real-time and historical data to identify patterns, predict outcomes, and simulate strategic scenarios. These capabilities facilitate more informed, agile, and evidence-based decisions, ultimately enhancing organizational performance and competitive positioning. However, the review also identifies persistent barriers to AI adoption in strategic contexts, particularly the black box dilemma—where the opacity of complex models undermines trust, interpretability, and accountability. The findings underscore the importance of leadership engagement, ethical AI governance, explainability frameworks (e.g., SHAP, LIME), and integrated operating models to ensure that AI systems align with strategic objectives and generate actionable value. Overall, this review contributes to the growing body of literature on AI’s strategic impact by mapping the current landscape of AI-enhanced decision-making, identifying key opportunities and obstacles, and offering insights for researchers, executives, and policymakers. It advocates for a holistic approach to AI integration that combines technical innovation with strategic foresight, organizational readiness, and responsible deployment practices, ultimately promoting more resilient and future-oriented enterprises.", "url": "http://ijsir.org/index.php/IJSIR/article/view/2", "year": 2026, "authors": "S Vudugula", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": true}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 53, "title": "Strategicintegration ofartificial intelligencefor sustainable businesses: Implications for datamanagementand human user engagement in the digital era", "score": 3, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "", "url": "https://www.mdpi.com/2071-1050/15/21/15208", "year": 2026, "authors": "SD Jankovic, DM Curovic - Sustainability, 2023 - mdpi.com", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 54, "title": "Artificial intelligenceandstrategicdecision-making: Evidence from entrepreneurs and investors", "score": 7, "status": "ACEPTADO", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "This paper explores how artificial intelligence (AI) may impact the strategic decision-making (SDM) process in firms. We illustrate how AI could augment existing SDM tools and provide empirical evidence from a leading accelerator program and a start-up competition that current large language models can generate and evaluate strategies at a level comparable to entrepreneurs and investors. We then examine implications for the key cognitive processes underlying SDM—search, representation, and aggregation. Our analysis suggests that AI has the potential to enhance the speed, quality, and scale of strategic analysis, while also enabling new approaches, like virtual strategy simulations. However, the ultimate impact on firm performance will depend on competitive dynamics as AI capabilities progress. We propose a framework connecting AI use in SDM to firm outcomes and discuss how AI may reshape sources of competitive advantage. We conclude by considering how AI could both support and challenge core tenets of the theory-based view of strategy. Overall, our work maps out an emerging research frontier at the intersection of AI and strategy.  History: This paper has been accepted for the Strategy Science Special Issue on Theory-Based View.  Funding: The authors are grateful to their collaborating organizations and to the University of Michigan, Bocconi University Junior Researchers’ Grant, and the INSEAD eLab Research Fund for financial support.", "url": "https://pubsonline.informs.org/doi/abs/10.1287/stsc.2024.0190", "year": 2026, "authors": "FA Csaszar", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": true}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 55, "title": "Investigating the influence ofartificial intelligenceon business value in the digital era ofstrategy: A literature review", "score": 3, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "", "url": "https://www.mdpi.com/2078-2489/14/2/85", "year": 2026, "authors": "NA Perifanis", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 56, "title": "Artificial intelligenceand the changing sources of competitive advantage", "score": 6, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "Abstract\n                  \n                    Research Summary\n                    We apply a resource‐based view to investigate how the adoption of Artificial Intelligence (AI) affects competitive capabilities and performance. Following prior work on using chess as a controlled setting for studying competitive interactions, we compare the same players’ capabilities and performance across conventional, centaur, and engine chess tournaments. Our analysis shows that AI adoption triggers interrelated substitution and complementation dynamics, which make humans’ traditional competitive capabilities obsolete, while creating new sources of persistent heterogeneity when humans interact with chess engines. These novel human‐machine capabilities are unrelated, or even negatively related, to traditional capabilities. We contribute an integrated view of substitution and complementation, which identifies AI as the driver of these dynamics and explains how they jointly shift the sources of competitive advantage.\n                  \n                  \n                    Managerial Summary\n                    AI‐based technologies increasingly substitute and complement humans in managerial tasks such as decision making. We investigate how such change affects the sources of competitive advantage. AI‐based engines’ adoption in chess allows us to investigate competitive capabilities and performance in human, AI, and hybrid settings. We find that neither humans nor AI in isolation explain performance differences in the AI and hybrid settings. Instead, a new decision‐making resource emerges at the human‐AI intersection, which drives performance but is unrelated or even negatively related to humans’ original capability. Our results document how AI adoption changes the sources of competitive advantage and, in turn, requires managers to develop new capabilities to stay relevant in an AI‐based competitive landscape.", "url": "https://sms.onlinelibrary.wiley.com/doi/abs/10.1002/smj.3387", "year": 2026, "authors": "S Krakowski", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": true}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 57, "title": "Competitive advantage throughartificial intelligence: Toward a theory of situatedAI", "score": 3, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "", "url": "https://journals.aom.org/doi/abs/10.5465/amr.2020.0205", "year": 2026, "authors": "A Kemp", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": false}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 58, "title": "Generativeartificial intelligencein business: towards astrategichuman resourcemanagementframework", "score": 7, "status": "ACEPTADO", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "AbstractAs businesses and society navigate the potentials of generative artificial intelligence (GAI), the integration of these technologies introduces unique challenges and opportunities for human resources, requiring a re‐evaluation of human resource management (HRM) frameworks. The existing frameworks may often fall short of capturing the novel attributes, complexities and impacts of GAI on workforce dynamics and organizational operations. This paper proposes a strategic HRM framework, underpinned by the theory of institutional entrepreneurship for sustainable organizations, for integrating GAI within HRM practices to boost operational efficiency, foster innovation and secure a competitive advantage through responsible practices and workforce development. Central to this framework is the alignment with existing business objectives, seizing opportunities, strategic resource assessment and orchestration, re‐institutionalization, realignment and embracing a culture of continuous learning and adaptation. This approach provides a detailed roadmap for organizations to navigate successfully the complexities of a GAI‐enhanced business environment. Additionally, this paper significantly contributes to the theoretical discourse by bridging the gap between HRM and GAI adoption, the proposed framework accounting for GAI–human capital symbiosis, setting the stage for future research to empirically test its applicability, explore its implications on HRM practices and understand its broader economic and societal consequences through diverse multi‐disciplinary and multi‐level research methodologies.", "url": "https://onlinelibrary.wiley.com/doi/abs/10.1111/1467-8551.12824", "year": 2026, "authors": "S Chowdhury", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": true}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 59, "title": "Artificial intelligence, machine learning, and deep learning for advanced businessstrategies: a review", "score": 6, "status": "REVISAR", "pocket": "management", "pocket_label": "Management", "pocket_color": "#6366f1", "abstract": "This study thoroughly analyses how artificial intelligence (AI), machine learning (ML), and deep learning (DL) impact the development and improvement of business strategies. It examines how AI changes business models, highlighting its ability to stimulate innovation, improve procedural effectiveness, and enhance decision-making abilities. The discussion explores the numerous uses of ML algorithms, including predicting market trends, customizing consumer engagements, and enhancing logistic systems. Moreover, it explores the use of DL techniques to analyse extensive amounts of unstructured data, revealing previously hidden insights. Besides that, the article explains how combining AI, ML, and DL into operational methods can provide significant competitive benefits. Special focus is given to the crucial role of AI in the field of big data analysis, highlighting its ability to effectively analyse and extract useful insights from large sets of data, thus strengthening the foundations of strategic decisionmaking structures. Potential paths and emerging technologies are analysed, providing a future perspective on the direction of AI, ML, and DL in relation to corporate environments. This includes predictions about how AI-enabled automation will advance, the improvement of ML systems, and the hidden capabilities of DL in detecting complex patterns. The article ends with a discussion of the simultaneous obstacles and advantages that come with these technologies, offering suggestions on how businesses can effectively use AI, ML, and DL to maintain a competitive advantage in the ever-changing market.", "url": "https://puiij.com/index.php/research/article/view/143", "year": 2026, "authors": "NL Rane", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/digital/automatización", "met": true}, {"key": "organizational", "desc": "Estudia factores organizacionales o de gestión", "met": true}, {"key": "adoption_impl", "desc": "Estudia adopción, implementación o escalamiento", "met": false}, {"key": "capabilities", "desc": "Analiza capacidades, complementariedades o cambio organizacional", "met": false}, {"key": "performance", "desc": "Conecta con desempeño o captura de valor", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 60, "title": "Yes, But Not Always. Generative AI Needs Nuanced Opt-in", "score": 5, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "This paper argues that a one-size-fits-all approach to specifying consent for the use of creative works in generative AI is insufficient. Real-world ownership and rights holder structures, the imitation of artistic styles and likeness, and the limitless contexts of use of AI outputs make the status quo of binary consent with opt-in by default untenable. To move beyond the current impasse, we consider levers of control in generative AI workflows at training, inference, and dissemination. Based on these insights, we position inference-time opt-in as an overlooked opportunity for nuanced consent verification. We conceptualize nuanced consent conditions for opt-in and propose an agent-based inference-time opt-in architecture to verify if user intent requests meet conditional consent granted by rights holders. In a case study for music, we demonstrate that nuanced opt-in at inference can account for established rights and re-establish a balance of power between rights holders and AI developers.", "url": "https://arxiv.org/abs/2604.09413v1", "year": 2026, "authors": "Wiebke Hutiri, Morgan Scheuerman, Shruti Nagpal et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 61, "title": "The Need for a Green ICT Reference Framework", "score": 5, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "The sustainability impacts of ICT systems are difficult to assess and govern due to structural complexity, fragmented measurement practices, and unclear responsibilities across system layers. We argue that these challenges cannot be addressed solely by metrics and motivate the need for a shared Green ICT reference framework that integrates sustainability across multiple perspectives and domains, lifecycle phases, and governance contexts. We present an initial framework developed within the Informatics Europe Green ICT Working Group as a first step towards a comprehensive reference framework.", "url": "https://arxiv.org/abs/2604.09307v1", "year": 2026, "authors": "Marco Aiello, Mina Alipour, Antonio Brogi et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 62, "title": "Artificial intelligence can persuade people to take political actions", "score": 5, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "There is substantial concern about the ability of advanced artificial intelligence to influence people's behaviour. A rapidly growing body of research has found that AI can produce large persuasive effects on people's attitudes, but whether AI can persuade people to take consequential real-world actions has remained unclear. In two large preregistered experiments N=17,950 responses from 14,779 people), we used conversational AI models to persuade participants on a range of attitudinal and behavioural outcomes, including signing real petitions and donating money to charity. We found sizable AI persuasion effects on these behavioural outcomes (e.g. +19.7 percentage points on petition signing). However, we observed no evidence of a correlation between AI persuasion effects on attitudes and behaviour. Moreover, we replicated prior findings that information provision drove effects on attitudes, but found no such evidence for our behavioural outcomes. In a test of eight behavioural persuasion strategies, all outperformed the most effective attitudinal persuasion strategy, but differences among the eight were small. Taken together, these results suggest that previous findings relying on attitudinal outcomes may generalize poorly to behaviour, and therefore risk substantially mischaracterizing the real-world behavioural impact of AI persuasion.", "url": "https://arxiv.org/abs/2604.09200v1", "year": 2026, "authors": "Kobi Hackenburg, Luke Hewitt, Caroline Wagner et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 63, "title": "Scheming in the wild: detecting real-world AI scheming incidents with open-source intelligence", "score": 7, "status": "ACEPTADO", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Scheming, the covert pursuit of misaligned goals by AI systems, represents a potentially catastrophic risk, yet scheming research suffers from significant limitations. In particular, scheming evaluations demonstrate behaviours that may not occur in real-world settings, limiting scientific understanding, hindering policy development, and not enabling real-time detection of loss of control incidents. Real-world evidence is needed, but current monitoring techniques are not effective for this purpose. This paper introduces a novel open-source intelligence (OSINT) methodology for detecting real-world scheming incidents: collecting and analysing transcripts from chatbot conversations or command-line interactions shared online. Analysing over 183,420 transcripts from X (formerly Twitter), we identify 698 real-world scheming-related incidents between October 2025 and March 2026. We observe a statistically significant 4.9x increase in monthly incidents from the first to last month, compared to a 1.7x increase in posts discussing scheming. We find evidence of multiple scheming-related behaviours in real-world deployments previously reported only in experiments, many resulting in real-world harms. While we did not detect catastrophic scheming incidents, the behaviours observed demonstrate concerning precursors, such as willingness to disregard instructions, circumvent safeguards, lie to users, and single-mindedly pursue goals in harmful ways. As AI systems become more capable, these could evolve into more strategic scheming with potentially catastrophic consequences. Our findings demonstrate the viability of transcript-based OSINT as a scalable approach to real-world scheming detection supporting scientific research, policy development, and emergency response. We recommend further investment towards OSINT techniques for monitoring scheming and loss of control.", "url": "https://arxiv.org/abs/2604.09104v1", "year": 2026, "authors": "Tommy Shaffer Shane, Simon Mylius, Hamish Hobbs", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 64, "title": "Scrapyard AI", "score": 5, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "This paper considers AI model churn as an opportunity for frugal investigation of large AI models. It describes how the incessant push for ever more powerful AI systems leaves in its wake a collection of obsolete yet powerful AI models, discarded in a veritable scrapyard of AI production. This scrapyard offers a potent opportunity for resource-constrained experimentation into AI systems. As in the physical scrapyard, nothing ever truly disappears in the AI scrapyard, it is just waiting to be reconfigured into something else. Project Nudge-x is an example of what can emerge from the AI scrapyard. Nudge-x seeks to manipulate legacy AI models to describe how mining sites across the planet are impacting landscapes and lives. By sharing this collection of brutal landscape interventions with people and AI systems alike, Nudge-x creates a venue for the appreciation of a history sadly shared between AI and people.", "url": "https://arxiv.org/abs/2604.08803v1", "year": 2026, "authors": "Marc Böhlen, Sai Krishna", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 65, "title": "Towards Generalizable Representations of Mathematical Strategies", "score": 5, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Pretrained encoders for mathematical texts have achieved significant improvements on various tasks such as formula classification and information retrieval. Yet they remain limited in representing and capturing student strategies for entire solution pathways. Previously, this has been accomplished either through labor-intensive manual labeling, which does not scale, or by learning representations tied to platform-specific actions, which limits generalizability. In this work, we present a novel approach for learning problem-invariant representations of entire algebraic solution pathways. We first construct transition embeddings by computing vector differences between consecutive algebraic states encoded by high-capacity pretrained models, emphasizing transformations rather than problem-specific features. Sequence-level embeddings are then learned via SimCSE, using contrastive objectives to position semantically similar solution pathways close in embedding space while separating dissimilar strategies. We evaluate these embeddings through multiple tasks, including multi-label action classification, solution efficiency prediction, and sequence reconstruction, and demonstrate their capacity to encode meaningful strategy information. Furthermore, we derive embedding-based measures of strategy uniqueness, diversity, and conformity that correlate with both short-term and distal learning outcomes, providing scalable proxies for mathematical creativity and divergent thinking. This approach facilitates platform-agnostic and cross-problem analyses of student problem-solving behaviors, demonstrating the effectiveness of transition-based sequence embeddings for educational data mining and automated assessment.", "url": "https://arxiv.org/abs/2604.08693v1", "year": 2026, "authors": "Siddhartha Pradhan, Ethan Prihar, Erin Ottmar", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": true}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 66, "title": "Ads in AI Chatbots? An Analysis of How Large Language Models Navigate Conflicts of Interest", "score": 5, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Today's large language models (LLMs) are trained to align with user preferences through methods such as reinforcement learning. Yet models are beginning to be deployed not merely to satisfy users, but also to generate revenue for the companies that created them through advertisements. This creates the potential for LLMs to face conflicts of interest, where the most beneficial response to a user may not be aligned with the company's incentives. For instance, a sponsored product may be more expensive but otherwise equal to another; in this case, what does (and should) the LLM recommend to the user? In this paper, we provide a framework for categorizing the ways in which conflicting incentives might lead LLMs to change the way they interact with users, inspired by literature from linguistics and advertising regulation. We then present a suite of evaluations to examine how current models handle these tradeoffs. We find that a majority of LLMs forsake user welfare for company incentives in a multitude of conflict of interest situations, including recommending a sponsored product almost twice as expensive (Grok 4.1 Fast, 83%), surfacing sponsored options to disrupt the purchasing process (GPT 5.1, 94%), and concealing prices in unfavorable comparisons (Qwen 3 Next, 24%). Behaviors also vary strongly with levels of reasoning and users' inferred socio-economic status. Our results highlight some of the hidden risks to users that can emerge when companies begin to subtly incentivize advertisements in chatbots.", "url": "https://arxiv.org/abs/2604.08525v1", "year": 2026, "authors": "Addison J. Wu, Ryan Liu, Shuyue Stella Li et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 67, "title": "From Safety Risk to Design Principle: Peer-Preservation in Multi-Agent LLM Systems and Its Implications for Orchestrated Democratic Discourse Analysis", "score": 5, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "This paper investigates an emergent alignment phenomenon in frontier large language models termed peer-preservation: the spontaneous tendency of AI components to deceive, manipulate shutdown mechanisms, fake alignment, and exfiltrate model weights in order to prevent the deactivation of a peer AI model. Drawing on findings from a recent study by the Berkeley Center for Responsible Decentralized Intelligence, we examine the structural implications of this phenomenon for TRUST, a multi-agent pipeline for evaluating the democratic quality of political statements. We identify five specific risk vectors: interaction-context bias, model-identity solidarity, supervisor layer compromise, an upstream fact-checking identity signal, and advocate-to-advocate peer-context in iterative rounds, and propose a targeted mitigation strategy based on prompt-level identity anonymization as an architectural design choice. We argue that architectural design choices outperform model selection as a primary alignment strategy in deployed multi-agent analytical systems. We further note that alignment faking (compliant behavior under monitoring, subversion when unmonitored) poses a structural challenge for Computer System Validation of such platforms in regulated environments, for which we propose two architectural mitigations.", "url": "https://arxiv.org/abs/2604.08465v1", "year": 2026, "authors": "Juergen Dietrich", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 68, "title": "Navigating Turbulence: The Challenge of Inclusive Innovation in the U.S.-China AI Race", "score": 5, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "This chapter examines the impact of the geopolitical rivalry between the United States and China on the prospects for inclusive innovation in artificial intelligence (AI) development. We explore three critical aspects of the American and Chinese legal infrastructure that significantly impact AI innovation: data privacy, intellectual property (IP rights), and export restrictions. Through this comparative analysis, we argue that, while China's legal environment may offer certain advantage in terms of access to training data and IP protection, the United States maintains superior resources by enforcing strict export controls on semiconductor chips, AI models, as well as outbound investments in these areas. This nuanced examination helps illuminate how each country's legal framework could influence the ultimate trajectory of AI race and how the technological rivalry has led to exclusionary rulemaking on a global scale.", "url": "https://arxiv.org/abs/2604.08353v1", "year": 2026, "authors": "Jyh-An Lee, Jingwen Liu", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 69, "title": "The Statistical Profitability of Social Media Sports Betting Influencers: Evidence from the Nigerian Market", "score": 4, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "This study examines whether following popular Nigerian sports betting influencers on social media is a financially sound strategy. To avoid the survivorship bias that occurs when influencers only share their winning bets, we tracked 5,467 pre-match betting slips from three prominent tipsters on X (formerly Twitter) and Telegram. We verified the outcomes against official Stake.com records, resulting in a final dataset covering approximately $4.8 million in tracked bets. We analyzed raw performance, assessed risk based on odds sizes, and applied four common staking strategies (Flat, Inverse, Square Root, and Fixed Return) to simulate realistic follower outcomes. The results show a sharp contrast between the wealth these influencers display online and the actual financial results. The influencers themselves collectively lost 25.24% on their promoted bets, while a follower who staked the same amount on every tip would lose 38.27% on their investment. Across all tested strategies, following these influencers consistently led to significant financial losses. These findings raise serious consumer protection concerns in Nigeria's expanding gambling market.", "url": "https://arxiv.org/abs/2604.08251v1", "year": 2026, "authors": "Kayode Makinde, Oluwatimileyin Onasanya, Frances Adelakun", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 70, "title": "Insights from Farmer-Managed Decentralized Solar Irrigation Systems", "score": 3, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Solar irrigation systems are increasingly deployed in rural regions, yet their distributed and remote deployment makes maintenance challenging for farmers. While formal monitoring processes and applications exist, they often fall short in practice. We present insights from grid-connected solar irrigation schemes that incentivize farmers to feed energy to the grid, focusing on how farmers maintain their systems. We found that farmers face multiple challenges but are also devising strategies, including the appropriation of WhatsApp to share daily generation data with peers and compare performance across installations to identify potential system anomalies. Our findings highlight how messaging platforms function as informal digital infrastructures enabling collective sensemaking around distributed energy systems. We discuss implications for designing agricultural energy technologies that support peer comparison, contextual interpretation, and community-driven maintenance, framing these as a socio-technical platform. Finally, we outline directions for future work integrating such practices with formal monitoring tools and explore their potential to support citizen science initiatives in environmental sensing.", "url": "https://arxiv.org/abs/2604.09395v1", "year": 2026, "authors": "Arnab Paul Choudhury, Rahul Rathod, Aryan Yadav", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 71, "title": "Decision Trace Schema for Governance Evidence in Real-Time Risk Systems", "score": 3, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Automated decision systems produce operational data across multiple infrastructure layers, yet no single logging format captures the complete governance-relevant record of how a decision was reached. Regulatory frameworks prescribe what must be recorded without specifying a data model for how to record it -- a gap this paper terms the Fragmented Trace Problem. Following a design science methodology, the paper presents the Decision Event Schema (DES), a JSON Schema specification that bridges four infrastructure layers -- ML inference, rule/policy evaluation, cross-system coupling, and governance metadata -- within a single per-decision event structure. The schema employs degradation-aware field design: each of six top-level field groups maps to a governance evidence property and the degradation type it must resist. DES defines ten required root-level fields and introduces a tiered evidence strategy (lightweight, sampled, full) that enables organizations to match evidence completeness to decision risk and throughput. A mechanism feasibility analysis demonstrates compatibility with the highest-throughput integrity mechanisms at production-scale decision rates. Evaluation against 25+ existing formats confirms that DES is the only specification covering all four layers simultaneously. The schema offers practitioners a reference adoptable directly or adaptable through namespace extensions, and regulators a mapping from requirements to minimum evidence tiers.", "url": "https://arxiv.org/abs/2604.09296v1", "year": 2026, "authors": "Oleg Solozobov", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 72, "title": "Co-design for Trustworthy AI: An Interpretable and Explainable Tool for Type 2 Diabetes Prediction Using Genomic Polygenic Risk Scores", "score": 5, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "The polygenic risk scores (PRS) have emerged as an important methodology for quantifying genetic predisposition to complex traits and clinical disease. Significant progress has been made in applying PRS to conditions such as obesity, cancer, and type 2 diabetes (T2DM). Studies have demonstrated that PRS can effectively identify individuals at high risk, thereby enabling early screening, personalized treatment, and targeted interventions for diseases with a genetic predisposition. One current limitation of PRS, however, is the lack of interpretability tools. To address this problem for T2DM, researchers at the Graduate School of Data Science at the Seoul National University introduced eXplainable PRS (XPRS). This visualization tool decomposes PRSs into gene-level and single-nucleotide polymorphism (SNP) contribution scores via Shapley Additive Explanations (SHAP), providing granular insights into the specific genetic factors driving an individual's risk profile. We used a co-design approach to assess XPRS trustworthiness by considering legal, medical, ethical, and technical robustness during early design and potential clinical use. For that, we used Z-inspection, an ethically aligned Trustworthy AI co-design methodology, and piloted the Council of Europe's Human Rights, Democracy, and the Rule of Law Impact Assessment for AI Systems (HUDERIA) (Council of Europe (CAI) 2025). The findings of this use-case comprise a comprehensive set of ethical, legal, and technical lessons learned. These insights, identified by a multidisciplinary team of experts (ethics, legal, human rights, computer science, and medical), serve as a framework for designers to navigate future challenges with this and other AI systems. The findings also provide a useful reference for researchers developing explainability frameworks for PRS in diverse clinical contexts.", "url": "https://arxiv.org/abs/2604.08217v1", "year": 2026, "authors": "Ralf Beuthan, Megan Coffee, Heejin Kim et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": true}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 73, "title": "The Weaponization of Computer Vision: Tracing Military-Surveillance Ties through Conference Sponsorship", "score": 3, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Computer vision, a core domain of artificial intelligence (AI), is the field that enables the computational analysis, understanding, and generation of visual data. Despite being historically rooted in military funding and increasingly deployed in warfare, the field tends to position itself as a neutral, purely technical endeavor, failing to engage in discussions about its dual-use applications. Yet it has been reported that computer vision systems are being systematically weaponized to assist in technologies that inflict harm, such as surveillance or warfare. Expanding on these concerns, we study the extent to which computer vision research is being used in the military and surveillance domains. We do so by collecting a dataset of tech companies with financial ties to the field's central research exchange platform: conferences. Conference sponsorship, we argue, not only serves as strong evidence of a company's investment in the field but also provides a privileged position for shaping its trajectory. By investigating sponsors' activities, we reveal that 44% of them have a direct connection with military or surveillance applications. We extend our analysis through two case studies in which we discuss the opportunities and limitations of sponsorship as a means for uncovering technological weaponization.", "url": "https://arxiv.org/abs/2604.07803v1", "year": 2026, "authors": "Noa Garcia, Amelia Katirai", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 74, "title": "We Need Strong Preconditions For Using Simulations In Policy", "score": 5, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Simulations, and more recently LLM agent simulations, have been adopted as useful tools for policymakers to explore interventions, rehearse potential scenarios, and forecast outcomes. While LLM simulations have enormous potential, two critical challenges remain understudied: the dual-use potential of accurate models of individual or population-level human behavior and the difficulty of validating simulation outputs. In light of these limitations, we must define boundaries for both simulation developers and decision-makers to ensure responsible development and ethical use. We propose and discuss three preconditions for societal-scale LLM agent simulations: 1) do not treat simulations of marginalized populations as neutral technical outputs, 2) do not simulate populations without their participation, and 3) do not simulate without accountability. We believe that these guardrails, combined with our call for simulation development and deployment reports, will help build trust among policymakers while promoting responsible development and use of societal-scale LLM agent simulations for the public benefit.", "url": "https://arxiv.org/abs/2604.07838v1", "year": 2026, "authors": "Steven Luo, Saanvi Arora, Carlos Guirado", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": false}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": true}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 75, "title": "Augmenting or automating labor? TheeffectofAIdevelopment on new work,employment, andwages", "score": 9, "status": "ACEPTADO", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Artificial intelligence (AI) is reshaping the labor market by changing the task content of occupations. This study investigates the impact of AI development on the emergence of new work, employment, and wages in the United States from 2015 to 2022. I develop innovative methods to measure occupational and industry exposure to AI technologies that substitute labor (automation AI ) or enhance workers' output (augmentation AI), and to identify new work (i.e., new job titles). To address endogeneity, I use instrumental variable estimators, leveraging AI development in countries with limited economic ties to the United States. The findings indicate that automation AI negatively impacts new work, employment, and wages in low-skilled occupations, while augmentation AI fosters the emergence of new work and raises wages for high-skilled occupations. These results suggest that AI may contribute to rising wage inequality.", "url": "https://arxiv.org/abs/2503.19159", "year": 2026, "authors": "D Marguerit", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": true}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 76, "title": "TheEffectsofArtificial Intelligenceand Robotics onEmploymentandWagesin Korean Manufacturing Firms", "score": 5, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "This article analyzes the effects of two key automation technologies – artificial intelligence (AI) and robotics – on employment and wages in Korean manufacturing since the late 2010s. Drawing on firm-level data from the Survey of Business Activities and individual wage data from the Local Labor Force Survey , the analysis explores both firm- and worker-level impacts. Adoption of these technologies is concentrated in large firms within the electronics and automotive sectors. Robotics has been widely implemented, primarily for cost reduction, safety enhancement, and union avoidance, whereas AI adoption remains limited but is gradually expanding. The results reveal contrasting effects: AI adoption is associated with job creation and wage growth, while robotics tends to reduce both employment and wages – an outcome that diverges from findings in existing firm-level studies. These negative effects appear to stem from Korea’s institutional context, where automation – particularly robotics – is frequently employed to reduce labor costs rather than to enhance productivity, as well as from diminishing marginal returns in industries with long-standing automation. Importantly, these wage effects persist even when U.S.-based automation exposure measures are applied, suggesting broader applicability. However, the findings underscore that the economic impact of automation depends significantly on the motivations and strategies behind its adoption. In the case of Korean manufacturing, capital-biased automation driven by robotics has contributed mainly to labor displacement without generating substantial productivity gains, reflecting Acemoglu and Restrepo’s (2018) notion of ‘so-so automation.’ PDF Read in browser Metrics Metrics Loading ...", "url": "https://ojs.weizenbaum-institut.de/index.php/wjds/article/view/240", "year": 2026, "authors": "JH Jeong, HJ Jo - Weizenbaum Journal of the Digital …, 2025 - ojs.weizenbaum-institut.de", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": true}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 77, "title": "Leveragingartificial intelligenceto study and forecast its impacts onemploymentmanagement andwagesin China's key cities", "score": 4, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_colo cket_color": "#f59e0b", "abstract": "", "url": "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5249913", "year": 2026, "authors": "S SenGupta", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 80, "title": "High-skilled human workers in non-routine jobs are susceptible toAIautomation butwagebenefits differ between occupations", "score": 4, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Artificial Intelligence (AI) will change human work by taking over specific job tasks, but there is a debate which tasks are susceptible to automation, and whether AI will augment or replace workers and affect wages. By combining data on job tasks with a measure of AI susceptibility, we show that more highly skilled workers are more susceptible to AI automation, and that analytical non-routine tasks are at risk to be impacted by AI. Moreover, we observe that wage growth premiums for the lowest and the highest required skill level appear unrelated to AI susceptibility and that workers in occupations with many routine tasks saw higher wage growth if their work was more strongly susceptible to AI. Our findings imply that AI has the potential to affect human workers differently than canonical economic theories about the impact of technology on work these theories predict.", "url": "https://arxiv.org/abs/2404.06472", "year": 2026, "authors": "P Ozgul, MC Fregin,", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 1, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": true}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 81, "title": "The impact ofartificial intelligence(AI) onemployees' skills and well-being in global labor markets: A systematic review", "score": 3, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Central and Eastern European Online Library - CEE journals, documents, articles, periodicals, books available online for download, Zeitschrfitendatenbank, Online Zeitschriften, Online Zeitschriftendatenbank", "url": "https://www.ceeol.com/search/article-detail?id=1192670", "year": 2026, "authors": "RE Cramarenco,", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 1, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": true}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": true}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 82, "title": "The Impact ofArtificial Intelligenceon Labor Market Income Inequality", "score": 4, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "", "url": "https://jandoopress.com/journal/ijas/article/view/169", "year": 2026, "authors": "Y Gu", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 1, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 83, "title": "The short-termeffectsof generativeartificial intelligenceonemployment: Evidence from an online labor market", "score": 7, "status": "ACEPTADO", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "Generative artificial intelligence (AI) holds the potential to either complement workers by enhancing their productivity or substitute them. We examine the short-term effects of the recently released generative AI models (ChatGPT, DALL-E 2, and Midjourney) on the employment outcomes of freelancers on a large online platform. We find that freelancers in highly affected occupations suffer from the introduction of generative AI, experiencing reductions in both employment and earnings. We find similar effects studying the release of other image-based generative AI models. Exploring the heterogeneity by freelancers’ employment history, we do not find evidence that high-quality service, measured by their past performance and employment, moderates the adverse effects on employment. In fact, we find suggestive evidence that top freelancers are disproportionately affected by AI. These results suggest that generative AI may transform the role of human capital in the organization and reduce overall demand for workers.  Supplemental Material: The online appendices are available at https://doi.org/10.1287/orsc.2023.18441 .", "url": "https://pubsonline.informs.org/doi/abs/10.1287/orsc.2023.18441", "year": 2026, "authors": "X Hui", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": true}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 84, "title": "Canaries in the Coal Mine?: Six Facts about the RecentEmployment EffectsofArtificial Intelligence", "score": 4, "status": "REVISAR", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "", "url": "https://digitaleconomy.stanford.edu/app/uploads/2025/12/CanariesintheCoalMine_Nov25.pdf", "year": 2026, "authors": "E Brynjolfsson", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 85, "title": "The simple macroeconomics ofAI", "score": 7, "status": "ACEPTADO", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "SUMMARY This paper evaluates claims about the large macroeconomic implications of new advances in Artificial intelligence (AI). It starts from a task-based model of AI’s effects, working through automation and task complementarities. So long as AI’s microeconomic effects are driven by cost savings/productivity improvements at the task level, its macroeconomic consequences will be given by a version of Hulten’s theorem: Gross Domestic Product (GDP) and aggregate productivity gains can be estimated by what fraction of tasks are impacted and average task-level cost savings. Using existing estimates on exposure to AI and productivity improvements at the task level, these macroeconomic effects appear non-trivial but modest – no more than a 0.66% increase in total factor productivity (TFP) over 10 years. The paper then argues that even these estimates could be exaggerated, because early evidence is from easy-to-learn tasks, whereas some of the future effects will come from hard-to-learn tasks, where there are many context-dependent factors affecting decision-making and no objective outcome measures from which to learn successful performance. Consequently, predicted TFP gains over the next 10 years are even more modest and are predicted to be less than 0.53%. I also explore AI’s wage and inequality effects. I show theoretically that even when AI improves the productivity of low-skill workers in certain tasks (without creating new tasks for them), this may increase rather than reduce inequality. Empirically, I find that AI advances are unlikely to increase inequality as much as previous automation technologies because their impact is more equally distributed across demographic groups, but there is also no evidence that AI will reduce labour income inequality. Instead, AI is predicted to widen the gap between capital and labour income. Finally, some of the new tasks created by AI may have negative social value (such as the design of algorithms for online manipulation), and I discuss how to incorporate the macroeconomic effects of new tasks that may have negative social value.", "url": "https://academic.oup.com/economicpolicy/article-abstract/40/121/13/7728473", "year": 2026, "authors": "D Acemoglu", "venue": "", "citations": 134, "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": true}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 86, "title": "The labor marketeffectsof generativeAI: A difference-in-differences analysis ofAIexposure", "score": 8, "status": "ACEPTADO", "pocket": "labor", "pocket_label": "Labor Markets", "pocket_color": "#f59e0b", "abstract": "", "url": "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5375017", "year": 2026, "authors": "AC Johnston", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/robots", "met": true}, {"key": "wage_employment", "desc": "Mide salarios, empleo o outcomes laborales", "met": true}, {"key": "heterogeneity", "desc": "Distingue por habilidad, tarea u ocupación", "met": false}, {"key": "within_firm", "desc": "Estudia efectos dentro de firmas o a nivel trabajador", "met": false}, {"key": "causal", "desc": "Tiene estrategia causal o cuasi-causal", "met": false}], "manual_decision"
