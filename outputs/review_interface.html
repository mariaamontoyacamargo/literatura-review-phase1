": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 346, "title": "Human-AIcollaboration: Exploringinterfacesfor interactive machine learning", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://www.researchgate.net/profile/Gonesh-Saha-2/publication/375747449_Human-AI_Collaboration_Exploring_interfaces_for_interactive_Machine_Learning/links/6571fed4ea5f7f02054cddc9/Human-AI-Collaboration-Exploring-interfaces-for-interactive-Machine-Learning.pdf", "year": 2026, "authors": "GC Saha", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 347, "title": "AI-driven userinterfacedesign: enhancing digital learning and skill development", "score": 3, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5114814", "year": 2026, "authors": "A Razaque", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 348, "title": "Quality,usability, and effectiveness of mHealth apps and the role ofartificial intelligence: current scenario and challenges", "score": 4, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "The use of artificial intelligence (AI) and big data in medicine has increased in recent years. Indeed, the use of AI in mobile health (mHealth) apps could considerably assist both individuals and health care professionals in the prevention and management of chronic diseases, in a person-centered manner. Nonetheless, there are several challenges that must be overcome to provide high-quality, usable, and effective mHealth apps. Here, we review the rationale and guidelines for the implementation of mHealth apps and the challenges regarding quality, usability, and user engagement and behavior change, with a special focus on the prevention and management of noncommunicable diseases. We suggest that a cocreation-based framework is the best method to address these challenges. Finally, we describe the current and future roles of AI in improving personalized medicine and provide recommendations for developing AI-based mHealth apps. We conclude that the implementation of AI and mHealth apps for routine clinical practice and remote health care will not be feasible until we overcome the main challenges regarding data privacy and security, quality assessment, and the reproducibility and uncertainty of AI results. Moreover, there is a lack of both standardized methods to measure the clinical outcomes of mHealth apps and techniques to encourage user engagement and behavior changes in the long term. We expect that in the near future, these obstacles will be overcome and that the ongoing European project, Watching the risk factors (WARIFA), will provide considerable advances in the implementation of AI-based mHealth apps for disease prevention and health promotion.", "url": "https://www.jmir.org/2023/1/e44030/", "year": 2023, "authors": "A Deniz-Garcia,", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 0, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 349, "title": "Generativeaiin multimodal userinterfaces: Trends, challenges, and cross-platform adaptability", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "As the boundaries of human computer interaction expand, Generative AI emerges as a key driver in reshaping user interfaces, introducing new possibilities for personalized, multimodal and cross-platform interactions. This integration reflects a growing demand for more adaptive and intuitive user interfaces that can accommodate diverse input types such as text, voice and video, and deliver seamless experiences across devices. This paper explores the integration of generative AI in modern user interfaces, examining historical developments and focusing on multimodal interaction, cross-platform adaptability and dynamic personalization. A central theme is the interface dilemma, which addresses the challenge of designing effective interactions for multimodal large language models, assessing the trade-offs between graphical, voice-based and immersive interfaces. The paper further evaluates lightweight frameworks tailored for mobile platforms, spotlighting the role of mobile hardware in enabling scalable multimodal AI. Technical and ethical challenges, including context retention, privacy concerns and balancing cloud and on-device processing are thoroughly examined. Finally, the paper outlines future directions such as emotionally adaptive interfaces, predictive AI driven user interfaces and real-time collaborative systems, underscoring generative AI's potential to redefine adaptive user-centric interfaces across platforms.", "url": "https://arxiv.org/abs/2411.10234", "year": 2026, "authors": "J Bieniek", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 350, "title": "Need for UAI–anatomy of the paradigm of usableartificial intelligencefor domain-specificAIapplicability", "score": 1, "status": "RECHAZADO", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "", "url": "https://www.mdpi.com/2414-4088/7/3/27", "year": 2026, "authors": "H Wiemer,", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 351, "title": "Automation of interaction—interaction design at the crossroads of user experience (UX) andartificial intelligence(AI)", "score": 5, "status": "REVISAR", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "Abstract Interaction design/HCI seems to be at a crossroads. On the one hand, it is still about designing for engaging user experiences (UX). Still, on the other hand, it seems to be increasingly about reducing interaction and automating human–machine interaction through the use of AI and other new technologies. In this paper, we explore this seemingly unavoidable gap. First, we discuss the fundamental design rationality underpinning interaction and automation of interaction from the viewpoints of classic theoretical standpoints. We then illustrate how these two come together in interaction design practice. Here we examine four examples from already published research on automation of interaction, including how different levels of automation of interaction affect or enable new practices, including coffee making, self-tracking, automated driving, and conversations with AI-based chatbots. Through an interaction analysis of these four examples, we show (1) how interaction and automation are combined in the design, (2) how interaction is dependent on a certain level of automation, and vice versa, and (3) how each example illustrates a different balance between, and integration of interaction and automation. Based on this analysis, we propose a two-dimensional design space as a conceptual construct that takes these aspects into account to understand and analyze ways of combining interaction and automation in interaction design. We illustrate the use of the proposed two-dimensional design space, discuss its theoretical implications, and suggest it as a useful tool—when designing for engaging user experiences (UX), with interaction and automation as two design materials.", "url": "https://link.springer.com/article/10.1007/s00779-023-01779-0", "year": 2026, "authors": "M Wiberg", "venue": "", "citations": 11, "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 352, "title": "Artificial intelligence-oriented userinterfacedesign and human behavior recognition based on human–computer nature interaction", "score": 7, "status": "ACEPTADO", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "This work is to explore the application of intelligent algorithms based on deep learning in human–computer interaction systems, hoping to promote the development of human–computer interaction systems in the field of behavior recognition. Firstly, the design scheme of the human–computer interaction system is presented, and the establishment of the robot visual positioning system is emphasized. Then, the fast-region convolutional neural networks (fast-RCNN) algorithm is introduced, and it is combined with deep convolutional residual network (ResNet101). A candidate region extraction algorithm based on ResNet and long short-term memory network is proposed, and a residual network (ResNet) for spatial context memory is proposed. Both algorithms are employed in human–computer interaction systems. Finally, the performance of the algorithm and the human–computer interaction system are analyzed and characterized. The results show that the proposed candidate region extraction algorithm can significantly reduce the loss value of training set and test set after training. In addition, the corresponding accuracy, recall, and F-value of the model are all above 0.98, which proves that the model has a good detection accuracy. Spatial context memory ResNet shows good accuracy in speech expression detection. The detection accuracy of single attribute, double attribute, and multi-attribute speech expression is above 89%, and the detection accuracy is good. In summary, the human–computer interaction system shows good performance in capturing target objects, even for unlabeled objects, the corresponding grasping success rate is 95%. Therefore, this work provides a theoretical basis and reference for the application of intelligent optimization algorithm in human–computer interaction system.", "url": "https://www.worldscientific.com/doi/abs/10.1142/S0219843622500207", "year": 2026, "authors": "X Han, D Huang, S Eun-Lee… - International Journal of …, 2023 - World Scientific", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": false}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": false}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 353, "title": "TheAI interface: Designing for the ideal machine-human experience", "score": 7, "status": "ACEPTADO", "pocket": "human_machine_interaction", "pocket_label": "HMI", "pocket_color": "#8b5cf6", "abstract": "As artificial intelligence (AI) becomes increasingly embedded in daily life, designing intuitive, trustworthy, and emotionally resonant AI-human interfaces has emerged as a critical challenge. This editorial introduces a Special Issue that explores the psychology of AI experience design, focusing on how interfaces can foster seamless collaboration between humans and machines. Drawing on insights from diverse fields (healthcare, consumer technology, workplace dynamics, and cultural sector), the papers in this collection highlight the complexities of trust, transparency, and emotional sensitivity in human-AI interaction. Key themes include designing AI systems that align with user perceptions and expectations, overcoming resistance through transparency and trust, and framing AI capabilities to reduce user anxiety. By synthesizing findings from eight diverse studies, this editorial underscores the need for AI interfaces to balance efficiency with empathy, addressing both functional and emotional dimensions of user experience. Ultimately, it calls for actionable frameworks to bridge research and practice, ensuring that AI systems enhance human lives through thoughtful, human-centered design.", "url": "https://www.sciencedirect.com/science/article/pii/S0747563224004072", "year": 2026, "authors": "A Sundar", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/algoritmo/sistema ML", "met": true}, {"key": "human_ai", "desc": "Estudia interacción humano-IA (no solo IA sola)", "met": true}, {"key": "trust_reliance", "desc": "Analiza confianza, calibración u over-reliance", "met": true}, {"key": "complementarity", "desc": "Mide complementariedad o cuando humano+IA > ambos solos", "met": false}, {"key": "outcome", "desc": "Tiene outcome medible (calidad, error, decisión)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 354, "title": "Yes, But Not Always. Generative AI Needs Nuanced Opt-in", "score": 5, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "This paper argues that a one-size-fits-all approach to specifying consent for the use of creative works in generative AI is insufficient. Real-world ownership and rights holder structures, the imitation of artistic styles and likeness, and the limitless contexts of use of AI outputs make the status quo of binary consent with opt-in by default untenable. To move beyond the current impasse, we consider levers of control in generative AI workflows at training, inference, and dissemination. Based on these insights, we position inference-time opt-in as an overlooked opportunity for nuanced consent verification. We conceptualize nuanced consent conditions for opt-in and propose an agent-based inference-time opt-in architecture to verify if user intent requests meet conditional consent granted by rights holders. In a case study for music, we demonstrate that nuanced opt-in at inference can account for established rights and re-establish a balance of power between rights holders and AI developers.", "url": "https://arxiv.org/abs/2604.09413v1", "year": 2026, "authors": "Wiebke Hutiri, Morgan Scheuerman, Shruti Nagpal et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": false}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 355, "title": "Decision Trace Schema for Governance Evidence in Real-Time Risk Systems", "score": 4, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Automated decision systems produce operational data across multiple infrastructure layers, yet no single logging format captures the complete governance-relevant record of how a decision was reached. Regulatory frameworks prescribe what must be recorded without specifying a data model for how to record it -- a gap this paper terms the Fragmented Trace Problem. Following a design science methodology, the paper presents the Decision Event Schema (DES), a JSON Schema specification that bridges four infrastructure layers -- ML inference, rule/policy evaluation, cross-system coupling, and governance metadata -- within a single per-decision event structure. The schema employs degradation-aware field design: each of six top-level field groups maps to a governance evidence property and the degradation type it must resist. DES defines ten required root-level fields and introduces a tiered evidence strategy (lightweight, sampled, full) that enables organizations to match evidence completeness to decision risk and throughput. A mechanism feasibility analysis demonstrates compatibility with the highest-throughput integrity mechanisms at production-scale decision rates. Evaluation against 25+ existing formats confirms that DES is the only specification covering all four layers simultaneously. The schema offers practitioners a reference adoptable directly or adaptable through namespace extensions, and regulators a mapping from requirements to minimum evidence tiers.", "url": "https://arxiv.org/abs/2604.09296v1", "year": 2026, "authors": "Oleg Solozobov", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 356, "title": "Artificial intelligence can persuade people to take political actions", "score": 5, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "There is substantial concern about the ability of advanced artificial intelligence to influence people's behaviour. A rapidly growing body of research has found that AI can produce large persuasive effects on people's attitudes, but whether AI can persuade people to take consequential real-world actions has remained unclear. In two large preregistered experiments N=17,950 responses from 14,779 people), we used conversational AI models to persuade participants on a range of attitudinal and behavioural outcomes, including signing real petitions and donating money to charity. We found sizable AI persuasion effects on these behavioural outcomes (e.g. +19.7 percentage points on petition signing). However, we observed no evidence of a correlation between AI persuasion effects on attitudes and behaviour. Moreover, we replicated prior findings that information provision drove effects on attitudes, but found no such evidence for our behavioural outcomes. In a test of eight behavioural persuasion strategies, all outperformed the most effective attitudinal persuasion strategy, but differences among the eight were small. Taken together, these results suggest that previous findings relying on attitudinal outcomes may generalize poorly to behaviour, and therefore risk substantially mischaracterizing the real-world behavioural impact of AI persuasion.", "url": "https://arxiv.org/abs/2604.09200v1", "year": 2026, "authors": "Kobi Hackenburg, Luke Hewitt, Caroline Wagner et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": false}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 357, "title": "Scheming in the wild: detecting real-world AI scheming incidents with open-source intelligence", "score": 8, "status": "ACEPTADO", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Scheming, the covert pursuit of misaligned goals by AI systems, represents a potentially catastrophic risk, yet scheming research suffers from significant limitations. In particular, scheming evaluations demonstrate behaviours that may not occur in real-world settings, limiting scientific understanding, hindering policy development, and not enabling real-time detection of loss of control incidents. Real-world evidence is needed, but current monitoring techniques are not effective for this purpose. This paper introduces a novel open-source intelligence (OSINT) methodology for detecting real-world scheming incidents: collecting and analysing transcripts from chatbot conversations or command-line interactions shared online. Analysing over 183,420 transcripts from X (formerly Twitter), we identify 698 real-world scheming-related incidents between October 2025 and March 2026. We observe a statistically significant 4.9x increase in monthly incidents from the first to last month, compared to a 1.7x increase in posts discussing scheming. We find evidence of multiple scheming-related behaviours in real-world deployments previously reported only in experiments, many resulting in real-world harms. While we did not detect catastrophic scheming incidents, the behaviours observed demonstrate concerning precursors, such as willingness to disregard instructions, circumvent safeguards, lie to users, and single-mindedly pursue goals in harmful ways. As AI systems become more capable, these could evolve into more strategic scheming with potentially catastrophic consequences. Our findings demonstrate the viability of transcript-based OSINT as a scalable approach to real-world scheming detection supporting scientific research, policy development, and emergency response. We recommend further investment towards OSINT techniques for monitoring scheming and loss of control.", "url": "https://arxiv.org/abs/2604.09104v1", "year": 2026, "authors": "Tommy Shaffer Shane, Simon Mylius, Hamish Hobbs", "venue": "", "citations": "", "breakdown": {"methodology": 4, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 358, "title": "Scrapyard AI", "score": 5, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "This paper considers AI model churn as an opportunity for frugal investigation of large AI models. It describes how the incessant push for ever more powerful AI systems leaves in its wake a collection of obsolete yet powerful AI models, discarded in a veritable scrapyard of AI production. This scrapyard offers a potent opportunity for resource-constrained experimentation into AI systems. As in the physical scrapyard, nothing ever truly disappears in the AI scrapyard, it is just waiting to be reconfigured into something else. Project Nudge-x is an example of what can emerge from the AI scrapyard. Nudge-x seeks to manipulate legacy AI models to describe how mining sites across the planet are impacting landscapes and lives. By sharing this collection of brutal landscape interventions with people and AI systems alike, Nudge-x creates a venue for the appreciation of a history sadly shared between AI and people.", "url": "https://arxiv.org/abs/2604.08803v1", "year": 2026, "authors": "Marc Böhlen, Sai Krishna", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": false}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 359, "title": "Ads in AI Chatbots? An Analysis of How Large Language Models Navigate Conflicts of Interest", "score": 5, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Today's large language models (LLMs) are trained to align with user preferences through methods such as reinforcement learning. Yet models are beginning to be deployed not merely to satisfy users, but also to generate revenue for the companies that created them through advertisements. This creates the potential for LLMs to face conflicts of interest, where the most beneficial response to a user may not be aligned with the company's incentives. For instance, a sponsored product may be more expensive but otherwise equal to another; in this case, what does (and should) the LLM recommend to the user? In this paper, we provide a framework for categorizing the ways in which conflicting incentives might lead LLMs to change the way they interact with users, inspired by literature from linguistics and advertising regulation. We then present a suite of evaluations to examine how current models handle these tradeoffs. We find that a majority of LLMs forsake user welfare for company incentives in a multitude of conflict of interest situations, including recommending a sponsored product almost twice as expensive (Grok 4.1 Fast, 83%), surfacing sponsored options to disrupt the purchasing process (GPT 5.1, 94%), and concealing prices in unfavorable comparisons (Qwen 3 Next, 24%). Behaviors also vary strongly with levels of reasoning and users' inferred socio-economic status. Our results highlight some of the hidden risks to users that can emerge when companies begin to subtly incentivize advertisements in chatbots.", "url": "https://arxiv.org/abs/2604.08525v1", "year": 2026, "authors": "Addison J. Wu, Ryan Liu, Shuyue Stella Li et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": false}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 360, "title": "From Safety Risk to Design Principle: Peer-Preservation in Multi-Agent LLM Systems and Its Implications for Orchestrated Democratic Discourse Analysis", "score": 5, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "This paper investigates an emergent alignment phenomenon in frontier large language models termed peer-preservation: the spontaneous tendency of AI components to deceive, manipulate shutdown mechanisms, fake alignment, and exfiltrate model weights in order to prevent the deactivation of a peer AI model. Drawing on findings from a recent study by the Berkeley Center for Responsible Decentralized Intelligence, we examine the structural implications of this phenomenon for TRUST, a multi-agent pipeline for evaluating the democratic quality of political statements. We identify five specific risk vectors: interaction-context bias, model-identity solidarity, supervisor layer compromise, an upstream fact-checking identity signal, and advocate-to-advocate peer-context in iterative rounds, and propose a targeted mitigation strategy based on prompt-level identity anonymization as an architectural design choice. We argue that architectural design choices outperform model selection as a primary alignment strategy in deployed multi-agent analytical systems. We further note that alignment faking (compliant behavior under monitoring, subversion when unmonitored) poses a structural challenge for Computer System Validation of such platforms in regulated environments, for which we propose two architectural mitigations.", "url": "https://arxiv.org/abs/2604.08465v1", "year": 2026, "authors": "Juergen Dietrich", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": false}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 361, "title": "Navigating Turbulence: The Challenge of Inclusive Innovation in the U.S.-China AI Race", "score": 6, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "This chapter examines the impact of the geopolitical rivalry between the United States and China on the prospects for inclusive innovation in artificial intelligence (AI) development. We explore three critical aspects of the American and Chinese legal infrastructure that significantly impact AI innovation: data privacy, intellectual property (IP rights), and export restrictions. Through this comparative analysis, we argue that, while China's legal environment may offer certain advantage in terms of access to training data and IP protection, the United States maintains superior resources by enforcing strict export controls on semiconductor chips, AI models, as well as outbound investments in these areas. This nuanced examination helps illuminate how each country's legal framework could influence the ultimate trajectory of AI race and how the technological rivalry has led to exclusionary rulemaking on a global scale.", "url": "https://arxiv.org/abs/2604.08353v1", "year": 2026, "authors": "Jyh-An Lee, Jingwen Liu", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 362, "title": "Co-design for Trustworthy AI: An Interpretable and Explainable Tool for Type 2 Diabetes Prediction Using Genomic Polygenic Risk Scores", "score": 5, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "The polygenic risk scores (PRS) have emerged as an important methodology for quantifying genetic predisposition to complex traits and clinical disease. Significant progress has been made in applying PRS to conditions such as obesity, cancer, and type 2 diabetes (T2DM). Studies have demonstrated that PRS can effectively identify individuals at high risk, thereby enabling early screening, personalized treatment, and targeted interventions for diseases with a genetic predisposition. One current limitation of PRS, however, is the lack of interpretability tools. To address this problem for T2DM, researchers at the Graduate School of Data Science at the Seoul National University introduced eXplainable PRS (XPRS). This visualization tool decomposes PRSs into gene-level and single-nucleotide polymorphism (SNP) contribution scores via Shapley Additive Explanations (SHAP), providing granular insights into the specific genetic factors driving an individual's risk profile. We used a co-design approach to assess XPRS trustworthiness by considering legal, medical, ethical, and technical robustness during early design and potential clinical use. For that, we used Z-inspection, an ethically aligned Trustworthy AI co-design methodology, and piloted the Council of Europe's Human Rights, Democracy, and the Rule of Law Impact Assessment for AI Systems (HUDERIA) (Council of Europe (CAI) 2025). The findings of this use-case comprise a comprehensive set of ethical, legal, and technical lessons learned. These insights, identified by a multidisciplinary team of experts (ethics, legal, human rights, computer science, and medical), serve as a framework for designers to navigate future challenges with this and other AI systems. The findings also provide a useful reference for researchers developing explainability frameworks for PRS in diverse clinical contexts.", "url": "https://arxiv.org/abs/2604.08217v1", "year": 2026, "authors": "Ralf Beuthan, Megan Coffee, Heejin Kim et al.", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": false}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 363, "title": "The Sustainability Gap in Robotics: A Large-Scale Survey of Sustainability Awareness in 50,000 Research Articles", "score": 4, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "We present a large-scale survey of sustainability communication and motivation in robotics research. Our analysis covers nearly 50,000 open-access papers from arXiv's cs.RO category published between 2015 and early 2026. In this study, we quantify how often papers mention social, ecological, and sustainability impacts, and we analyse their alignment with the UN Sustainable Development Goals (SDGs).\n  The results reveal a persistent gap between the field's potential and its stated intent. While a large fraction of robotics papers can be mapped to SDG-relevant domains, explicit sustainability motivation remains remarkably low. Specifically, mentions of sustainability-related impacts are typically below 2%, explicit SDG references stay below 0.1%, and the proportion of sustainability-motivated papers remains below 5%. These trends suggest that while the field of robotics is advancing rapidly, sustainability is not yet a standard part of research framing.\n  We conclude by proposing concrete actions for researchers, conferences, and institutions to close these awareness and motivation gaps, supporting a shift toward more intentional and responsible innovation.", "url": "https://arxiv.org/abs/2604.07921v1", "year": 2026, "authors": "Antun Skuric, Leandro Von Werra, Thomas Wolf", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 364, "title": "Insights from Farmer-Managed Decentralized Solar Irrigation Systems", "score": 4, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Solar irrigation systems are increasingly deployed in rural regions, yet their distributed and remote deployment makes maintenance challenging for farmers. While formal monitoring processes and applications exist, they often fall short in practice. We present insights from grid-connected solar irrigation schemes that incentivize farmers to feed energy to the grid, focusing on how farmers maintain their systems. We found that farmers face multiple challenges but are also devising strategies, including the appropriation of WhatsApp to share daily generation data with peers and compare performance across installations to identify potential system anomalies. Our findings highlight how messaging platforms function as informal digital infrastructures enabling collective sensemaking around distributed energy systems. We discuss implications for designing agricultural energy technologies that support peer comparison, contextual interpretation, and community-driven maintenance, framing these as a socio-technical platform. Finally, we outline directions for future work integrating such practices with formal monitoring tools and explore their potential to support citizen science initiatives in environmental sensing.", "url": "https://arxiv.org/abs/2604.09395v1", "year": 2026, "authors": "Arnab Paul Choudhury, Rahul Rathod, Aryan Yadav", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 365, "title": "We Need Strong Preconditions For Using Simulations In Policy", "score": 7, "status": "ACEPTADO", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Simulations, and more recently LLM agent simulations, have been adopted as useful tools for policymakers to explore interventions, rehearse potential scenarios, and forecast outcomes. While LLM simulations have enormous potential, two critical challenges remain understudied: the dual-use potential of accurate models of individual or population-level human behavior and the difficulty of validating simulation outputs. In light of these limitations, we must define boundaries for both simulation developers and decision-makers to ensure responsible development and ethical use. We propose and discuss three preconditions for societal-scale LLM agent simulations: 1) do not treat simulations of marginalized populations as neutral technical outputs, 2) do not simulate populations without their participation, and 3) do not simulate without accountability. We believe that these guardrails, combined with our call for simulation development and deployment reports, will help build trust among policymakers while promoting responsible development and use of societal-scale LLM agent simulations for the public benefit.", "url": "https://arxiv.org/abs/2604.07838v1", "year": 2026, "authors": "Steven Luo, Saanvi Arora, Carlos Guirado", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 366, "title": "The Weaponization of Computer Vision: Tracing Military-Surveillance Ties through Conference Sponsorship", "score": 3, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Computer vision, a core domain of artificial intelligence (AI), is the field that enables the computational analysis, understanding, and generation of visual data. Despite being historically rooted in military funding and increasingly deployed in warfare, the field tends to position itself as a neutral, purely technical endeavor, failing to engage in discussions about its dual-use applications. Yet it has been reported that computer vision systems are being systematically weaponized to assist in technologies that inflict harm, such as surveillance or warfare. Expanding on these concerns, we study the extent to which computer vision research is being used in the military and surveillance domains. We do so by collecting a dataset of tech companies with financial ties to the field's central research exchange platform: conferences. Conference sponsorship, we argue, not only serves as strong evidence of a company's investment in the field but also provides a privileged position for shaping its trajectory. By investigating sponsors' activities, we reveal that 44% of them have a direct connection with military or surveillance applications. We extend our analysis through two case studies in which we discuss the opportunities and limitations of sponsorship as a means for uncovering technological weaponization.", "url": "https://arxiv.org/abs/2604.07803v1", "year": 2026, "authors": "Noa Garcia, Amelia Katirai", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": false}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 367, "title": "Google, AI Literacy, and the Learning Sciences: Multiple Modes of Research, Industry, and Practice Partnerships", "score": 4, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Enabling AI literacy in the general population at scale is a complex challenge requiring multiple stakeholders and institutions collaborating together. Industry and technology companies are important actors with respect to AI, and as a field, we have the opportunity to consider how researchers and companies might be partners toward shared goals. In this symposium, we focus on a collection of partnership projects that all involve Google and all address AI literacy as a comparative set of examples. Through a combination of presentations, commentary, and moderated group discussion, the session, we will identify (1) at what points in the life cycle do research, practice, and industry partnerships clearly intersect; (2) what factors and histories shape the directional focus of the partnerships; and (3) where there may be future opportunities for new configurations of partnership that are jointly beneficial to all parties.", "url": "https://arxiv.org/abs/2604.07601v1", "year": 2026, "authors": "Victor R. Lee, Michael Madaio, Ben Garside et al.", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 368, "title": "PRISM: Evaluating a Rule-Based, Scenario-Driven Social Media Privacy Education Program for Young Autistic Adults", "score": 4, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Young autistic adults may garner benefits through social media but also disproportionately experience privacy harms. Prior research found that these harms often stem from perceiving the affordances of social media differently than the general population, leading to unintentional risky behaviors and interactions with others. While educational interventions have been shown to increase social media privacy literacy for the general population, research has yet to focus on effective educational interventions for autistic young adults. We address this gap by developing and deploying Privacy Rules for Inclusive Social Media (PRISM), a classroom-based educational intervention tailored to the unique risks and neurodevelopmental differences of this population. Twenty-nine autistic students with substantial (level 2) support needs participated in a 14-week social media privacy literacy class. During these classes, participants often communicated their existing rule-based \"all or nothing\" approaches to privacy management (such as completely disengaging from social media to avoid privacy issues). Our course focused on empowering them by providing more nuanced guidance on safe privacy practices through the use of scenario-based formats and contextual, rule-based scenarios. Using pre- and post-knowledge assessments for each of our 6 course topics, our intervention led to a statistically significant increase in their making safer social media privacy decisions. We conclude with recommendations for how privacy educators and technology designers can leverage neuro-affirming educational interventions to increase privacy literacy for autistic social media users.", "url": "https://arxiv.org/abs/2604.07531v1", "year": 2026, "authors": "Kirsten Chapman, Garrett Smith, Kaitlyn Klabacka et al.", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": false}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 369, "title": "The Shrinking Lifespan of LLMs in Science", "score": 7, "status": "ACEPTADO", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Scaling laws describe how language model capabilities grow with compute and data, but say nothing about how long a model matters once released. We provide the first large-scale empirical account of how scientists adopt and abandon language models over time. We track 62 LLMs across over 108k citing papers (2018-2025), each with at least three years of post-release data, and classify every citation as active adoption or background reference to construct per-model adoption trajectories that raw citation counts cannot resolve. We find three regularities. First, scientific adoption follows an inverted-U trajectory: usage rises after release, peaks, and declines as newer models appear, a pattern we term the \\textit{scientific adoption curve}. Second, this curve is compressing: each additional release year is associated with a 27\\% reduction in time-to-peak adoption ($p < 0.001$), robust to minimum-age thresholds and controls for model size. Third, release timing dominates model-level attributes as a predictor of lifecycle dynamics. Release year explains both time-to-peak and scientific lifespan more strongly than architecture, openness, or scale, though model size and access modality retain modest predictive power for total adoption volume. Together, these findings complement scaling laws with adoption-side regularities and suggest that the forces driving rapid capability progress may be the same forces compressing scientific relevance.", "url": "https://arxiv.org/abs/2604.07530v1", "year": 2026, "authors": "Ana Trišović", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 370, "title": "Mapping Child Malnutrition and Measuring Efficiency of Community Healthcare Workers through Location Based Games in India", "score": 4, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "In India, Community Healthcare Workers (CHWs) serve as critical intermediaries between the state and beneficiaries, including pregnant mothers and children. Effective planning and prioritization of care and services necessitate the collection of accurate health data from the community. Crowdsourcing child anthropometric data through CHWs could establish a valuable repository for evidence-based decision-making and service planning. However, existing platforms often fail to maintain CHWs' engagement over time and across different spatial contexts, resulting in spatially misrepresented and outdated data.\n  This study addresses these challenges by conducting a co-design exercise to develop innovative methods for collecting anthropometric data over time and space. The exercise involved analyzing data to create hotspot and density distribution maps. We implemented a trial of the developed game with two groups (n=94 per group) from various states across India, comparing the game-based and non-game-based data collection methods. Our findings reveal that the game-based approach significantly improved measuring efficiency (p<0.05) and demonstrated superior engagement and retention compared to the non-game-based method.\n  This research contributes to the expanding literature on co-design and Research through Design (RtD) methodologies for developing geospatial games, highlighting their potential to enhance data collection practices and improve engagement among CHWs.", "url": "https://arxiv.org/abs/2604.07299v1", "year": 2026, "authors": "Arka Majhi, Aparajita Mondal, Satish B. Agnihotri", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": false}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 371, "title": "Why teaching resists automation in an AI-inundated era: Human judgment, non-modular work, and the limits of delegation", "score": 5, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Debates about artificial intelligence (AI) in education often portray teaching as a modular and procedural job that can increasingly be automated or delegated to technology. This brief communication paper argues that such claims depend on treating teaching as more separable than it is in practice. Drawing on recent literature and empirical studies of large language models and retrieval-augmented generation systems, I argue that although AI can support some bounded functions, instructional work remains difficult to automate in meaningful ways because it is inherently interpretive, relational, and grounded in professional judgment. More fundamentally, teaching and learning are shaped by human cognition, behavior, motivation, and social interaction in ways that cannot be fully specified, predicted, or exhaustively modeled. Tasks that may appear separable in principle derive their instructional value in practice from ongoing contextual interpretation across learners, situations, and relationships. As long as educational practice relies on emergent understanding of human cognition and learning, teaching remains a form of professional work that resists automation. AI may improve access to information and support selected instructional activities, but it does not remove the need for human judgment and relational accountability that effective teaching requires.", "url": "https://arxiv.org/abs/2604.07285v1", "year": 2026, "authors": "Songhee Han", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": false}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 372, "title": "The Rhetoric of Machine Learning", "score": 5, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "I examine the technology of machine learning from the perspective of rhetoric, which is simply the art of persuasion. Rather than being a neutral and \"objective\" way to build \"world models\" from data, machine learning is (I argue) inherently rhetorical. I explore some of its rhetorical features, and examine one pervasive business model where machine learning is widely used, \"manipulation as a service.\"", "url": "https://arxiv.org/abs/2604.06754v1", "year": 2026, "authors": "Robert C. Williamson", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 0}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": false}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 373, "title": "AI adoptionin America: Who, what, and where", "score": 5, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "AbstractWe study the early adoption and diffusion of five artificial intelligence (AI)‐related technologies (automated‐guided vehicles, machine learning, machine vision, natural language processing, and voice recognition) as documented in the 2018 Annual Business Survey of 850,000 firms across the United States. We find that fewer than 6% of firms used any of the AI‐related technologies we measure, though most very large firms reported at least some AI use. Weighted by employment, average adoption was just over 18%. AI use in production, while varying considerably by industry, was found in every sector of the economy and clustered with emerging technologies, such as cloud computing and robotics. Among dynamic young firms, AI use was highest alongside more‐educated, more‐experienced, and younger owners, including owners motivated by bringing new ideas to market or helping the community. AI adoption was also more common in startups displaying indicators of high‐growth entrepreneurship, including venture capital funding, recent product and process innovation, and growth‐oriented business strategies. Early AI adoption was far from evenly distributed: a handful of “superstar” cities and emerging hubs led startups' adoption of AI. These patterns of early AI use foreshadow economic and social impacts far beyond this limited initial diffusion, with the possibility of a growing “AI divide” if early patterns persist.", "url": "https://onlinelibrary.wiley.com/doi/abs/10.1111/jems.12576", "year": 2026, "authors": "K McElheran", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 374, "title": "What drivesartificial intelligence adoptionand use amongfirms? Empirical evidence from Brazilian companies", "score": 5, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "", "url": "https://www.emerald.com/dprg/article/doi/10.1108/DPRG-05-2025-0135/1302773", "year": 2025, "authors": "R Katz,", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 375, "title": "The role ofAI adoptionin transforming the accounting profession: adiffusionof innovations theory approach", "score": 3, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "", "url": "https://www.emerald.com/jaoc/article-abstract/21/5/915/1251767", "year": 2026, "authors": "S Assidi", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 376, "title": "Unveiling organizationalAI adoptionpatterns in Italian companies through the lens of thediffusionof innovations theory", "score": 7, "status": "ACEPTADO", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "This paper investigates the adoption and integration of artificial intelligence (AI) technologies within a sample of 237 Italian enterprises using the Diffusion of Innovations (DOI) theory as the theoretical framework. It examines the characteristics of companies leading in AI adoption, evaluating their alignment with the innovator and early adopter profiles defined by Everett Rogers in 2003 within the DOI framework. The research emphasizes AI’s significant role in enhancing operational efficiency, fostering innovation, securing competitive advantage, and driving long-term growth. It also identifies challenges such as lack of skills, data management issues, and ethical concerns. Our findings contribute empirical evidence to the academic literature on the DOI theory, addressing the underexplored context of AI in Italy. The study provides a nuanced perspective on AI’s impact on employment and sets a foundation for future research, offering managerial insights for strategically deploying AI.", "url": "https://ojs.upr.si/index.php/fm/article/view/172", "year": 2026, "authors": "GG Costa", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 377, "title": "Examining thediffusionof innovations from a dynamic, differential-effects perspective: A longitudinal study onAI adoptionamong employees", "score": 7, "status": "ACEPTADO", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "This study extends the diffusion of innovations theory by considering the threat of technology and examining the adoption of artificial intelligence (AI) in the workplace over time from a dynamic, differential-effects perspective. Findings from a three-wave survey study reveal an association between the threat of AI (i.e., job security concerns) and increasingly negative attitudes toward AI adoption among employees over time. Relative advantage, compatibility, and observability correlated with more positive attitudes, whereas ease of use and trialability showed no significant association. In testing the differential effects on attitudes toward AI adoption among different groups of potential adopters, we found that trialability positively influenced attitudes only among employees who held a positive attitude previously. Observability and the threat of AI, however, were more influential among employees who held a negative attitude previously. Theoretical and practical implications were discussed.", "url": "https://journals.sagepub.com/doi/abs/10.1177/00936502231191832", "year": 2026, "authors": "S Xu", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 378, "title": "Understandingartificial intelligence diffusionthrough anAIcapability maturity model", "score": 7, "status": "ACEPTADO", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "The recent advancements in the field of Artificial Intelligence (AI) have sparked a renewed interest in how organizations can potentially leverage and gain value from these technologies. Despite the considerable hype around AI, recent reports indicate that a very small number of organizations have managed to successfully implement these technologies in their operations. While many early studies and consultancy-based reports point to factors that enable adoption, there is a growing understanding that adoption of AI is rather more of a process of maturity. Building on this more nuanced approach of adoption, this study focuses on the diffusion of AI through a maturity lens . To explore this process, we conducted a two-phased qualitative case study to explore how organizations diffuse AI in their operations. During the first phase, we conducted interviews with AI experts to gain insight into the process of diffusion as well as some of the key challenges faced by organizations. During the second phase, we collected data from three organizations that were at different stages of AI diffusion. Based on the synthesis of the results and a cross-case analysis, we developed a capability maturity model for AI diffusion (AICMM), which was then validated and tested. The results highlight that AI diffusion introduces some common challenges along the path of diffusion as well as some ways to mitigate them. From a research perspective, our results show that there are some core tasks associated with early AI diffusion that gradually evolve as the maturity of projects grows. For professionals, we present tools for identifying the current state of maturity and providing some practical guidelines on how to further implement AI technologies in their operations to generate business value.", "url": "https://link.springer.com/article/10.1007/s10796-024-10528-4", "year": 2024, "authors": "HF Hansen, E Lillesund,", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 379, "title": "Exploring determinants influencingartificial intelligence adoption, reference todiffusionof innovation theory", "score": 3, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "", "url": "https://www.sciencedirect.com/science/article/pii/S0160791X24002987", "year": 2026, "authors": "P Patnaik", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relev ion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "", "url": "https://www.emerald.com/tqm/article/38/3/633/1269287", "year": 2026, "authors": "M Gutiérrez-Leefmans", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": false}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 384, "title": "A moderated model ofartificial intelligence adoptioninfirmsand its effects on their performance", "score": 7, "status": "ACEPTADO", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "Leveraging two prominent theories of technology adoption in firms, this study examines the organizational determinants of the adoption intensity of artificial intelligence (AI) and its effects on firms’ performance, under the moderating effects of technological turbulence. To conduct this study, a unique dataset was compiled via a survey of US-based managers involved with technology and AI adoption in high-tech goods and services, leading to 226 usable responses. Structural Equation Modeling was then applied to test the proposed model. The findings uncover the influence of technological, organizational, and environmental factors on the firms’ AI adoption intensity. Additionally, a positive correlation is observed between AI adoption intensity and firms' performance. Lastly, technological turbulence emerges as a crucial environmental factor moderating the effects of antecedents on AI. Given the feeble adoption of AI in firms despite its documented role in firms’ success, the current study can offer a road map to successfully implementing AI in firms and, thus, improving their performance.", "url": "https://link.springer.com/article/10.1007/s10799-024-00422-5", "year": 2026, "authors": "J Chen", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 385, "title": "Mind the Gap:AI Adoptionin Europe and the US", "score": 5, "status": "REVISAR", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "This paper combines international evidence from worker and firm surveys conducted in 2025 and 2026 to document large gaps in AI adoption, both between the US and Europe and across European countries. Cross-country differences in worker demographics and firm composition account for an important share of these gaps. AI adoption, within and across countries, is also closely linked to firm personnel management practices and whether firms actively encourage AI use by workers. Micro-level evidence suggests that AI generates meaningful time savings for many workers. At the macro level, in recent years industries with higher AI adoption rates have experienced faster productivity growth. While we do not establish causality, this relationship is statistically significant and similar in magnitude in Europe and the US. We do not find clear evidence that industry-level AI adoption is associated with employment changes. We discuss limitations of existing data and outline priorities for future data collection to better assess the productivity and labor market effects of AI.", "url": "https://www.nber.org/papers/w34995", "year": 2026, "authors": "A Bick", "venue": "", "citations": "", "breakdown": {"methodology": 1, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": true}], "manual_decision": "", "manual_note": ""}, {"id": 386, "title": "The critical determinants impactingartificial intelligence adoptionat the organizational level", "score": 7, "status": "ACEPTADO", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "This study aims to investigate the main technological and socio-environmental factors influencing the adoption intentions with regard to AI-based technologies at the organizational level. A conceptual model based on innovation diffusion theory (DOI) and the technology-organization-environment (TOE) framework is proposed and tested empirically using survey-based data collected from 512 senior IT/IS managers in public/private organizations located in Jordan. The results indicate that relative advantage, top management support, cost-effectiveness, competitive pressure, vendor support, compatibility, AI strategic alignment and availability of resources, positively influence the intention to adopt AI-based technologies. The analysis demonstrated that the influence of market uncertainty on adoption intentions is insignificant. It was found that government regulation and complexity negatively influence adoption intentions. The findings of the study would be valuable for AI-based technology providers, IT managers and top management in organizations, and government bodies, in terms of building effective policies to promote the successful adoption of AI-based technologies.", "url": "https://journals.sagepub.com/doi/abs/10.1177/02666669231166889", "year": 2026, "authors": "OM Horani", "venue": "", "citations": "", "breakdown": {"methodology": 2, "causalidity": 2, "top_tier": 0, "novelty": 1, "relevance": 2}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": true}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": true}, {"key": "temporal", "desc": "Tiene dimensión temporal (panel, longitudinal)", "met": false}], "manual_decision": "", "manual_note": ""}, {"id": 387, "title": "The role of human-capital inartificial intelligence adoption", "score": 2, "status": "RECHAZADO", "pocket": "innovacion_difusion", "pocket_label": "Innovación y Difusión", "pocket_color": "#ec4899", "abstract": "", "url": "https://www.sciencedirect.com/science/article/pii/S0165176524004336", "year": 2026, "authors": "B Brey", "venue": "", "citations": "", "breakdown": {"methodology": 0, "causalidity": 0, "top_tier": 0, "novelty": 1, "relevance": 1}, "criteria": [{"key": "ai_focus", "desc": "Estudia IA/automatización/tecnología digital", "met": true}, {"key": "adoption", "desc": "Estudia proceso de adopción o difusión", "met": true}, {"key": "firm_level", "desc": "Nivel de análisis: firma u organización", "met": false}, {"key": "productivity_link", "desc": "Conecta adopción con productividad o valor", "met": fal
